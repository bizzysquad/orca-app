<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA - Financial Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #d4a843;
            --accent-rgb: 212, 168, 67;
            --accent-light: rgba(var(--accent-rgb), 0.15);
            --accent-glow: rgba(var(--accent-rgb), 0.1);
            --font-family: 'Inter', sans-serif;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: var(--font-family);
            background: #09090b;
            color: #fafafa;
            line-height: 1.6;
            overflow: hidden;
        }

        body.light {
            background: #fafaf9;
            color: #18181b;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.4); }
            100% { box-shadow: 0 0 20px rgba(212, 168, 67, 0.8); }
        }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .pulse { animation: pulse 2s infinite; }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent) 0%, #a88840 100%);
            border-radius: 3px;
        }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Layout */
        .layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #1a1a1f 0%, #09090b 100%);
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 16px;
            gap: 8px;
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            display: none;
        }

        .sidebar.show {
            display: flex;
        }

        body.light .sidebar {
            background: linear-gradient(180deg, #ffffff 0%, #fafaf9 100%);
            border-right-color: #e4e4e0;
        }

        .sidebar-logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 0%, #a88840 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
        }

        .nav-item:hover {
            background: rgba(var(--accent-rgb), 0.1);
            border-color: rgba(var(--accent-rgb), 0.2);
        }

        .nav-item.active {
            background: rgba(var(--accent-rgb), 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 0;
        }

        .main-container.desktop {
            margin-left: 220px;
        }

        .top-bar {
            height: 56px;
            background: linear-gradient(90deg, rgba(24, 24, 27, 0.95) 0%, rgba(15, 15, 19, 0.95) 100%);
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 40;
        }

        body.light .top-bar {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.95) 0%, rgba(250, 250, 249, 0.95) 100%);
            border-bottom-color: #e4e4e0;
        }

        .top-bar-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 100px;
        }

        .content.desktop {
            padding: 20px 16px 20px 16px;
            padding-bottom: 20px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: linear-gradient(180deg, #18181b 0%, #09090b 100%);
            border-top: 1px solid #27272a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 4px;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        body.light .bottom-nav {
            background: linear-gradient(180deg, #ffffff 0%, #fafaf9 100%);
            border-top-color: #e4e4e0;
        }

        .bottom-nav.hidden {
            display: none;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            border: none;
            background: transparent;
            color: rgba(250, 250, 250, 0.5);
            transition: all 0.2s ease;
        }

        body.light .nav-btn {
            color: rgba(24, 24, 27, 0.5);
        }

        .nav-btn.active {
            color: var(--accent);
        }

        /* Cards */
        .card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 18px;
            padding: 20px;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 12px;
        }

        body.light .card {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(228, 228, 224, 0.6);
        }

        .card:hover {
            border-color: rgba(var(--accent-rgb), 0.3);
        }

        .card.clickable {
            cursor: pointer;
        }

        .card.clickable:hover {
            border-color: rgba(var(--accent-rgb), 0.5);
            background: rgba(24, 24, 27, 0.9);
        }

        body.light .card.clickable:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Buttons */
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #a88840 100%);
            color: #09090b;
        }

        .btn-primary:hover {
            filter: brightness(1.08);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(var(--accent-rgb), 0.3);
            color: var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(var(--accent-rgb), 0.1);
        }

        .btn-ok {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .btn-ok:hover {
            filter: brightness(1.08);
        }

        .btn-bad {
            background: #ef4444;
            color: white;
        }

        .btn-bad:hover {
            filter: brightness(1.08);
        }

        .btn-ghost {
            background: transparent;
            color: var(--accent);
        }

        .btn-ghost:hover {
            background: rgba(var(--accent-rgb), 0.1);
        }

        .btn-full {
            width: 100%;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-md {
            padding: 10px 16px;
            font-size: 14px;
        }

        .btn-lg {
            padding: 14px 24px;
            font-size: 16px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Inputs */
        .inp {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 10px;
            background: rgba(24, 24, 27, 0.5);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        body.light .inp {
            background: rgba(250, 250, 249, 0.5);
            border-color: rgba(228, 228, 224, 0.6);
            color: #18181b;
        }

        .inp:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.2);
        }

        .inp::placeholder {
            color: rgba(250, 250, 250, 0.4);
        }

        body.light .inp::placeholder {
            color: rgba(24, 24, 27, 0.4);
        }

        .inp-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(250, 250, 250, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        body.light .inp-label {
            color: rgba(24, 24, 27, 0.6);
        }

        /* Select */
        .sel {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 10px;
            background: rgba(24, 24, 27, 0.5);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 8px;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4a843' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 18px;
            padding-right: 36px;
        }

        body.light .sel {
            background-color: rgba(250, 250, 249, 0.5);
            border-color: rgba(228, 228, 224, 0.6);
            color: #18181b;
        }

        .sel:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.2);
        }

        /* Progress Bar */
        .pbar {
            width: 100%;
            height: 8px;
            background: rgba(39, 39, 42, 0.6);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        body.light .pbar {
            background: rgba(228, 228, 224, 0.6);
        }

        .pbar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #a88840 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(var(--accent-rgb), 0.15);
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-green {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
        }

        .modal {
            background: #18181b;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 20px;
            padding-top: 16px;
        }

        body.light .modal {
            background: #ffffff;
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(var(--accent-rgb), 0.4);
            border-radius: 2px;
            margin: 0 auto 12px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 20px;
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        /* Flex utilities */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
        .gap-16 { gap: 16px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .mt-20 { margin-top: 20px; }
        .mb-12 { margin-bottom: 12px; }
        .opacity-50 { opacity: 0.5; }

        /* Text utilities */
        .text-xs { font-size: 12px; }
        .text-sm { font-size: 13px; }
        .text-base { font-size: 14px; }
        .text-lg { font-size: 18px; }
        .text-xl { font-size: 20px; }
        .text-2xl { font-size: 24px; }
        .text-3xl { font-size: 28px; }
        .text-4xl { font-size: 36px; }
        .text-5xl { font-size: 48px; }
        .font-400 { font-weight: 400; }
        .font-500 { font-weight: 500; }
        .font-600 { font-weight: 600; }
        .font-700 { font-weight: 700; }
        .font-800 { font-weight: 800; }
        .font-900 { font-weight: 900; }
        .text-muted { color: rgba(250, 250, 250, 0.5); }
        body.light .text-muted { color: rgba(24, 24, 27, 0.5); }
        .text-gold { color: var(--accent); }

        /* Auth */
        .auth-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #09090b 0%, #0d0d0d 100%);
            z-index: 200;
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            text-align: center;
        }

        .auth-logo {
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent) 0%, #a88840 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #09090b;
            font-size: 24px;
            box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.3);
        }

        .auth-title {
            font-size: 42px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: -1.5px;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .auth-tagline {
            font-size: 12px;
            color: rgba(250, 250, 250, 0.5);
            margin-bottom: 32px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .auth-divider-line {
            flex: 1;
            height: 1px;
            background: rgba(39, 39, 42, 0.5);
        }

        .auth-divider-text {
            font-size: 12px;
            color: rgba(250, 250, 250, 0.5);
        }

        .auth-link {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            margin-top: 16px;
            display: block;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .auth-version {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(250, 250, 250, 0.4);
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            gap: 24px;
            border-bottom: 1px solid rgba(39, 39, 42, 0.6);
            padding: 0 16px;
            position: sticky;
            top: 56px;
            z-index: 30;
            background: #09090b;
        }

        body.light .tab-bar {
            border-bottom-color: rgba(228, 228, 224, 0.6);
            background: #fafaf9;
        }

        .tab {
            padding: 12px 0;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            color: rgba(250, 250, 250, 0.5);
        }

        body.light .tab {
            color: rgba(24, 24, 27, 0.5);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Special cards */
        .hero-gradient {
            background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.2) 0%, rgba(168, 136, 64, 0.1) 100%);
            border: 1px solid rgba(var(--accent-rgb), 0.3);
        }

        .hero-gradient-green {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(22, 163, 74, 0.1) 100%);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .hero-gradient-red {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.1) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* SVG Chart */
        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

        function useWindowWidth() {
            const [width, setWidth] = useState(typeof window !== 'undefined' ? window.innerWidth : 768);

            useEffect(() => {
                const handleResize = () => setWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return width;
        }

        function daysUntilDate(day) {
            const now = new Date();
            const nextDate = new Date(now.getFullYear(), now.getMonth(), day);
            if (nextDate < now) {
                nextDate.setMonth(nextDate.getMonth() + 1);
            }
            const diff = nextDate - now;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        function formatCurrency(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(num);
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase();
        }

        // Components
        function Button({ children, variant = 'primary', size = 'md', full = false, disabled = false, onClick, className = '' }) {
            let variantClass = 'btn-primary';
            if (variant === 'secondary') variantClass = 'btn-secondary';
            if (variant === 'ok') variantClass = 'btn-ok';
            if (variant === 'bad') variantClass = 'btn-bad';
            if (variant === 'ghost') variantClass = 'btn-ghost';

            let sizeClass = 'btn-md';
            if (size === 'sm') sizeClass = 'btn-sm';
            if (size === 'lg') sizeClass = 'btn-lg';

            return (
                <button
                    className={`btn ${variantClass} ${sizeClass} ${full ? 'btn-full' : ''} ${className}`}
                    onClick={onClick}
                    disabled={disabled}
                >
                    {children}
                </button>
            );
        }

        function Input({ label, value, onChange, placeholder = '', type = 'text', max = '', prefix = '' }) {
            return (
                <div>
                    {label && <label className="inp-label">{label}</label>}
                    <div style={{ position: 'relative' }}>
                        {prefix && <span style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: 'var(--accent)', fontWeight: 600 }}>{prefix}</span>}
                        <input
                            type={type}
                            value={value}
                            onChange={onChange}
                            placeholder={placeholder}
                            maxLength={max}
                            className="inp"
                            style={prefix ? { paddingLeft: '32px' } : {}}
                        />
                    </div>
                </div>
            );
        }

        function Select({ label, value, onChange, options = [] }) {
            return (
                <div>
                    {label && <label className="inp-label">{label}</label>}
                    <select value={value} onChange={onChange} className="sel">
                        {options.map((opt, i) => (
                            <option key={i} value={opt.value}>{opt.label}</option>
                        ))}
                    </select>
                </div>
            );
        }

        function Badge({ children, variant = 'default' }) {
            let className = 'badge';
            if (variant === 'green') className = 'badge badge-green';
            if (variant === 'red') className = 'badge badge-red';
            return <span className={className}>{children}</span>;
        }

        function ProgressBar({ percent, label = '' }) {
            return (
                <div className="pbar">
                    <div className="pbar-fill" style={{ width: `${Math.min(100, Math.max(0, percent))}%` }}></div>
                </div>
            );
        }

        function Card({ children, clickable = false, onClick, className = '' }) {
            return (
                <div
                    className={`card ${clickable ? 'clickable' : ''} ${className}`}
                    onClick={onClick}
                    role={clickable ? 'button' : undefined}
                >
                    {children}
                </div>
            );
        }

        function Modal({ isOpen, onClose, children, title = '' }) {
            if (!isOpen) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-handle"></div>
                        <button className="modal-close" onClick={onClose}>×</button>
                        {title && <div style={{ fontSize: '18px', fontWeight: 700, marginBottom: '16px' }}>{title}</div>}
                        {children}
                    </div>
                </div>
            );
        }

        // Auth Screen
        function AuthScreen({ onLogin }) {
            const [view, setView] = useState('main');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="auth-container">
                    <div className="auth-box">
                        {view === 'main' && (
                            <>
                                {getAdminConfig().logoUrl ? (
                                    <img src={getAdminConfig().logoUrl} alt="Logo" style={{ width: '80px', height: '80px', borderRadius: '20px', objectFit: 'contain', marginBottom: '8px' }} />
                                ) : (
                                    <div className="auth-logo">{getAdminConfig().appName[0]}</div>
                                )}
                                <div className="auth-title">{getAdminConfig().appName}</div>

                                </Button>

                                    🍎 Continue with Apple
                                </Button>

                                <div className="auth-divider">
                                    <div className="auth-divider-line"></div>
                                    <div className="auth-divider-text">or</div>

                                <Button variant="secondary" full onClick={() => setView('email')}>
                                    Sign In with Email
                                </Button>

                                <a className="auth-link" onClick={() => onLogin()}>Skip · Try Demo</a>

                        {view === 'email' && (
                            <>
                                <div style={{ marginBottom: '24px' }}>
                                    <Input
                                        label="Email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        placeholder="marcus@example.com"
                                        type="email"
                                    />
                                    <Input
                                        label="Password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Enter password"
                                        type="password"
                                    />
                                </div>
                                <Button variant="primary" full onClick={() => onLogin()}>
                                    Sign In
                                </Button>
                                <a className="auth-link" onClick={() => setView('main')}>Back</a>
                            </>
                        )}

                        <div className="auth-version">v2.0 · Offline mode</div>
                    </div>
                </div>
            );
        }

        // Dashboard
        function Dashboard({ state, onNavigate }) {
            const isDesktop = useWindowWidth() >= 768;
            const [billsView, setBillsView] = useState('week');
            const { user, bills, goals, group } = state;

            const safeToSpend = 2800;
            const nextPayDate = '2026-03-12';
            const nextPayAmount = 3200;
            const daysUntilPay = 21;

            const billsTotal = bills.reduce((sum, b) => sum + b.amount, 0);
            const goalsTotal = goals.reduce((sum, g) => sum + g.weekly, 0);
            const allocated = billsTotal + goalsTotal;

            // Calculate this week's and this month's bills
            const now = new Date();
            const currentDay = now.getDate();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            const dayOfWeek = now.getDay();
            const weekStart = currentDay - (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
            const weekEnd = weekStart + 6;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            const weekBills = bills.filter(b => {
                const due = parseInt(b.due);
                return due >= Math.max(1, weekStart) && due <= Math.min(daysInMonth, weekEnd) && b.status === 'upcoming';
            });
            const monthBills = bills.filter(b => b.status === 'upcoming');
            const weekTotal = weekBills.reduce((s, b) => s + b.amount, 0);
            const monthTotal = monthBills.reduce((s, b) => s + b.amount, 0);

            const rawOrder = getAdminConfig().sectionOrder?.dashboard || [{ id: 'welcome', visible: true, label: 'Welcome Banner' }, { id: 'topCards', visible: true, label: 'Safe to Spend / Next Pay' }, { id: 'billsSummary', visible: true, label: 'Bills Summary' }, { id: 'allocated', visible: true, label: 'Allocated Overview' }, { id: 'creditScore', visible: true, label: 'Credit Score Preview' }, { id: 'upcomingBills', visible: true, label: 'Upcoming Bills' }, { id: 'stackCircle', visible: true, label: 'Stack Circle Preview' }, { id: 'savingsGoals', visible: true, label: 'Savings Goals' }];
            const order = rawOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);

            const sections = {
                welcome: (
                    <div key="welcome" style={{ marginBottom: '24px' }}>
                        <div style={{ fontSize: '20px', fontWeight: 900, color: 'var(--accent)', marginBottom: '4px' }}>
                            Welcome back, {user.name.split(' ')[0]}
                        </div>
                        <div className="text-muted">{"Here's your financial snapshot"}</div>
                    </div>
                ),
                billsSummary: (
                    <div key="billsSummary" style={{ marginBottom: '12px' }}>
                        <Card className="hero-gradient">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                <div style={{ fontWeight: 700, fontSize: '16px' }}>Bills Due</div>
                                <div style={{ display: 'flex', gap: '4px', background: '#18181b', borderRadius: '8px', padding: '3px' }}>
                                    {[{ id: 'week', label: 'This Week' }, { id: 'month', label: 'This Month' }].map(v => (
                                        <button key={v.id} onClick={() => setBillsView(v.id)} style={{
                                            padding: '4px 10px', border: 'none', borderRadius: '6px', fontSize: '11px', cursor: 'pointer',
                                            background: billsView === v.id ? 'rgba(var(--accent-rgb), 0.15)' : 'transparent',
                                            color: billsView === v.id ? 'var(--accent)' : '#a1a1a1',
                                            fontWeight: billsView === v.id ? 600 : 400
                                        }}>{v.label}</button>
                                    ))}
                                </div>
                            </div>
                            <div style={{ fontSize: '28px', fontWeight: 900, color: 'var(--accent)', marginBottom: '4px' }}>
                                {formatCurrency(billsView === 'week' ? weekTotal : monthTotal)}
                            </div>
                            <div className="text-sm text-muted">
                                {billsView === 'week'
                                    ? (weekBills.length === 0 ? 'No bills due this week' : weekBills.length + ' bill' + (weekBills.length !== 1 ? 's' : '') + ' due this week')
                                    : (monthBills.length === 0 ? 'No bills due this month' : monthBills.length + ' bill' + (monthBills.length !== 1 ? 's' : '') + ' due this month')
                                }
                            </div>
                            {(billsView === 'week' ? weekBills : monthBills).slice(0, 3).map(bill => (
                                <div key={bill.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderTop: '1px solid rgba(255,255,255,0.06)', marginTop: '8px' }}>
                                    <div>
                                        <div style={{ fontWeight: 600, fontSize: '13px' }}>{bill.name}</div>
                                        <div className="text-xs text-muted">Due {bill.due}th</div>
                                    </div>
                                    <div style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '14px' }}>{formatCurrency(bill.amount)}</div>
                                </div>
                            ))}
                            {(billsView === 'week' ? weekBills : monthBills).length > 3 && (
                                <Button variant="ghost" size="sm" onClick={() => onNavigate('bill-boss')} style={{ marginTop: '8px', width: '100%' }}>
                                    View All {(billsView === 'week' ? weekBills : monthBills).length} Bills
                                </Button>
                            )}
                        </Card>
                    </div>
                ),
                topCards: (
                    <div key="topCards" className="grid-2" style={{ marginBottom: '12px' }}>
                        <Card className="hero-gradient">
                            <div className="text-sm text-muted">Safe to Spend</div>
                            <div style={{ fontSize: '32px', fontWeight: 900, color: 'var(--accent)', marginTop: '8px' }}>
                                {formatCurrency(safeToSpend)}
                            </div>
                            <div className="text-sm text-muted" style={{ marginTop: '8px' }}>~{formatCurrency(safeToSpend / 14)}/day</div>
                        </Card>

                        <Card className="hero-gradient">
                            <div className="text-sm text-muted">Next Pay</div>
                            <div style={{ fontSize: '24px', fontWeight: 900, color: 'var(--accent)', marginTop: '8px' }}>
                                {formatCurrency(nextPayAmount)}
                            </div>
                            <div className="text-sm text-muted" style={{ marginTop: '8px' }}>{daysUntilPay}d</div>
                        </Card>
                    </div>
                ),
                allocated: (
                    <div key="allocated">
                        <Card className={allocated >= nextPayAmount * 0.9 ? 'hero-gradient-red' : 'hero-gradient-green'}>
                            <div className="text-sm text-muted">Allocated</div>
                            <div style={{ fontSize: '28px', fontWeight: 900, color: 'var(--accent)', marginTop: '8px' }}>
                                {formatCurrency(allocated)}
                            </div>
                            <div className="text-sm text-muted" style={{ marginTop: '4px' }}>Bills + Savings + Spending</div>
                            <ProgressBar percent={(allocated / nextPayAmount) * 100} />
                            <div className="text-xs text-muted" style={{ marginTop: '8px' }}>
                                {Math.round((allocated / nextPayAmount) * 100)}% used
                            </div>
                        </Card>
                    </div>
                ),
                linkedAccounts: (
                    <div key="linkedAccounts">
                        <Card className="hero-gradient" style={{ marginTop: '12px' }}>
                            <div className="flex items-center justify-between">
                                <div style={{ flex: 1 }}>
                                    <div className="text-xs text-muted">Linked Accounts</div>
                                    <div style={{ fontSize: '18px', fontWeight: 700, marginTop: '4px' }}>Bank Connected</div>
                                </div>
                                <Button variant="ghost" size="sm">Manage</Button>
                            </div>
                        </Card>
                    </div>
                ),
                creditScore: (
                    <div key="creditScore">
                        <Card clickable onClick={() => onNavigate('smart-stack', 'credit')} style={{ marginTop: '12px' }}>
                            <div className="flex items-center gap-16">
                                <div style={{
                                    width: '64px',
                                    height: '64px',
                                    borderRadius: '50%',
                                    background: 'linear-gradient(135deg, var(--accent) 0%, #a88840 100%)',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    flexShrink: 0
                                }}>
                                    <div style={{ fontSize: '28px', fontWeight: 900, color: '#09090b' }}>{user.creditScore}</div>
                                </div>
                                <div style={{ flex: 1 }}>
                                    <div style={{ fontWeight: 700, marginBottom: '4px' }}>Credit Score</div>
                                    <div className="text-sm text-muted" style={{ marginBottom: '8px' }}>Very Good</div>
                                    <ProgressBar percent={(user.creditScore - 300) / (850 - 300) * 100} />
                                </div>
                            </div>
                        </Card>
                    </div>
                ),
                upcomingBills: (
                    <div key="upcomingBills">
                        <div style={{ marginTop: '24px', marginBottom: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div style={{ fontWeight: 700, fontSize: '16px' }}>Upcoming Bills</div>
                            <Button variant="ghost" size="sm" onClick={() => onNavigate('bill-boss')}>See All</Button>
                        </div>

                        {bills.slice(0, 3).map(bill => (
                            <Card key={bill.id} style={{ marginBottom: '8px' }}>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div style={{ fontWeight: 600 }}>{bill.name}</div>
                                        <div className="text-xs text-muted" style={{ marginTop: '2px' }}>
                                            {bill.cat} · Due {bill.due} · {daysUntilDate(bill.due)}d
                                        </div>
                                    </div>
                                    <div style={{ color: 'var(--accent)', fontWeight: 700 }}>{formatCurrency(bill.amount)}</div>
                                </div>
                            </Card>
                        ))}
                    </div>
                ),
                stackCircle: (
                    <div key="stackCircle">
                        {group && (
                            <>
                                <div style={{ marginTop: '24px', marginBottom: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <div style={{ fontWeight: 700, fontSize: '16px' }}>Stack Circle</div>
                                    <Button variant="ghost" size="sm" onClick={() => onNavigate('stack-circle', 'group')}>See All</Button>
                                </div>
                                <Card className="hero-gradient">
                                    <div style={{ fontWeight: 700, color: 'var(--accent)', marginBottom: '12px' }}>{group.name}</div>
                                    <div style={{ fontSize: '24px', fontWeight: 900, color: 'var(--accent)', marginBottom: '8px' }}>
                                        {formatCurrency(group.current)} / {formatCurrency(group.target)}
                                    </div>
                                    <ProgressBar percent={(group.current / group.target) * 100} />
                                    <div className="text-xs text-muted" style={{ marginTop: '8px' }}>
                                        {Math.round((group.current / group.target) * 100)}% · Code: {group.code}
                                    </div>
                                </Card>
                            </>
                        )}
                    </div>
                ),
                savingsGoals: (
                    <div key="savingsGoals">
                        <div style={{ marginTop: '24px', marginBottom: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div style={{ fontWeight: 700, fontSize: '16px' }}>Savings Goals</div>
                            <Button variant="ghost" size="sm" onClick={() => onNavigate('smart-stack', 'savings')}>See All</Button>
                        </div>

                        {goals.slice(0, 2).map(goal => (
                            <Card key={goal.id} style={{ marginBottom: '8px' }}>
                                <div className="flex items-center justify-between" style={{ marginBottom: '8px' }}>
                                    <div style={{ fontWeight: 600 }}>{goal.name}</div>
                                    <div className="text-sm text-muted">{Math.round((goal.current / goal.target) * 100)}%</div>
                                </div>
                                <ProgressBar percent={(goal.current / goal.target) * 100} />
                                <div className="text-xs text-muted" style={{ marginTop: '8px' }}>
                                    {formatCurrency(goal.current)} / {formatCurrency(goal.target)}
                                </div>
                            </Card>
                        ))}
                    </div>
                )
            };

            return (
                <div className="content" style={isDesktop ? { paddingBottom: '20px' } : {}}>
                    {order.map(id => sections[id]).filter(Boolean)}
                </div>
            );
        }

        // Smart Stack - Budget Tab
        function SmartStackBudget({ state, setState }) {
            const [payFreq, setPayFreq] = useState(state.user.payFreq || 'biweekly');
            const [hourlyRate, setHourlyRate] = useState(state.user.payRate || 28.50);
            const [lockedAmount, setLockedAmount] = useState(null);

            const now = new Date();
            const dayOfWeek = now.getDay();
            const daysToMonday = dayOfWeek === 0 ? 1 : (1 - dayOfWeek + 7) % 7 || 7;
            const mostRecentMonday = new Date(now);
            mostRecentMonday.setDate(mostRecentMonday.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

            const generateSchedule = () => {
                const days = [];
                for (let i = 0; i < 14; i++) {
                    const d = new Date(mostRecentMonday);
                    d.setDate(d.getDate() + i);
                    const monthStr = String(d.getMonth() + 1).padStart(2, '0');
                    const dateStr = String(d.getDate()).padStart(2, '0');
                    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    days.push({
                        date: `${dayNames[d.getDay()]} ${monthStr}/${dateStr}`,
                        hours: 8,
                        dayOff: false
                    });
                }
                return days;
            };

            const [schedule, setSchedule] = useState(generateSchedule());
            const totalHours = schedule.reduce((sum, day) => sum + (day.dayOff ? 0 : day.hours), 0);
            const basePaycheck = (hourlyRate * totalHours);
            const safeToSpend = 2800;
            const dailyAmount = safeToSpend / 7;

            const billsPerCheck = state.bills.reduce((sum, b) => sum + (b.freq === 'biweekly' ? b.amount : b.amount / 2), 0);
            const savingsPerCheck = state.goals.reduce((sum, g) => sum + (g.weekly * 2), 0);
            const ratio = ((billsPerCheck + savingsPerCheck) / basePaycheck) * 100;

            let health = 'Healthy';
            if (ratio > 90) health = 'Over Budget';
            else if (ratio > 70) health = 'Tight';

            const updateDayHours = (index, newHours) => {
                const updated = [...schedule];
                updated[index].hours = Math.max(0, newHours);
                setSchedule(updated);
            };

            const toggleDayOff = (index) => {
                const updated = [...schedule];
                updated[index].dayOff = !updated[index].dayOff;
                if (updated[index].dayOff) {
                    updated[index].hours = 0;
                }
                setSchedule(updated);
            };

            const lockPaycheck = () => {
                setLockedAmount(basePaycheck);
            };

            const rawOrder = getAdminConfig().sectionOrder?.['smart-stack-budget'] || [{ id: 'safeToSpend', visible: true, label: 'Weekly Safe to Spend' }, { id: 'incomeExpense', visible: true, label: 'Income / Expense Ratio' }, { id: 'workCalendar', visible: true, label: 'Work Calendar' }, { id: 'projectedCheck', visible: true, label: 'Projected Check' }, { id: 'checkSplitter', visible: true, label: 'Check Splitter' }, { id: 'paycheckHistory', visible: true, label: 'Paycheck History' }];
            const order = rawOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);

            const sections = {
                safeToSpend: (
                    <div key="safeToSpend">
                        <Card className="hero-gradient">
                            <div className="text-sm text-muted">Weekly Safe to Spend</div>
                            <div style={{ fontSize: '36px', fontWeight: 900, color: 'var(--accent)', marginTop: '8px', textAlign: 'center' }}>
                                {formatCurrency(safeToSpend)}
                            </div>
                            <div className="text-sm text-muted" style={{ marginTop: '8px', textAlign: 'center' }}>
                                {formatCurrency(dailyAmount)}/day
                            </div>
                        </Card>
                    </div>
                ),
                workCalendar: (
                    <div key="workCalendar">
                        <Card style={{ marginTop: '12px' }}>
                            <div style={{ fontWeight: 700, marginBottom: '12px' }}>Work Calendar</div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '8px', marginBottom: '12px' }}>
                                {schedule.map((day, idx) => (
                                    <div
                                        key={idx}
                                        style={{
                                            padding: '8px',
                                            border: '1px solid #27272a',
                                            borderRadius: '6px',
                                            background: day.dayOff ? '#1a1a1f' : '#0a0a0a',
                                            opacity: day.dayOff ? 0.5 : 1,
                                            textAlign: 'center',
                                            fontSize: '11px'
                                        }}
                                    >
                                        <div style={{ fontWeight: 600, marginBottom: '4px', opacity: 0.7 }}>{day.date.split(' ')[0]}</div>
                                        <div style={{ marginBottom: '6px', color: 'var(--accent)', fontWeight: 600 }}>{day.date.split(' ')[1]}</div>
                                        {!day.dayOff ? (
                                            <input
                                                type="number"
                                                value={day.hours}
                                                onChange={(e) => updateDayHours(idx, parseInt(e.target.value) || 0)}
                                                min="0"
                                                max="16"
                                                style={{
                                                    width: '100%',
                                                    padding: '4px',
                                                    background: '#1a1a1f',
                                                    border: '1px solid #27272a',
                                                    borderRadius: '4px',
                                                    color: '#fafafa',
                                                    fontSize: '11px',
                                                    marginBottom: '4px',
                                                    textAlign: 'center'
                                                }}
                                            />
                                        ) : (
                                            <div style={{ fontSize: '10px', color: '#a1a1a1', marginBottom: '4px' }}>Day Off</div>
                                        )}
                                        <button
                                            onClick={() => toggleDayOff(idx)}
                                            style={{
                                                width: '100%',
                                                padding: '4px',
                                                fontSize: '9px',
                                                background: day.dayOff ? 'var(--accent)' : '#27272a',
                                                color: day.dayOff ? '#09090b' : 'var(--accent)',
                                                border: 'none',
                                                borderRadius: '4px',
                                                cursor: 'pointer',
                                                fontWeight: 600
                                            }}
                                        >
                                            {day.dayOff ? 'Work' : 'Off'}
                                        </button>
                                    </div>
                                ))}
                            </div>
                            <div style={{ fontSize: '12px', color: '#a1a1a1', padding: '8px', background: 'rgba(var(--accent-rgb), 0.1)', borderRadius: '6px' }}>
                                Total: <span style={{ color: 'var(--accent)', fontWeight: 600 }}>{totalHours} hours</span>
                            </div>
                        </Card>
                    </div>
                ),
                incomeExpense: (
                    <div key="incomeExpense">
                        <Card style={{ marginTop: '12px' }}>
                            <div className="flex items-center justify-between" style={{ marginBottom: '12px' }}>
                                <div style={{ fontWeight: 700 }}>Income / Expense Ratio</div>
                                <Badge variant={health === 'Healthy' ? 'green' : health === 'Tight' ? 'default' : 'red'}>
                                    {health}
                                </Badge>
                            </div>
                            <div className="flex items-center justify-between" style={{ marginBottom: '8px', fontSize: '14px' }}>
                                <span style={{ color: '#22c55e' }}>{formatCurrency(basePaycheck)} Income</span>
                                <span style={{ color: '#ef4444' }}>{formatCurrency(billsPerCheck + savingsPerCheck)} Allocated</span>
                            </div>
                            <ProgressBar percent={ratio} />
                            <div className="text-xs text-muted" style={{ marginTop: '8px' }}>
                                {ratio > 100 ? `Deficit: ${formatCurrency(billsPerCheck + savingsPerCheck - basePaycheck)}` : `Remaining: ${formatCurrency(basePaycheck - billsPerCheck - savingsPerCheck)}`} · {Math.round(ratio)}% used
                            </div>
                        </Card>
                    </div>
                ),
                projectedCheck: (
                    <div key="projectedCheck">
                        <Card style={{ marginTop: '12px' }}>
                            <div style={{ fontWeight: 700, marginBottom: '12px' }}>Check Projection</div>
                            <div className="grid-2" style={{ marginBottom: '12px' }}>
                                <Button variant={payFreq === 'weekly' ? 'primary' : 'secondary'} onClick={() => setPayFreq('weekly')} style={{ opacity: lockedAmount ? 0.5 : 1, cursor: lockedAmount ? 'not-allowed' : 'pointer' }}>
                                    Weekly
                                </Button>
                                <Button variant={payFreq === 'biweekly' ? 'primary' : 'secondary'} onClick={() => setPayFreq('biweekly')} style={{ opacity: lockedAmount ? 0.5 : 1, cursor: lockedAmount ? 'not-allowed' : 'pointer' }}>
                                    Bi-Weekly
                                </Button>
                            </div>
                            <Input label="Hourly Rate" value={hourlyRate} onChange={(e) => setHourlyRate(parseFloat(e.target.value) || 0)} type="number" prefix="$" disabled={lockedAmount !== null} />
                            <div style={{ textAlign: 'center', padding: '12px', background: 'rgba(var(--accent-rgb), 0.1)', borderRadius: '8px', marginBottom: '12px' }}>
                                <Badge>{totalHours} hours</Badge>
                            </div>
                            <Button variant={lockedAmount ? 'secondary' : 'primary'} full onClick={() => lockedAmount ? setLockedAmount(null) : lockPaycheck()}>
                                {lockedAmount ? 'Edit Schedule' : 'Lock In Paycheck'}
                            </Button>
                        </Card>

                        <Card style={{ marginTop: '12px' }} className="hero-gradient-green">
                            <div className="text-sm text-muted">Projected Check</div>
                            <div style={{ fontSize: '32px', fontWeight: 900, color: '#22c55e', marginTop: '8px', marginBottom: '8px' }}>
                                {formatCurrency(lockedAmount !== null ? lockedAmount : basePaycheck)}
                            </div>
                            {lockedAmount !== null && <Badge>Locked</Badge>}
                        </Card>
                    </div>
                ),
                checkSplitter: (
                    <div key="checkSplitter">
                        <Card style={{ marginTop: '12px' }}>
                            <div style={{ fontWeight: 700, marginBottom: '12px' }}>Check Splitter</div>
                            {state.bills.slice(0, 3).map((bill, i) => (
                                <div key={i} style={{ marginBottom: '12px' }}>
                                    <div className="flex items-center gap-8" style={{ marginBottom: '4px' }}>
                                        <div style={{ width: '12px', height: '12px', borderRadius: '3px', background: 'var(--accent)' }}></div>
                                        <div style={{ fontWeight: 600, flex: 1 }}>{bill.name}</div>
                                        <div style={{ color: 'var(--accent)', fontWeight: 700 }}>{formatCurrency(bill.amount)}</div>
                                    </div>
                                    <ProgressBar percent={(bill.amount / basePaycheck) * 100} />
                                    <div className="text-xs text-muted" style={{ marginTop: '2px' }}>
                                        {Math.round((bill.amount / basePaycheck) * 100)}%
                                    </div>
                                </div>
                            ))}
                            <div className="text-xs text-muted" style={{ marginTop: '12px', paddingTop: '12px', borderTop: '1px solid rgba(39, 39, 42, 0.6)' }}>
                                Auto-calculated from your bills, savings goals & spending
                            </div>
                        </Card>
                    </div>
                ),
                paycheckHistory: (
                    <div key="paycheckHistory">
                        <Card style={{ marginTop: '12px' }}>
                            <div style={{ fontWeight: 700, marginBottom: '12px' }}>Paycheck History</div>
                            {state.paychecks.map((check, i) => (
                                <div key={check.id} className="flex items-center justify-between" style={{ padding: '8px 0', borderBottom: i < state.paychecks.length - 1 ? '1px solid rgba(39, 39, 42, 0.3)' : 'none' }}>
                                    <div>
                                        <div className="text-sm">{check.date}</div>
                                        <div className="text-xs text-muted">{check.status}</div>
                                    </div>
                                    <div className="flex items-center gap-8">
                                        {check.status === 'paid' && <span style={{ color: '#22c55e', fontWeight: 600 }}>✓</span>}
                                        {check.status === 'upcoming' && lockedAmount !== null && <Badge>Locked</Badge>}
                                        {check.status === 'upcoming' && lockedAmount === null && <Badge>Next</Badge>}
                                        <div style={{ fontWeight: 700, color: 'var(--accent)' }}>{formatCurrency(check.status === 'upcoming' && lockedAmount !== null ? lockedAmount : check.amount)}</div>
                                    </div>
                                </div>
                            ))}
                        </Card>
                    </div>
                )
            };

            return (
                <div className="content">
                    {order.map(id => sections[id]).filter(Boolean)}
                </div>
            );
        }

        // Smart Stack - Savings Tab
        function SmartStackSavings({ state, setState }) {
            const [showForm, setShowForm] = useState(false);
            const [goalName, setGoalName] = useState('Emergency Fund');
            const [target, setTarget] = useState('');
            const [current, setCurrent] = useState('');
            const [weekly, setWeekly] = useState('');

            const totalSaved = state.goals.reduce((sum, g) => sum + g.current, 0);

            const addGoal = () => {
                const newGoal = {
                    id: String(Date.now()),
                    name: goalName,
                    target: parseFloat(target) || 0,
                    current: parseFloat(current) || 0,
                    weekly: parseFloat(weekly) || 0,
                    active: true
                };
                setState({ ...state, goals: [...state.goals, newGoal] });
                setShowForm(false);
                setTarget('');
                setCurrent('');
                setWeekly('');
            };

            const updateGoal = (id, updates) => {
                setState({
                    ...state,
                    goals: state.goals.map(g => g.id === id ? { ...g, ...updates } : g)
                });
            };

            const deleteGoal = (id) => {
                setState({ ...state, goals: state.goals.filter(g => g.id !== id) });
            };

            const rawOrder = getAdminConfig().sectionOrder?.['smart-stack-savings'] || [{ id: 'totalSaved', visible: true, label: 'Total Saved' }, { id: 'createGoal', visible: true, label: 'Create Goal' }, { id: 'yourGoals', visible: true, label: 'Your Goals' }];
            const order = rawOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);

            const sections = {
                totalSaved: (
                    <div key="totalSaved">
                        <Card className="hero-gradient-green">
                            <div className="text-sm text-muted">Total Saved</div>
                            <div style={{ fontSize: '36px', fontWeight: 900, color: '#22c55e', marginTop: '8px', textAlign: 'center' }}>
                                {formatCurrency(totalSaved)}
                            </div>
                        </Card>
                    </div>
                ),
                createGoal: (
                    <div key="createGoal">
                        <Card style={{ marginTop: '12px' }}>
                            <div style={{ fontWeight: 700, marginBottom: '12px' }}>Create Goal</div>
                            {!showForm && (
                                <Button variant="primary" full onClick={() => setShowForm(true)}>+ New Goal</Button>
                            )}
                            {showForm && (
                                <>
                                    <Select
                                        label="Goal Type"
                                        value={goalName}
                                        onChange={(e) => setGoalName(e.target.value)}
                                        options={[
                                            { label: 'Emergency Fund', value: 'Emergency Fund' },
                                            { label: 'Vacation', value: 'Vacation' },
                                            { label: 'Moving Fund', value: 'Moving Fund' },
                                            { label: 'Car Fund', value: 'Car Fund' },
                                            { label: 'Holiday Fund', value: 'Holiday Fund' },
                                            { label: 'Custom', value: 'Custom' }
                                        ]}
                                    />
                                    <div className="grid-2" style={{ gap: '8px' }}>
                                        <Input label="Target" value={target} onChange={(e) => setTarget(e.target.value)} type="number" prefix="$" />
                                        <Input label="Current" value={current} onChange={(e) => setCurrent(e.target.value)} type="number" prefix="$" />
                                    </div>
                                    <Input label="Weekly Amount" value={weekly} onChange={(e) => setWeekly(e.target.value)} type="number" prefix="$" />
                                    <div className="grid-2" style={{ gap: '8px', marginTop: '12px' }}>
                                        <Button variant="primary" onClick={addGoal}>Create</Button>
                                        <Button variant="secondary" onClick={() => setShowForm(false)}>Cancel</Button>
                                    </div>
                                </>
                            )}
                        </Card>
                    </div>
                ),
                yourGoals: (
                    <div key="yourGoals">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Your Goals</div>

                        {state.goals.map(goal => (
                            <Card key={goal.id} style={{ opacity: goal.active ? 1 : 0.5, marginBottom: '8px' }}>
                                <div className="flex items-center justify-between" style={{ marginBottom: '8px' }}>
                                    <div>
                                        <div style={{ fontWeight: 600 }}>{goal.name}</div>
                                        <div className="text-xs text-muted">{Math.round((goal.current / goal.target) * 100)}%</div>
                                    </div>
                                    <div className="flex items-center gap-8">
                                        <Button
                                            variant={goal.active ? 'ok' : 'secondary'}
                                            size="sm"
                                            onClick={() => updateGoal(goal.id, { active: !goal.active })}
                                        >
                                            {goal.active ? 'Active' : 'Paused'}
                                        </Button>
                                        <Button variant="bad" size="sm" onClick={() => deleteGoal(goal.id)}>Del</Button>
                                    </div>
                                </div>
                                <ProgressBar percent={(goal.current / goal.target) * 100} />
                                <div className="flex items-center gap-8" style={{ marginTop: '12px' }}>
                                    <input
                                        type="number"
                                        placeholder="Add amount"
                                        className="inp"
                                        style={{ flex: 1, marginBottom: 0 }}
                                        onKeyPress={(e) => {
                                            if (e.key === 'Enter') {
                                                const amount = parseFloat(e.target.value) || 0;
                                                updateGoal(goal.id, { current: Math.min(goal.target, goal.current + amount) });
                                                e.target.value = '';
                                            }
                                        }}
                                    />
                                    <Button variant="ok" size="sm">Add</Button>
                                </div>
                                <div className="text-xs text-muted" style={{ marginTop: '8px' }}>
                                    {formatCurrency(goal.current)} / {formatCurrency(goal.target)}
                                </div>
                            </Card>
                        ))}
                    </div>
                )
            };

            return (
                <div className="content">
                    {order.map(id => sections[id]).filter(Boolean)}
                </div>
            );
        }

        // Smart Stack - Credit Tab
        function SmartStackCredit({ state }) {
            const { user } = state;
            const [utilSlider, setUtilSlider] = useState(user.utilization);
            const [onTimeSlider, setOnTimeSlider] = useState(user.onTime);

            const getScoreColor = (score) => {
                if (score >= 750) return '#22c55e';
                if (score >= 700) return 'var(--accent)';
                if (score >= 650) return '#eab308';
                if (score >= 600) return '#f97316';
                return '#ef4444';
            };

            const getScoreLabel = (score) => {
                if (score >= 800) return 'Exceptional';
                if (score >= 740) return 'Very Good';
                if (score >= 670) return 'Good';
                if (score >= 580) return 'Fair';
                return 'Poor';
            };

            const baseScore = user.creditScore;
            const simScore = baseScore + (utilSlider < 30 ? 20 : utilSlider > 50 ? -30 : 0) + (onTimeSlider > 95 ? 15 : -10);

            const rawOrder = getAdminConfig().sectionOrder?.['smart-stack-credit'] || [{ id: 'scoreCard', visible: true, label: 'Credit Score' }, { id: 'scoreHistory', visible: true, label: 'Score History' }, { id: 'creditFactors', visible: true, label: 'Credit Factors' }, { id: 'simulator', visible: true, label: 'Score Simulator' }];
            const order = rawOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);

            const sections = {
                scoreCard: (
                    <div key="scoreCard">
                        <Card style={{ textAlign: 'center' }}>
                            <div style={{ fontSize: '48px', fontWeight: 900, color: getScoreColor(baseScore) }}>
                                {baseScore}
                            </div>
                            <div className="text-sm text-muted" style={{ marginTop: '4px' }}>{getScoreLabel(baseScore)}</div>
                            <ProgressBar percent={(baseScore - 300) / (850 - 300) * 100} />
                            <div className="text-xs text-muted" style={{ marginTop: '8px' }}>300 – 850</div>
                        </Card>
                    </div>
                ),
                scoreHistory: (
                    <div key="scoreHistory">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Score History (6 months)</div>
                        <Card style={{ padding: '16px' }}>
                            <svg viewBox="0 0 400 160" style={{ width: '100%', height: 'auto' }}>
                                <polyline
                                    points={user.scoreHistory.map((h, i) => `${(i * 60) + 40},${140 - ((h.s - 690) / 160) * 100}`).join(' ')}
                                    fill="none"
                                    stroke="var(--accent)"
                                    strokeWidth="2"
                                />
                                {user.scoreHistory.map((h, i) => (
                                    <g key={i}>
                                        <circle cx={(i * 60) + 40} cy={140 - ((h.s - 690) / 160) * 100} r="3" fill="var(--accent)" />
                                        <text x={(i * 60) + 40} y={130 - ((h.s - 690) / 160) * 100} textAnchor="middle" fontSize="10" fill="#fafafa">
                                            {h.s}
                                        </text>
                                        <text x={(i * 60) + 40} y="155" textAnchor="middle" fontSize="10" fill="rgba(250, 250, 250, 0.5)">
                                            {h.m}
                                        </text>
                                    </g>
                                ))}
                            </svg>
                        </Card>
                    </div>
                ),
                creditFactors: (
                    <div key="creditFactors">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Credit Factors</div>

                        <Card style={{ marginBottom: '8px' }}>
                            <div className="flex items-center justify-between" style={{ marginBottom: '8px' }}>
                                <div>
                                    <div style={{ fontWeight: 600 }}>Payment History</div>
                                    <div className="text-xs text-muted">35% weight</div>
                                </div>
                                <div style={{ color: 'var(--accent)', fontWeight: 700 }}>{user.onTime}%</div>
                            </div>
                            <ProgressBar percent={user.onTime} />
                        </Card>

                        <Card style={{ marginBottom: '8px' }}>
                            <div className="flex items-center justify-between" style={{ marginBottom: '8px' }}>
                                <div>
                                    <div style={{ fontWeight: 600 }}>Utilization</div>
                                    <div className="text-xs text-muted">30% weight</div>
                                </div>
                                <div style={{ color: user.utilization <= 30 ? '#22c55e' : user.utilization <= 50 ? '#eab308' : '#ef4444', fontWeight: 700 }}>{user.utilization}%</div>
                            </div>
                            <ProgressBar percent={user.utilization} />
                        </Card>

                        <Card style={{ marginBottom: '8px' }}>
                            <div className="flex items-center justify-between" style={{ marginBottom: '8px' }}>
                                <div>
                                    <div style={{ fontWeight: 600 }}>Account Age</div>
                                    <div className="text-xs text-muted">15% weight</div>
                                </div>
                                <div style={{ color: 'var(--accent)', fontWeight: 700 }}>{user.acctAge} yrs</div>
                            </div>
                            <ProgressBar percent={(user.acctAge / 30) * 100} />
                        </Card>
                    </div>
                ),
                simulator: (
                    <div key="simulator">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Score Simulator</div>

                        <Card style={{ marginBottom: '12px' }}>
                            <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                                <div style={{ fontSize: '24px', fontWeight: 900, color: simScore > baseScore ? '#22c55e' : simScore < baseScore ? '#ef4444' : 'var(--accent)' }}>
                                    {simScore}
                                </div>
                                <div className="text-xs text-muted">
                                    {simScore > baseScore ? '+' : ''}{simScore - baseScore} points
                                </div>
                            </div>

                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', marginBottom: '4px', fontWeight: 600, fontSize: '14px' }}>
                                    Utilization: {utilSlider}%
                                </label>
                                <input
                                    type="range"
                                    min="0"
                                    max="100"
                                    value={utilSlider}
                                    onChange={(e) => setUtilSlider(parseInt(e.target.value))}
                                    style={{ width: '100%' }}
                                />
                            </div>

                            <div>
                                <label style={{ display: 'block', marginBottom: '4px', fontWeight: 600, fontSize: '14px' }}>
                                    On-Time Payments: {onTimeSlider}%
                                </label>
                                <input
                                    type="range"
                                    min="0"
                                    max="100"
                                    value={onTimeSlider}
                                    onChange={(e) => setOnTimeSlider(parseInt(e.target.value))}
                                    style={{ width: '100%' }}
                                />
                            </div>
                        </Card>

                        <div style={{ marginBottom: '12px', fontWeight: 700 }}>AI Insights</div>

                        <Card style={{ marginBottom: '8px', borderLeft: '3px solid #22c55e' }}>
                            <div style={{ fontWeight: 600, color: '#22c55e' }}>✓ Utilization</div>
                            <div className="text-sm text-muted" style={{ marginTop: '4px' }}>Your utilization is excellent at {user.utilization}%. Keep it below 30%.</div>
                        </Card>

                        <Card style={{ marginBottom: '8px', borderLeft: '3px solid var(--accent)' }}>
                            <div style={{ fontWeight: 600, color: 'var(--accent)' }}>→ Payment History</div>
                            <div className="text-sm text-muted" style={{ marginTop: '4px' }}>Continue making on-time payments to maintain excellent history.</div>
                        </Card>

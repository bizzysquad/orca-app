<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA - Financial Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            line-height: 1.6;
            overflow: hidden;
        }

        /* Animation keyframes */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        /* Utility classes */
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Glass morphism cards */
        .glass {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 18px;
        }

        .glass:hover {
            border-color: rgba(39, 39, 42, 0.9);
            background: rgba(24, 24, 27, 0.9);
        }

        /* Gold gradient */
        .gradient-gold {
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
        }

        .gradient-gold-text {
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Layout */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            background: #09090b;
        }

        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #1a1a1f 0%, #09090b 100%);
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 16px;
            gap: 8px;
        }

        .sidebar-logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: rgba(212, 168, 67, 0.1);
            border-color: rgba(212, 168, 67, 0.2);
        }

        .nav-item.active {
            background: rgba(212, 168, 67, 0.15);
            border-color: #d4a843;
            color: #d4a843;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 64px;
            background: linear-gradient(90deg, rgba(24, 24, 27, 0.95) 0%, rgba(15, 15, 19, 0.95) 100%);
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            backdrop-filter: blur(8px);
        }

        .top-bar-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #09090b;
            font-size: 14px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
        }

        .bottom-nav {
            display: none;
            height: 64px;
            background: linear-gradient(180deg, #18181b 0%, #09090b 100%);
            border-top: 1px solid #27272a;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 0;
            gap: 0;
            justify-content: space-around;
            align-items: center;
        }

        .bottom-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            color: #a1a1a6;
            font-size: 12px;
            transition: all 0.2s ease;
            padding: 8px 0;
        }

        .bottom-nav-item.active {
            color: #d4a843;
        }

        .bottom-nav-icon {
            font-size: 20px;
        }

        /* Mobile styles */
        @media (max-width: 767px) {
            .sidebar {
                display: none;
            }

            .top-bar {
                padding: 0 16px;
            }

            .content {
                padding: 16px;
                padding-bottom: 80px;
                max-width: 100%;
                margin-bottom: 0;
            }

            .bottom-nav {
                display: flex;
            }

            .admin-only {
                display: none;
            }
        }

        /* Form styles */
        .form-group {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fafafa;
        }

        .input, .select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(39, 39, 42, 0.4);
            border: 1px solid #27272a;
            border-radius: 12px;
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .input:focus, .select:focus, textarea:focus {
            outline: none;
            border-color: #d4a843;
            background: rgba(39, 39, 42, 0.6);
            box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.1);
        }

        .input::placeholder {
            color: #71717a;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            color: #09090b;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(212, 168, 67, 0.2);
        }

        .btn-secondary {
            background: rgba(39, 39, 42, 0.6);
            color: #fafafa;
            border: 1px solid #27272a;
        }

        .btn-secondary:hover {
            background: rgba(39, 39, 42, 0.8);
            border-color: #3f3f46;
        }

        .btn-ghost {
            background: transparent;
            color: #d4a843;
            border: 1px solid #d4a843;
        }

        .btn-ghost:hover {
            background: rgba(212, 168, 67, 0.1);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-block {
            width: 100%;
        }

        /* Card styles */
        .card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            animation: slideUp 0.3s ease-out;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #a1a1a6;
            font-weight: 500;
        }

        .card-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 8px 0;
        }

        .card-value-small {
            font-size: 24px;
            font-weight: 700;
        }

        .card-meta {
            font-size: 13px;
            color: #a1a1a6;
            margin-top: 8px;
        }

        /* Badge styles */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .badge-gold {
            background: rgba(212, 168, 67, 0.2);
            color: #d4a843;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(39, 39, 42, 0.6);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a843 0%, #a88840 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Modal styles */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        .modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #18181b;
            border-top: 1px solid #27272a;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1001;
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a1a1a6;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .modal-close:hover {
            color: #fafafa;
        }

        /* Tab styles */
        .tabs {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #27272a;
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 0;
            border: none;
            background: none;
            color: #a1a1a6;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab.active {
            color: #d4a843;
            border-bottom-color: #d4a843;
        }

        .tab:hover {
            color: #fafafa;
        }

        /* Grid layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 767px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .grid-7 {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 767px) {
            .grid-7 {
                grid-template-columns: repeat(7, 1fr);
                gap: 6px;
            }
        }

        /* Day cell for calendar */
        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(39, 39, 42, 0.4);
            border: 1px solid #27272a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 11px;
            padding: 4px;
            text-align: center;
        }

        .day-cell:hover {
            border-color: #d4a843;
            background: rgba(212, 168, 67, 0.1);
        }

        .day-cell.work-day {
            background: rgba(212, 168, 67, 0.15);
            border-color: #d4a843;
        }

        .day-cell-day {
            font-weight: 700;
            font-size: 12px;
        }

        .day-cell-label {
            font-size: 10px;
            color: #a1a1a6;
            margin-top: 2px;
        }

        /* List items */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(39, 39, 42, 0.4);
            border: 1px solid #27272a;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            background: rgba(39, 39, 42, 0.6);
            border-color: #3f3f46;
        }

        .list-item-info {
            flex: 1;
        }

        .list-item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .list-item-meta {
            font-size: 13px;
            color: #a1a1a6;
        }

        .list-item-amount {
            font-size: 16px;
            font-weight: 700;
        }

        .list-item-amount.positive {
            color: #22c55e;
        }

        .list-item-amount.negative {
            color: #ef4444;
        }

        /* Auth screen */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #09090b 0%, #1a1a1f 100%);
            padding: 20px;
        }

        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 24px;
            padding: 48px;
            max-width: 420px;
            width: 100%;
            animation: slideUp 0.4s ease-out;
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-tagline {
            text-align: center;
            color: #a1a1a6;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .auth-form-group {
            margin-bottom: 16px;
        }

        .auth-button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .auth-toggle {
            text-align: center;
            font-size: 13px;
            color: #a1a1a6;
            margin-top: 16px;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #d4a843;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .auth-version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #71717a;
        }

        /* Split payment colors */
        .split-2 { background: linear-gradient(135deg, rgba(212, 168, 67, 0.3) 0%, rgba(212, 168, 67, 0.1) 100%); }
        .split-3 { background: linear-gradient(135deg, rgba(59, 130, 246, 0.3) 0%, rgba(59, 130, 246, 0.1) 100%); }
        .split-4 { background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(34, 197, 94, 0.1) 100%); }

        /* Chart styles */
        .chart-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 20px 0;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #d4a843 0%, #a88840 100%);
            border-radius: 8px 8px 0 0;
            min-height: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .chart-bar:hover {
            opacity: 0.8;
        }

        /* SVG color classes */
        svg circle.score-ring {
            fill: none;
            stroke: rgba(212, 168, 67, 0.2);
            stroke-width: 8;
        }

        svg circle.score-ring-fill {
            fill: none;
            stroke: url(#goldGradient);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .color-bills { color: #ef4444; }
        .color-savings { color: #22c55e; }
        .color-spending { color: #3b82f6; }

        /* Scrollbar styling */
        .sidebar::-webkit-scrollbar,
        .content::-webkit-scrollbar,
        .modal::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track,
        .content::-webkit-scrollbar-track,
        .modal::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb,
        .content::-webkit-scrollbar-thumb,
        .modal::-webkit-scrollbar-thumb {
            background: rgba(212, 168, 67, 0.3);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover,
        .content::-webkit-scrollbar-thumb:hover,
        .modal::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 168, 67, 0.5);
        }

        /* Input number styling */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Activity feed */
        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(39, 39, 42, 0.4);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(212, 168, 67, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .activity-content {
            flex: 1;
        }

        .activity-name {
            font-weight: 600;
            font-size: 14px;
        }

        .activity-action {
            color: #a1a1a6;
            font-size: 13px;
        }

        .activity-time {
            color: #71717a;
            font-size: 12px;
            margin-top: 4px;
        }

        /* Utilities */
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .mt-24 { margin-top: 24px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-16 { margin-bottom: 16px; }
        .mb-24 { margin-bottom: 24px; }
        .text-muted { color: #a1a1a6; }
        .text-small { font-size: 13px; }
        .font-bold { font-weight: 700; }
        .flex { display: flex; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .gap-8 { gap: 8px; }
        .gap-16 { gap: 16px; }
        .w-full { width: 100%; }

        /* Slider styles */
        .slider-input {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(39, 39, 42, 0.6);
            outline: none;
            -webkit-appearance: none;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            cursor: pointer;
            border: 2px solid #09090b;
        }

        .slider-input::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            cursor: pointer;
            border: 2px solid #09090b;
        }

        /* Color picker */
        input[type="color"] {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Confirmation modal */
        .confirmation-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 18px;
            padding: 32px;
            max-width: 380px;
            z-index: 1002;
            animation: slideUp 0.3s ease-out;
        }

        .confirmation-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .confirmation-text {
            color: #a1a1a6;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .confirmation-buttons {
            display: flex;
            gap: 12px;
        }

        .confirmation-buttons button {
            flex: 1;
        }

        /* Rent reporter */
        .rent-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(39, 39, 42, 0.4);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .rent-history-month {
            font-weight: 600;
        }

        .rent-history-date {
            color: #a1a1a6;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useContext, createContext, useEffect, useRef } = React;

        // Theme Context
        const ThemeContext = createContext();

        // Demo data function
        function getDemoData() {
            return {
                user: {
                    name: "Alex Johnson",
                    email: "alex.johnson@example.com",
                    phone: "+1 (555) 234-5678",
                    payFrequency: "biweekly",

        // Custom hook for window width
        function useWindowWidth() {
            const [width, setWidth] = useState(window.innerWidth);

            useEffect(() => {
                const handleResize = () => setWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return width;

        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(amount);
        }

        // Format date
        function formatDate(date) {
            if (typeof date === 'string') date = new Date(date);
            return new Intl.DateTimeFormat('en-US', {
                month: 'short',
                day: 'numeric'
            }).format(date);
        }

        // Format full date
        function formatFullDate(date) {
            if (typeof date === 'string') date = new Date(date);
            return new Intl.DateTimeFormat('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            }).format(date);
        }

            const [profileEmail, setProfileEmail] = useState(user.email);
            const [profilePhone, setProfilePhone] = useState(user.phone);
            const [showPlaid, setShowPlaid] = useState(false);
            const [plaidStep, setPlaidStep] = useState('select');
            const [bankSelected, setBankSelected] = useState('');
            const [showConfirm, setShowConfirm] = useState(false);
            const [appName, setAppName] = useState(data.branding.appName);
            const [tagline, setTagline] = useState(data.branding.tagline);
            const [accentColor, setAccentColor] = useState(data.branding.accentColor);
            const [logoUrl, setLogoUrl] = useState(data.branding.logoUrl);

            const handleSaveBranding = () => {
                onUpdateBranding({
                    appName,
                    tagline,
                    accentColor,
                    logoUrl
                });
            };

            const handleConnectBank = () => {
                setPlaidStep('institutions');
            };

            const handleBankSelect = (bank) => {
                setBankSelected(bank);
                setPlaidStep('credentials');
            };

            const handlePlaidConnect = () => {
                setPlaidStep('loading');
                setTimeout(() => {
                    setPlaidStep('success');
                }, 2000);
            };

            const handlePlaidDone = () => {
                setShowPlaid(false);
                setPlaidStep('select');
                setBankSelected('');
            };

            const handleResetData = () => {
                setShowConfirm(true);
            };

            return (
                <div className="content">
                    <div className="card glass">
                        <div className="card-title" style={{ marginBottom: '20px' }}>Profile</div>
                        <div style={{ padding: '16px', background: 'rgba(39, 39, 42, 0.4)', borderRadius: '12px', marginBottom: '20px' }}>
                            <div className="user-avatar" style={{ width: '56px', height: '56px', fontSize: '24px', marginBottom: '12px' }}>
                                {user.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div className="card-title">{user.name}</div>
                            <div className="card-meta">{user.email}</div>
                        </div>

                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <span className="card-title">Dark Mode</span>
                            <button className="btn btn-secondary btn-sm" style={{ opacity: theme === 'dark' ? 1 : 0.6 }}>
                                {theme === 'dark' ? 'On' : 'Off'}
                            </button>
                        </div>
                    </div>

                    <div className="card glass">
                        <div className="card-title" style={{ marginBottom: '20px' }}>Personal Information</div>

                        <div className="form-group">
                            <label className="label">Full Name</label>
                            <input
                                type="text"
                                className="input"
                                value={profileName}
                                onChange={(e) => setProfileName(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Email</label>
                            <input
                                type="email"
                                className="input"
                                value={profileEmail}
                                onChange={(e) => setProfileEmail(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Phone</label>
                            <input
                                type="tel"
                                className="input"
                                value={profilePhone}
                                onChange={(e) => setProfilePhone(e.target.value)}
                            />
                        </div>

                        <button className="btn btn-primary btn-block">Save Changes</button>
                    </div>

                    <div className="card glass">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                            <div className="card-title">Bank Connection</div>
                            {user.bankConnected && <span className="badge badge-success">Connected</span>}
                        </div>

                        {!user.bankConnected ? (
                            <button className="btn btn-primary btn-block" onClick={() => setShowPlaid(true)}>
                                Connect Bank Account
                            </button>
                        ) : (
                            <div style={{ padding: '12px', background: 'rgba(34, 197, 94, 0.1)', borderRadius: '12px', marginBottom: '12px' }}>
                                <div className="card-meta">Last synced: {user.syncedAt || 'Never'}</div>
                            </div>
                        )}
                    </div>

                    <div className="card glass">
                        <div className="card-title" style={{ marginBottom: '20px' }}>Branding</div>

                        <div className="form-group">
                            <label className="label">App Name</label>
                            <input
                                type="text"
                                className="input"
                                value={appName}
                                onChange={(e) => setAppName(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Tagline</label>
                            <input
                                type="text"
                                className="input"
                                value={tagline}
                                onChange={(e) => setTagline(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Accent Color</label>
                            <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                <input
                                    type="color"
                                    value={accentColor}
                                    onChange={(e) => setAccentColor(e.target.value)}
                                />
                                <input
                                    type="text"
                                    className="input"
                                    style={{ flex: 1 }}
                                    value={accentColor}
                                    onChange={(e) => setAccentColor(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="form-group">
                            <label className="label">Logo URL</label>
                            <input
                                type="url"
                                className="input"
                                placeholder="https://example.com/logo.png"
                                value={logoUrl}
                                onChange={(e) => setLogoUrl(e.target.value)}
                            />
                        </div>

                        <button className="btn btn-primary btn-block" onClick={handleSaveBranding}>
                            Save Branding
                        </button>
                    </div>

                    <div className="card glass">
                        <div className="card-title" style={{ marginBottom: '16px' }}>Data Management</div>
                        <button className="btn btn-secondary btn-block" style={{ marginBottom: '12px' }} onClick={handleResetData}>
                            Reset All Data
                        </button>
                        <button className="btn btn-ghost btn-block">Sign Out</button>
                    </div>

                    {showPlaid && (
                        <>
                            <div className="modal-backdrop" onClick={() => setShowPlaid(false)}></div>
                            <div className="modal">
                                <div className="modal-header">
                                    <span>Connect Bank Account</span>
                                    <button className="modal-close" onClick={() => setShowPlaid(false)}>×</button>
                                </div>

                                {plaidStep === 'select' && (
                                    <>
                                        <div style={{ padding: '20px', background: 'rgba(212, 168, 67, 0.1)', borderRadius: '12px', marginBottom: '20px' }}>
                                            <div style={{ fontWeight: '600', marginBottom: '8px' }}>Secure Connection</div>
                                            <div style={{ fontSize: '13px', color: '#a1a1a6' }}>We use Plaid to securely connect to 12,000+ financial institutions.</div>
                                        </div>
                                        <button className="btn btn-primary btn-block" onClick={handleConnectBank}>
                                            Connect Bank
                                        </button>
                                    </>
                                )}

                                {plaidStep === 'institutions' && (
                                    <>
                                        <div className="form-group">
                                            <label className="label">Search Your Bank</label>
                                            <input type="text" placeholder="Search..." className="input" />
                                        </div>
                                        {['Chase', 'Bank of America', 'Wells Fargo', 'Citibank', 'US Bank'].map(bank => (
                                            <button
                                                key={bank}
                                                className="list-item"
                                                style={{ background: 'rgba(39, 39, 42, 0.4)', border: '1px solid #27272a', cursor: 'pointer', width: '100%', marginBottom: '12px' }}
                                                onClick={() => handleBankSelect(bank)}
                                            >
                                                <div style={{ textAlign: 'left' }}>{bank}</div>
                                            </button>
                                        ))}
                                    </>
                                )}

                                {plaidStep === 'credentials' && (
                                    <>
                                        <div style={{ marginBottom: '20px', padding: '12px', background: 'rgba(212, 168, 67, 0.1)', borderRadius: '12px' }}>
                                            <div className="card-subtitle">{bankSelected}</div>
                                        </div>
                                        <div className="form-group">
                                            <label className="label">Username</label>
                                            <input type="text" className="input" placeholder="Your banking username" />
                                        </div>
                                        <div className="form-group">
                                            <label className="label">Password</label>
                                            <input type="password" className="input" placeholder="Your banking password" />
                                        </div>
                                        <button className="btn btn-primary btn-block" onClick={handlePlaidConnect}>
                                            Connect
                                        </button>
                                    </>
                                )}

                                {plaidStep === 'loading' && (
                                    <div style={{ textAlign: 'center', padding: '40px 20px' }}>
                                        <div style={{ fontSize: '48px', marginBottom: '16px' }} className="pulse">⏳</div>
                                        <div className="card-title">Connecting...</div>
                                        <div className="card-meta" style={{ marginTop: '8px' }}>Securely verifying your account</div>
                                    </div>
                                )}

                                {plaidStep === 'success' && (
                                    <div style={{ textAlign: 'center', padding: '40px 20px' }}>
                                        <div style={{ fontSize: '48px', marginBottom: '16px' }}>✓</div>
                                        <div className="card-title">Connection Successful!</div>
                                        <div className="card-meta" style={{ marginTop: '8px' }}>Your bank account has been connected.</div>
                                        <button className="btn btn-primary btn-block" style={{ marginTop: '20px' }} onClick={handlePlaidDone}>
                                            Done
                                        </button>
                                    </div>
                                )}
                            </div>
                        </>
                    )}

                    {showConfirm && (
                        <>
                            <div className="modal-backdrop" onClick={() => setShowConfirm(false)}></div>
                            <div className="confirmation-modal">
                                <div className="confirmation-title">Reset All Data?</div>
                                <div className="confirmation-text">
                                    This will delete all your data including bills, savings goals, and transactions. This action cannot be undone.
                                </div>
                                <div className="confirmation-buttons">
                                    <button className="btn btn-secondary" onClick={() => setShowConfirm(false)}>Cancel</button>
                                    <button className="btn btn-danger" style={{ background: '#ef4444' }} onClick={() => setShowConfirm(false)}>Reset</button>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // Admin Component
        function Admin({ branding, onUpdateBranding }) {
            const [appName, setAppName] = useState(branding.appName);
            const [tagline, setTagline] = useState(branding.tagline);
            const [logoUrl, setLogoUrl] = useState(branding.logoUrl);
            const [accentColor, setAccentColor] = useState(branding.accentColor);

            const handleSave = () => {
                onUpdateBranding({
                    appName,
                    tagline,
                    logoUrl,
                    accentColor
                });
            };

            return (
                <div className="content">
                    <div className="card glass">
                        <div className="card-title" style={{ marginBottom: '20px' }}>Branding Settings</div>

                        <div className="form-group">
                            <label className="label">App Name</label>
                            <input
                                type="text"
                                className="input"
                                value={appName}
                                onChange={(e) => setAppName(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Tagline</label>
                            <input
                                type="text"
                                className="input"
                                value={tagline}
                                onChange={(e) => setTagline(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Logo URL</label>
                            <input
                                type="url"
                                className="input"
                                placeholder="https://example.com/logo.png"
                                value={logoUrl}
                                onChange={(e) => setLogoUrl(e.target.value)}
                            />
                        </div>

                        <div className="form-group">
                            <label className="label">Accent Color</label>
                            <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                <input
                                    type="color"
                                    value={accentColor}
                                    onChange={(e) => setAccentColor(e.target.value)}
                                />
                                <input
                                    type="text"
                                    className="input"
                                    style={{ flex: 1 }}
                                    value={accentColor}
                                    onChange={(e) => setAccentColor(e.target.value)}
                                />
                            </div>
                        </div>

                        <div style={{ display: 'flex', gap: '12px', marginTop: '20px' }}>
                            <button className="btn btn-primary btn-block" onClick={handleSave}>
                                Save Changes
                            </button>
                            <button className="btn btn-secondary btn-block">Back</button>
                        </div>
                    </div>

                    <div className="card glass">
                        <div className="card-title" style={{ marginBottom: '20px' }}>Preview</div>
                        <div style={{ padding: '20px', background: 'rgba(39, 39, 42, 0.4)', borderRadius: '12px', textAlign: 'center' }}>
                            {logoUrl && <img src={logoUrl} alt="Logo" style={{ maxHeight: '60px', marginBottom: '12px' }} />}
                            <div style={{ fontSize: '32px', fontWeight: '800', background: `linear-gradient(135deg, ${accentColor} 0%, ${accentColor}99 100%)`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text', marginBottom: '8px' }}>
                                {appName}
                            </div>
                            <div className="card-meta">{tagline}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [data, setData] = useState(null);
            const [user, setUser] = useState(null);
            const [branding, setBranding] = useState(null);
            const windowWidth = useWindowWidth();
            const isMobile = windowWidth < 768;

            useEffect(() => {
                const savedData = localStorage.getItem('orcaData');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    setData(parsed.data);
                    setUser(parsed.user);
                    setBranding(parsed.branding);
                    setIsAuthenticated(true);
                }
            }, []);

            const handleLogin = () => {
                const demoData = getDemoData();
                setData(demoData);
                setUser(demoData.user);
                setBranding(demoData.branding);
                setIsAuthenticated(true);
                localStorage.setItem('orcaData', JSON.stringify({ data: demoData, user: demoData.user, branding: demoData.branding }));
            };

            const handleUpdateBranding = (newBranding) => {
                const updated = { ...branding, ...newBranding };
                setBranding(updated);
                localStorage.setItem('orcaData', JSON.stringify({ data, user, branding: updated }));
            };

            if (!isAuthenticated) {
                return <AuthScreen onLogin={handleLogin} />;
            }

            if (!data || !user || !branding) {
                return null;
            }

            const navigationItems = [
                { id: 'dashboard', label: 'Dashboard', icon: '📊' },
                { id: 'smartstack', label: 'Smart Stack', icon: '💰' },
                { id: 'billboss', label: 'Bill Boss', icon: '💳' },
                { id: 'stackcircle', label: 'Stack Circle', icon: '👥' },
                { id: 'settings', label: 'Settings', icon: '⚙️' },
                { id: 'admin', label: 'Admin', icon: '🔧', adminOnly: true }
            ];

            return (
                <div className="container">
                    {!isMobile && (
                        <div className="sidebar">
                            <div className="sidebar-logo">{branding.appName}</div>
                            {navigationItems.filter(item => !item.adminOnly).map(item => (
                                <button
                                    key={item.id}
                                    className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPage(item.id)}
                                >
                                    <span style={{ marginRight: '8px' }}>{item.icon}</span>
                                    {item.label}
                                </button>
                            ))}
                            <div style={{ flex: 1 }}></div>
                            <button
                                className={`nav-item ${currentPage === 'admin' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('admin')}
                            >
                                <span style={{ marginRight: '8px' }}>🔧</span>
                                Admin
                            </button>
                        </div>
                    )}

                    <div className="main-container">
                        <div className="top-bar">
                            <div className="top-bar-title">
                                {navigationItems.find(item => item.id === currentPage)?.label}
                            </div>
                            <div className="user-menu">
                                <div style={{ textAlign: 'right', display: 'flex', flexDirection: 'column', gap: '4px' }}>
                                    <div style={{ fontSize: '14px', fontWeight: '600' }}>{user.name}</div>
                                    <div style={{ fontSize: '12px', color: '#a1a1a6' }}>{user.email}</div>
                                </div>
                                <div className="user-avatar">
                                    {user.name.split(' ').map(n => n[0]).join('')}
                                </div>
                            </div>
                        </div>

                        {currentPage === 'dashboard' && <Dashboard user={user} data={data} />}
                        {currentPage === 'smartstack' && <SmartStack user={user} data={data} />}
                        {currentPage === 'billboss' && <BillBoss data={data} />}
                        {currentPage === 'stackcircle' && <StackCircle data={data} />}
                        {currentPage === 'settings' && <Settings user={user} data={data} onUpdateBranding={handleUpdateBranding} />}
                        {currentPage === 'admin' && <Admin branding={branding} onUpdateBranding={handleUpdateBranding} />}
                    </div>

                    {isMobile && (
                        <div className="bottom-nav">
                            {navigationItems.filter(item => !item.adminOnly).map(item => (
                                <button
                                    key={item.id}
                                    className={`bottom-nav-item ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPage(item.id)}
                                >
                                    <div className="bottom-nav-icon">{item.icon}</div>
                                    <div style={{ fontSize: '11px' }}>{item.label}</div>
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCA - Financial Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            line-height: 1.6;
            overflow: hidden;
        }

        body.light {
            background: #fafaf9;
            color: #18181b;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 8px rgba(212, 168, 67, 0.4); }
            100% { box-shadow: 0 0 20px rgba(212, 168, 67, 0.8); }
        }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .pulse { animation: pulse 2s infinite; }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #d4a843 0%, #a88840 100%);
            border-radius: 3px;
        }

        :focus-visible {
            outline: 2px solid #d4a843;
            outline-offset: 2px;
        }

        /* Layout */
        .layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #1a1a1f 0%, #09090b 100%);
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 16px;
            gap: 8px;
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            display: none;
        }

        .sidebar.show {
            display: flex;
        }

        body.light .sidebar {
            background: linear-gradient(180deg, #ffffff 0%, #fafaf9 100%);
            border-right-color: #e4e4e0;
        }

        .sidebar-logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
        }

        .nav-item:hover {
            background: rgba(212, 168, 67, 0.1);
            border-color: rgba(212, 168, 67, 0.2);
        }

        .nav-item.active {
            background: rgba(212, 168, 67, 0.15);
            border-color: #d4a843;
            color: #d4a843;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 0;
        }

        .main-container.desktop {
            margin-left: 220px;
        }

        .top-bar {
            height: 56px;
            background: linear-gradient(90deg, rgba(24, 24, 27, 0.95) 0%, rgba(15, 15, 19, 0.95) 100%);
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 40;
        }

        body.light .top-bar {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.95) 0%, rgba(250, 250, 249, 0.95) 100%);
            border-bottom-color: #e4e4e0;
        }

        .top-bar-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            padding-bottom: 100px;
        }

        .content.desktop {
            padding: 20px 16px 20px 16px;
            padding-bottom: 20px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: linear-gradient(180deg, #18181b 0%, #09090b 100%);
            border-top: 1px solid #27272a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 4px;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        body.light .bottom-nav {
            background: linear-gradient(180deg, #ffffff 0%, #fafaf9 100%);
            border-top-color: #e4e4e0;
        }

        .bottom-nav.hidden {
            display: none;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            border: none;
            background: transparent;
            color: rgba(250, 250, 250, 0.5);
            transition: all 0.2s ease;
        }

        body.light .nav-btn {
            color: rgba(24, 24, 27, 0.5);
        }

        .nav-btn.active {
            color: #d4a843;
        }

        /* Cards */
        .card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 18px;
            padding: 20px;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 12px;
        }

        body.light .card {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(228, 228, 224, 0.6);
        }

        .card:hover {
            border-color: rgba(212, 168, 67, 0.3);
        }

        .card.clickable {
            cursor: pointer;
        }

        .card.clickable:hover {
            border-color: rgba(212, 168, 67, 0.5);
            background: rgba(24, 24, 27, 0.9);
        }

        body.light .card.clickable:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Buttons */
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            color: #09090b;
        }

        .btn-primary:hover {
            filter: brightness(1.08);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(212, 168, 67, 0.3);
            color: #d4a843;
        }

        .btn-secondary:hover {
            background: rgba(212, 168, 67, 0.1);
        }

        .btn-ok {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .btn-ok:hover {
            filter: brightness(1.08);
        }

        .btn-bad {
            background: #ef4444;
            color: white;
        }

        .btn-bad:hover {
            filter: brightness(1.08);
        }

        .btn-ghost {
            background: transparent;
            color: #d4a843;
        }

        .btn-ghost:hover {
            background: rgba(212, 168, 67, 0.1);
        }

        .btn-full {
            width: 100%;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-md {
            padding: 10px 16px;
            font-size: 14px;
        }

        .btn-lg {
            padding: 14px 24px;
            font-size: 16px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Inputs */
        .inp {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 10px;
            background: rgba(24, 24, 27, 0.5);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        body.light .inp {
            background: rgba(250, 250, 249, 0.5);
            border-color: rgba(228, 228, 224, 0.6);
            color: #18181b;
        }

        .inp:focus {
            outline: none;
            border-color: #d4a843;
            box-shadow: 0 0 12px rgba(212, 168, 67, 0.2);
        }

        .inp::placeholder {
            color: rgba(250, 250, 250, 0.4);
        }

        body.light .inp::placeholder {
            color: rgba(24, 24, 27, 0.4);
        }

        .inp-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(250, 250, 250, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        body.light .inp-label {
            color: rgba(24, 24, 27, 0.6);
        }

        /* Select */
        .sel {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(39, 39, 42, 0.6);
            border-radius: 10px;
            background: rgba(24, 24, 27, 0.5);
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 8px;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4a843' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 18px;
            padding-right: 36px;
        }

        body.light .sel {
            background-color: rgba(250, 250, 249, 0.5);
            border-color: rgba(228, 228, 224, 0.6);
            color: #18181b;
        }

        .sel:focus {
            outline: none;
            border-color: #d4a843;
            box-shadow: 0 0 12px rgba(212, 168, 67, 0.2);
        }

        /* Progress Bar */
        .pbar {
            width: 100%;
            height: 8px;
            background: rgba(39, 39, 42, 0.6);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        body.light .pbar {
            background: rgba(228, 228, 224, 0.6);
        }

        .pbar-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a843 0%, #a88840 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(212, 168, 67, 0.15);
            color: #d4a843;
            border: 1px solid rgba(212, 168, 67, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-green {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
        }

        .modal {
            background: #18181b;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 20px;
            padding-top: 16px;
        }

        body.light .modal {
            background: #ffffff;
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(212, 168, 67, 0.4);
            border-radius: 2px;
            margin: 0 auto 12px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: #d4a843;
            cursor: pointer;
            font-size: 20px;
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        /* Flex utilities */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
        .gap-16 { gap: 16px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .mt-20 { margin-top: 20px; }
        .mb-12 { margin-bottom: 12px; }
        .opacity-50 { opacity: 0.5; }

        /* Text utilities */
        .text-xs { font-size: 12px; }
        .text-sm { font-size: 13px; }
        .text-base { font-size: 14px; }
        .text-lg { font-size: 18px; }
        .text-xl { font-size: 20px; }
        .text-2xl { font-size: 24px; }
        .text-3xl { font-size: 28px; }
        .text-4xl { font-size: 36px; }
        .text-5xl { font-size: 48px; }
        .font-400 { font-weight: 400; }
        .font-500 { font-weight: 500; }
        .font-600 { font-weight: 600; }
        .font-700 { font-weight: 700; }
        .font-800 { font-weight: 800; }
        .font-900 { font-weight: 900; }
        .text-muted { color: rgba(250, 250, 250, 0.5); }
        body.light .text-muted { color: rgba(24, 24, 27, 0.5); }
        .text-gold { color: #d4a843; }

        /* Auth */
        .auth-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #09090b 0%, #0d0d0d 100%);
            z-index: 200;
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            text-align: center;
        }

        .auth-logo {
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
            border-radius: 24px;
            background: linear-gradient(135deg, #d4a843 0%, #a88840 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #09090b;
            font-size: 24px;
            box-shadow: 0 8px 32px rgba(212, 168, 67, 0.3);
        }

        .auth-title {
            font-size: 42px;
            font-weight: 900;
            color: #d4a843;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 13px;
            color: #d4a843;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .auth-tagline {
            font-size: 12px;
            color: rgba(250, 250, 250, 0.5);
            margin-bottom: 32px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .auth-divider-line {
            flex: 1;
            height: 1px;
            background: rgba(39, 39, 42, 0.5);
        }

        .auth-divider-text {
            font-size: 12px;
            color: rgba(250, 250, 250, 0.5);
        }

        .auth-link {
            color: #d4a843;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            margin-top: 16px;
            display: block;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .auth-version {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(250, 250, 250, 0.4);
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            gap: 24px;
            border-bottom: 1px solid rgba(39, 39, 42, 0.6);
            padding: 0 16px;
            sticky: 56px;
            background: #09090b;
        }

        body.light .tab-bar {
            border-bottom-color: rgba(228, 228, 224, 0.6);
            background: #fafaf9;
        }

        .tab {
            padding: 12px 0;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            color: rgba(250, 250, 250, 0.5);
        }

        body.light .tab {
            color: rgba(24, 24, 27, 0.5);
        }

        .tab.active {
            color: #d4a843;
            border-bottom-color: #d4a843;
        }

        /* Special cards */
        .hero-gradient {
            background: linear-gradient(135deg, rgba(212, 168, 67, 0.2) 0%, rgba(168, 136, 64, 0.1) 100%);
            border: 1px solid rgba(212, 168, 67, 0.3);
        }

        .hero-gradient-green {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(22, 163, 74, 0.1) 100%);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .hero-gradient-red {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.1) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* SVG Chart */
        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

        }

        function saveState(state) {
            localStorage.setItem('orca_data', JSON.stringify(state));
        }

        function useWindowWidth() {
            const [width, setWidth] = useState(typeof window !== 'undefined' ? window.innerWidth : 768);

            useEffect(() => {
                const handleResize = () => setWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return width;
        }

        function daysUntilDate(day) {
            const now = new Date();
            const nextDate = new Date(now.getFullYear(), now.getMonth(), day);
            if (nextDate < now) {
                nextDate.setMonth(nextDate.getMonth() + 1);
            }
            const diff = nextDate - now;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        function formatCurrency(num) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(num);
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase();
        }

        // Components
        function Button({ children, variant = 'primary', size = 'md', full = false, disabled = false, onClick, className = '' }) {
            let variantClass = 'btn-primary';
            if (variant === 'secondary') variantClass = 'btn-secondary';
            if (variant === 'ok') variantClass = 'btn-ok';
            if (variant === 'bad') variantClass = 'btn-bad';
            if (variant === 'ghost') variantClass = 'btn-ghost';

            let sizeClass = 'btn-md';
            if (size === 'sm') sizeClass = 'btn-sm';
            if (size === 'lg') sizeClass = 'btn-lg';

            return (
                <button
                    className={`btn ${variantClass} ${sizeClass} ${full ? 'btn-full' : ''} ${className}`}
                    onClick={onClick}
                    disabled={disabled}
                >
                    {children}
                </button>
            );
        }

        function Input({ label, value, onChange, placeholder = '', type = 'text', max = '', prefix = '' }) {
            return (
                <div>
                    {label && <label className="inp-label">{label}</label>}
                    <div style={{ position: 'relative' }}>
                        {prefix && <span style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: '#d4a843', fontWeight: 600 }}>{prefix}</span>}
                        <input
                            type={type}
                            value={value}
                            onChange={onChange}
                            placeholder={placeholder}
                            maxLength={max}
                            className="inp"
                            style={prefix ? { paddingLeft: '32px' } : {}}
                        />
                    </div>
                </div>
            );
        }

        function Select({ label, value, onChange, options = [] }) {
            return (
                <div>
                    {label && <label className="inp-label">{label}</label>}
                    <select value={value} onChange={onChange} className="sel">
                        {options.map((opt, i) => (
                            <option key={i} value={opt.value}>{opt.label}</option>
                        ))}
                    </select>
                </div>
            );
        }

        function Badge({ children, variant = 'default' }) {
            let className = 'badge';
            if (variant === 'green') className = 'badge badge-green';
            if (variant === 'red') className = 'badge badge-red';
            return <span className={className}>{children}</span>;
        }

        function ProgressBar({ percent, label = '' }) {
            return (
                <div className="pbar">
                    <div className="pbar-fill" style={{ width: `${Math.min(100, Math.max(0, percent))}%` }}></div>
                </div>
            );
        }

        function Card({ children, clickable = false, onClick, className = '' }) {
            return (
                <div
                    className={`card ${clickable ? 'clickable' : ''} ${className}`}
                    onClick={onClick}
                    role={clickable ? 'button' : undefined}

                    {children}

        function Modal({ isOpen, onClose, children, title = '' }) {
            if (!isOpen) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-handle"></div>
                        <button className="modal-close" onClick={onClose}>×</button>

        // Smart Stack - Budget Tab
        function SmartStackBudget({ state, setState }) {
            const [isLocked, setIsLocked] = useState(false);
            const [payFreq, setPayFreq] = useState(state.user.payFreq || 'biweekly');
            const [hourlyRate, setHourlyRate] = useState(state.user.payRate || 28.50);

            const basePaycheck = payFreq === 'weekly' ? hourlyRate * 40 : hourlyRate * 80;
            const safeToSpend = 2800;
            const dailyAmount = safeToSpend / 7;

            const billsPerCheck = state.bills.reduce((sum, b) => sum + (b.freq === 'biweekly' ? b.amount : b.amount / 2), 0);
            const savingsPerCheck = state.goals.reduce((sum, g) => sum + (g.weekly * 2), 0);
            const ratio = ((billsPerCheck + savingsPerCheck) / basePaycheck) * 100;

            let health = 'Healthy';
            if (ratio > 90) health = 'Over Budget';
            else if (ratio > 70) health = 'Tight';

            return (
                <div className="content">
                    <Card className="hero-gradient">
                        <div className="text-sm text-muted">Weekly Safe to Spend</div>
                        <div style={{ fontSize: '36px', fontWeight: 900, color: '#d4a843', marginTop: '8px', textAlign: 'center' }}>
                            {formatCurrency(safeToSpend)}
                        </div>
                        <div className="text-sm text-muted" style={{ marginTop: '8px', textAlign: 'center' }}>
                            {formatCurrency(dailyAmount)}/day
                        </div>
                    </Card>

                    <Card style={{ marginTop: '12px' }}>
                        <div className="flex items-center justify-between" style={{ marginBottom: '12px' }}>
                            <div style={{ fontWeight: 700 }}>Income / Expense Ratio</div>
                            <Badge variant={health === 'Healthy' ? 'green' : health === 'Tight' ? 'default' : 'red'}>
                                {health}
                            </Badge>
                        </div>

                            <span style={{ color: '#22c55e' }}>{formatCurrency(basePaycheck)} Income</span>
                            <span style={{ color: '#ef4444' }}>{formatCurrency(billsPerCheck + savingsPerCheck)} Allocated</span>

                        <ProgressBar percent={ratio} />

                            {ratio > 100 ? `Deficit: ${formatCurrency(billsPerCheck + savingsPerCheck - basePaycheck)}` : `Remaining: ${formatCurrency(basePaycheck - billsPerCheck - savingsPerCheck)}`} · {Math.round(ratio)}% used

        // Smart Stack - Savings Tab
        function SmartStackSavings({ state, setState }) {
            const [showForm, setShowForm] = useState(false);
            const [goalName, setGoalName] = useState('Emergency Fund');
            const [target, setTarget] = useState('');
            const [current, setCurrent] = useState('');
            const [weekly, setWeekly] = useState('');

            const totalSaved = state.goals.reduce((sum, g) => sum + g.current, 0);

            const addGoal = () => {
                const newGoal = {
                    id: String(Date.now()),
                    name: goalName,
                    target: parseFloat(target) || 0,
                    current: parseFloat(current) || 0,
                    weekly: parseFloat(weekly) || 0,
                    active: true
                };
                setState({ ...state, goals: [...state.goals, newGoal] });
                setShowForm(false);
                setTarget('');
                setCurrent('');
                setWeekly('');
            };

            const updateGoal = (id, updates) => {
                setState({
                    ...state,
                    goals: state.goals.map(g => g.id === id ? { ...g, ...updates } : g)
                });
            };

            const deleteGoal = (id) => {
                setState({ ...state, goals: state.goals.filter(g => g.id !== id) });
            };

            return (
                <div className="content">
                    <Card className="hero-gradient-green">
                        <div className="text-sm text-muted">Total Saved</div>
                        <div style={{ fontSize: '36px', fontWeight: 900, color: '#22c55e', marginTop: '8px', textAlign: 'center' }}>

                        {showForm && (
                            <>
                                <Select
                                    label="Goal Type"
                                    value={goalName}
                                    onChange={(e) => setGoalName(e.target.value)}
                                    options={[
                                        { label: 'Emergency Fund', value: 'Emergency Fund' },
                                        { label: 'Vacation', value: 'Vacation' },
                                        { label: 'Moving Fund', value: 'Moving Fund' },
                                        { label: 'Car Fund', value: 'Car Fund' },
                                        { label: 'Holiday Fund', value: 'Holiday Fund' },
                                        { label: 'Custom', value: 'Custom' }
                                    ]}
                                />
                                <div className="grid-2" style={{ gap: '8px' }}>
                                    <Input label="Target" value={target} onChange={(e) => setTarget(e.target.value)} type="number" prefix="$" />
                                    <Input label="Current" value={current} onChange={(e) => setCurrent(e.target.value)} type="number" prefix="$" />
                                </div>
                                <Input label="Weekly Amount" value={weekly} onChange={(e) => setWeekly(e.target.value)} type="number" prefix="$" />
                                <div className="grid-2" style={{ gap: '8px', marginTop: '12px' }}>
                                    <Button variant="primary" onClick={addGoal}>Create</Button>
                                    <Button variant="secondary" onClick={() => setShowForm(false)}>Cancel</Button>
                                </div>
                            </>
                        )}
                    </Card>

                    <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Your Goals</div>

                    {state.goals.map(goal => (
                        <Card key={goal.id} style={{ opacity: goal.active ? 1 : 0.5, marginBottom: '8px' }}>
                            <div className="flex items-center justify-between" style={{ marginBottom: '8px' }}>
                                <div>
                                    <div style={{ fontWeight: 600 }}>{goal.name}</div>
                                    <div className="text-xs text-muted">{Math.round((goal.current / goal.target) * 100)}%</div>
                                </div>
                                <div className="flex items-center gap-8">
                                    <Button
                                        variant={goal.active ? 'ok' : 'secondary'}
                                        size="sm"
                                        onClick={() => updateGoal(goal.id, { active: !goal.active })}
                                    >
                                        {goal.active ? 'Active' : 'Paused'}
                                    </Button>
                                    <Button variant="bad" size="sm" onClick={() => deleteGoal(goal.id)}>Del</Button>
                                </div>
                            </div>
                            <ProgressBar percent={(goal.current / goal.target) * 100} />
                            <div className="flex items-center gap-8" style={{ marginTop: '12px' }}>
                                <input
                                    type="number"
                                    placeholder="Add amount"
                                    className="inp"
                                    style={{ flex: 1, marginBottom: 0 }}
                                    onKeyPress={(e) => {
                                        if (e.key === 'Enter') {
                                            const amount = parseFloat(e.target.value) || 0;
                                            updateGoal(goal.id, { current: Math.min(goal.target, goal.current + amount) });
                                            e.target.value = '';
                                        }
                                    }}
                                />
                                <Button variant="ok" size="sm">Add</Button>

                        <Input label="Email" value={email} onChange={(e) => setEmail(e.target.value)} type="email" />
                        <Button variant="primary" full onClick={saveProfile}>Save Changes</Button>
                    </Card>

                    <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Linked Accounts</div>

                    <Card className="hero-gradient">
                        <div className="flex items-center justify-between">
                            <div>
                                <div style={{ fontWeight: 600, marginBottom: '4px' }}>🔗 Bank Connected</div>
                                <div className="text-sm text-muted">1 account linked</div>
                            </div>
                            <Badge variant="green">Active</Badge>
                        </div>
                    </Card>

                    <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Cloud Sync</div>

                    <Card>
                        <div className="flex items-center gap-8">
                            <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#eab308' }}></div>
                            <div>
                                <div style={{ fontWeight: 600 }}>Offline Mode</div>
                                <div className="text-sm text-muted">Data saved locally</div>
                            </div>
                        </div>
                    </Card>

                    <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Privacy & Data</div>

                    <Card style={{ marginBottom: '12px' }}>
                        <div className="text-sm" style={{ marginBottom: '12px' }}>
                            Your data is encrypted and never shared with third parties. GDPR & CCPA compliant.
                        </div>
                        <Button variant="bad" full onClick={() => setShowReset(true)}>Reset All Data</Button>
                    </Card>

                    <Card>
                        <Button variant="bad" full onClick={onLogout}>Sign Out</Button>
                    </Card>

                    {showReset && (
                        <Modal isOpen={showReset} onClose={() => setShowReset(false)} title="Reset All Data">
                            <p style={{ marginBottom: '16px', color: 'rgba(250, 250, 250, 0.7)' }}>
                                Are you sure? This will erase all your data permanently.
                            </p>
                            <div className="grid-2" style={{ gap: '8px' }}>
                                <Button variant="bad" onClick={resetData}>Yes, Reset</Button>
                                <Button variant="secondary" onClick={() => setShowReset(false)}>Cancel</Button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }

        // Admin Panel
        function AdminPanel({ state, setState }) {
            const [appName, setAppName] = useState('ORCA');
            const [tagline, setTagline] = useState('Financial Command Center');
            const [logoUrl, setLogoUrl] = useState('');
            const [accentColor, setAccentColor] = useState('#d4a843');
            const [saved, setSaved] = useState(false);

            const saveConfig = () => {
                localStorage.setItem('orca_admin', JSON.stringify({ appName, tagline, logoUrl, accentColor }));
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            return (
                <div className="content">
                    <Card className="hero-gradient">
                        <div style={{ fontWeight: 700, marginBottom: '8px', color: '#d4a843' }}>Admin Panel</div>
                        <div className="text-sm text-muted">
                            Changes apply instantly. Customize the app without editing code.
                        </div>
                    </Card>

                    <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Branding</div>

                    <Card>
                        <Input label="App Name" value={appName} onChange={(e) => setAppName(e.target.value)} max="20" />
                        <Input label="Tagline" value={tagline} onChange={(e) => setTagline(e.target.value)} max="60" />
                        <Input label="Logo URL" value={logoUrl} onChange={(e) => setLogoUrl(e.target.value)} max="500" placeholder="Leave blank for default" />
                        <div>
                            <label className="inp-label">Accent Color</label>
                            <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                <input
                                    type="color"
                                    value={accentColor}
                                    onChange={(e) => setAccentColor(e.target.value)}
                                    style={{ width: '60px', height: '40px', border: 'none', borderRadius: '8px', cursor: 'pointer' }}
                                />
                                <input
                                    type="text"
                                    value={accentColor}
                                    onChange={(e) => setAccentColor(e.target.value)}
                                    className="inp"
                                    style={{ flex: 1, marginBottom: 0 }}
                                    placeholder="#d4a843"
                                />
                            </div>
                        </div>
                    </Card>

                    <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Preview</div>

                    <Card style={{ textAlign: 'center' }}>
                        <div style={{
                            width: '80px',
                            height: '80px',
                            margin: '0 auto 16px',
                            borderRadius: '16px',
                            background: accentColor,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            color: '#09090b',
                            fontWeight: 900,
                            fontSize: '18px'
                        }}>
                            {appName[0]}
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: 900, color: accentColor, marginBottom: '4px' }}>
                            {appName}
                        </div>
                        <div className="text-sm text-muted">{tagline}</div>
                    </Card>

                    <div style={{ marginTop: '24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                        <Button variant="primary" full onClick={saveConfig}>
                            {saved ? '✓ Saved!' : 'Save Changes'}
                        </Button>
                        <Button variant="secondary" full>Back to App</Button>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('orca_logged_in') === 'true');
            const [state, setStateLocal] = useState(getInitialState());
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [currentTab, setCurrentTab] = useState('budget');
            const isDesktop = useWindowWidth() >= 768;

            const setState = (newState) => {
                setStateLocal(newState);
                saveState(newState);
            };

            const onNavigate = (page, tab = null) => {
                setCurrentPage(page);
                if (tab) setCurrentTab(tab);
            };

            const onLogin = () => {
                localStorage.setItem('orca_logged_in', 'true');
                setIsLoggedIn(true);
            };

            const onLogout = () => {
                localStorage.setItem('orca_logged_in', 'false');
                setIsLoggedIn(false);
            };

            useEffect(() => {
                const theme = localStorage.getItem('orca_theme') || 'dark';
                document.body.classList.toggle('light', theme === 'light');
            }, []);

            if (!isLoggedIn) {
                return <AuthScreen onLogin={onLogin} />;
            }

            return (
                <div className="layout">
                    {isDesktop && (
                        <div className="sidebar show">
                            <div className="sidebar-logo">ORCA</div>
                            {['dashboard', 'smart-stack', 'bill-boss', 'stack-circle', 'settings', 'admin'].map(item => (
                                <button
                                    key={item}
                                    className={`nav-item ${currentPage === item ? 'active' : ''}`}
                                    onClick={() => onNavigate(item)}
                                    style={{ border: 'none' }}
                                >
                                    {item === 'dashboard' && '🏠 Home'}
                                    {item === 'smart-stack' && '📊 Smart Stack'}
                                    {item === 'bill-boss' && '📄 Bill Boss'}
                                    {item === 'stack-circle' && '👥 Stack Circle'}
                                    {item === 'settings' && '⚙️ Settings'}
                                    {item === 'admin' && '🔧 Admin'}
                                </button>
                            ))}
                        </div>
                    )}

                    <div className={`main-container ${isDesktop ? 'desktop' : ''}`}>
                        <div className="top-bar">
                            <div className="top-bar-title">
                                {currentPage === 'dashboard' && 'Dashboard'}
                                {currentPage === 'smart-stack' && 'Smart Stack'}
                                {currentPage === 'bill-boss' && 'Bill Boss'}
                                {currentPage === 'stack-circle' && 'Stack Circle'}
                                {currentPage === 'settings' && 'Settings'}
                                {currentPage === 'admin' && 'Admin Panel'}
                            </div>
                            <div className="user-avatar">{getInitials(state.user.name)}</div>
                        </div>

                        {currentPage === 'dashboard' && <Dashboard state={state} onNavigate={onNavigate} />}
                        {currentPage === 'smart-stack' && <SmartStack state={state} setState={setState} onNavigate={onNavigate} />}
                        {currentPage === 'bill-boss' && <BillBoss state={state} setState={setState} />}
                        {currentPage === 'stack-circle' && <StackCircle state={state} setState={setState} />}
                        {currentPage === 'settings' && <Settings state={state} setState={setState} onLogout={onLogout} />}
                        {currentPage === 'admin' && isDesktop && <AdminPanel state={state} setState={setState} />}

                        {!isDesktop && (
                            <div className="bottom-nav">
                                <button className={`nav-btn ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => onNavigate('dashboard')}>
                                    <span>🏠</span>
                                    <span style={{ fontSize: '10px' }}>Home</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'smart-stack' ? 'active' : ''}`} onClick={() => onNavigate('smart-stack')}>
                                    <span>📊</span>
                                    <span style={{ fontSize: '10px' }}>Stack</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'bill-boss' ? 'active' : ''}`} onClick={() => onNavigate('bill-boss')}>
                                    <span>📄</span>
                                    <span style={{ fontSize: '10px' }}>Bills</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'stack-circle' ? 'active' : ''}`} onClick={() => onNavigate('stack-circle')}>
                                    <span>👥</span>
                                    <span style={{ fontSize: '10px' }}>Circle</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'settings' ? 'active' : ''}`} onClick={() => onNavigate('settings')}>
                                    <span>⚙️</span>
                                    <span style={{ fontSize: '10px' }}>Settings</span>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

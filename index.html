                        <Card style={{ marginBottom: '8px', borderLeft: '3px solid #eab308' }}>
                            <div style={{ fontWeight: 600, color: '#eab308' }}>→ Hard Inquiries</div>
                            <div className="text-sm text-muted" style={{ marginTop: '4px' }}>You have {user.inquiries} recent inquiries. Minimize new credit applications.</div>
                        </Card>
                    </div>
                )
            };

            return (
                <div className="content">
                    {order.map(id => sections[id]).filter(Boolean)}
                </div>
            );
        }

        // Smart Stack (main component with tabs)
        function SmartStack({ state, setState, onNavigate }) {
            const [activeTab, setActiveTab] = useState('budget');

            return (
                <>
                    <div className="tab-bar">
                        <div
                            className={`tab ${activeTab === 'budget' ? 'active' : ''}`}
                            onClick={() => setActiveTab('budget')}
                        >
                            Budget
                        </div>
                        <div
                            className={`tab ${activeTab === 'savings' ? 'active' : ''}`}
                            onClick={() => setActiveTab('savings')}
                        >
                            Savings
                        </div>
                        <div
                            className={`tab ${activeTab === 'credit' ? 'active' : ''}`}
                            onClick={() => setActiveTab('credit')}
                        >
                            Credit
                        </div>
                    </div>

                    {activeTab === 'budget' && <SmartStackBudget state={state} setState={setState} />}
                    {activeTab === 'savings' && <SmartStackSavings state={state} setState={setState} />}
                    {activeTab === 'credit' && <SmartStackCredit state={state} />}
                </>
            );
        }

        // Bill Boss
        function BillBoss({ state, setState }) {
            const [showForm, setShowForm] = useState(false);
            const [billName, setBillName] = useState('');
            const [billAmount, setBillAmount] = useState('');
            const [billDue, setBillDue] = useState('1');
            const [billCat, setBillCat] = useState('Housing');
            const [billFreq, setBillFreq] = useState('monthly');
            const [splitBill, setSplitBill] = useState(null);
            const [splitCount, setSplitCount] = useState(2);
            const [viewMode, setViewMode] = useState('list');
            const [calMonth, setCalMonth] = useState(new Date().getMonth());
            const [calYear, setCalYear] = useState(new Date().getFullYear());

            const unpaidTotal = state.bills.filter(b => b.status === 'upcoming').reduce((sum, b) => sum + b.amount, 0);
            const paidTotal = state.bills.filter(b => b.status === 'paid').reduce((sum, b) => sum + b.amount, 0);

            const addBill = () => {
                const newBill = {
                    id: String(Date.now()),
                    name: billName,
                    amount: parseFloat(billAmount) || 0,
                    cat: billCat,
                    due: parseInt(billDue) || 1,
                    freq: billFreq,
                    status: 'upcoming',
                    alloc: []
                };
                setState({ ...state, bills: [...state.bills, newBill] });
                setBillName('');
                setBillAmount('');
                setBillDue('1');
                setBillCat('Housing');
                setBillFreq('monthly');
                setShowForm(false);
            };

            const deleteBill = (id) => {
                setState({ ...state, bills: state.bills.filter(b => b.id !== id) });
            };

            const payBill = (id) => {
                setState({
                    ...state,
                    bills: state.bills.map(b => b.id === id ? { ...b, status: 'paid' } : b)
                });
            };

            const splitBillInto = (bill, count) => {
                const splitAmount = Math.round((bill.amount / count) * 100) / 100;
                const remainder = Math.round((bill.amount - splitAmount * (count - 1)) * 100) / 100;
                const baseDate = new Date();
                const baseDue = parseInt(bill.due) || 1;
                const payments = [];
                for (let i = 0; i < count; i++) {
                    const payDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDue + (i * 7));
                    payments.push({
                        id: 'p' + i,
                        label: 'Payment ' + (i + 1),
                        date: payDate.toLocaleString('default', { month: 'short' }) + ' ' + payDate.getDate(),
                        calMonth: payDate.getMonth(),
                        calDay: payDate.getDate(),
                        calYear: payDate.getFullYear(),
                        amount: i === count - 1 ? remainder : splitAmount,
                        paid: false
                    });
                }
                const updatedBills = state.bills.map(b => b.id === bill.id ? { ...b, payments: payments } : b);
                setState({ ...state, bills: updatedBills });
                setSplitBill(null);
            };

            const payPayment = (billId, paymentId) => {
                setState({
                    ...state,
                    bills: state.bills.map(b => {
                        if (b.id !== billId) return b;
                        const newPayments = b.payments.map(p => p.id === paymentId ? { ...p, paid: true } : p);
                        const allPaid = newPayments.every(p => p.paid);
                        return { ...b, payments: newPayments, status: allPaid ? 'paid' : b.status };
                    })
                });
            };

            const payAllPayments = (billId) => {
                setState({
                    ...state,
                    bills: state.bills.map(b => {
                        if (b.id !== billId) return b;
                        if (b.payments) {
                            return { ...b, payments: b.payments.map(p => ({ ...p, paid: true })), status: 'paid' };
                        }
                        return { ...b, status: 'paid' };
                    })
                });
            };

            const unsplitBill = (billId) => {
                setState({
                    ...state,
                    bills: state.bills.map(b => b.id === billId ? { ...b, payments: undefined } : b)
                });
            };

            const [expandedBill, setExpandedBill] = useState(null);

            const rawOrder = getAdminConfig().sectionOrder?.['bill-boss'] || [{ id: 'totalBills', visible: true, label: 'Total Monthly Bills' }, { id: 'addBill', visible: true, label: 'Add Bill Form' }, { id: 'billCalendar', visible: true, label: 'Bill Calendar' }, { id: 'viewToggle', visible: true, label: 'View Toggle' }, { id: 'upcomingBills', visible: true, label: 'Upcoming Bills' }, { id: 'paidBills', visible: true, label: 'Paid Bills' }, { id: 'rentReporter', visible: true, label: 'Rent Reporter' }];
            const order = rawOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);

            const sections = {
                totalBills: (
                    <div key="totalBills">
                        <Card className="hero-gradient">
                            <div style={{ textAlign: 'center' }}>
                                <div className="text-sm text-muted">Total Monthly Bills</div>
                                <div style={{ fontSize: '40px', fontWeight: 900, color: 'var(--accent)', marginTop: '8px' }}>
                                    {formatCurrency(unpaidTotal)}
                                </div>
                                <div style={{ marginTop: '16px', paddingTop: '16px', borderTop: '1px solid rgba(var(--accent-rgb), 0.3)' }}>
                                    <div className="text-sm text-muted">Paid</div>
                                    <div style={{ fontSize: '20px', fontWeight: 900, color: '#22c55e', marginTop: '4px' }}>
                                        {formatCurrency(paidTotal)}
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>
                ),
                addBill: (
                    <div key="addBill">
                        <Button variant="primary" full style={{ marginTop: '12px' }} onClick={() => setShowForm(!showForm)}>
                            {showForm ? '− Close' : '+ Add Bill'}
                        </Button>

                        {showForm && (
                            <Card style={{ marginTop: '12px' }}>
                                <Input label="Bill Name" value={billName} onChange={(e) => setBillName(e.target.value)} placeholder="e.g., Rent, Electric" />
                                <div className="grid-2" style={{ gap: '8px' }}>
                                    <Input label="Amount" value={billAmount} onChange={(e) => setBillAmount(e.target.value)} type="number" prefix="$" />
                                    <Input label="Due Date" value={billDue} onChange={(e) => setBillDue(e.target.value)} type="number" />
                                </div>
                                <Select
                                    label="Category"
                                    value={billCat}
                                    onChange={(e) => setBillCat(e.target.value)}
                                    options={getAdminConfig().billCategories.map(cat => ({ label: cat, value: cat }))}
                                />
                                <Select label="Frequency" value={billFreq} onChange={(e) => setBillFreq(e.target.value)} options={[
                                    { label: 'Monthly', value: 'monthly' },
                                    { label: 'Weekly', value: 'weekly' },
                                    { label: 'Bi-Weekly', value: 'biweekly' }
                                ]} />
                                <Button variant="primary" full style={{ marginTop: '12px' }} onClick={addBill}>Save Bill</Button>
                            </Card>
                        )}
                    </div>
                ),
                viewToggle: (
                    <div key="viewToggle" style={{ marginTop: '16px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                            <div style={{ fontWeight: 700 }}>Upcoming Bills</div>
                            <div style={{ display: 'flex', gap: '4px', background: '#18181b', borderRadius: '8px', padding: '3px', border: '1px solid #27272a' }}>
                                {[
                                    { id: 'list', icon: '☰', label: 'List' },
                                    { id: 'compact', icon: '▤', label: 'Compact' }
                                ].map(v => (
                                    <button key={v.id} onClick={() => setViewMode(v.id)} style={{
                                        padding: '5px 12px', border: 'none', borderRadius: '6px', cursor: 'pointer',
                                        background: viewMode === v.id ? 'rgba(var(--accent-rgb), 0.15)' : 'transparent',
                                        color: viewMode === v.id ? 'var(--accent)' : '#a1a1a1',
                                        fontWeight: viewMode === v.id ? 600 : 400,
                                        fontSize: '11px', fontFamily: 'inherit', transition: 'all 0.2s'
                                    }}>
                                        {v.icon} {v.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                ),
                upcomingBills: (
                    <div key="upcomingBills">
                        {viewMode === 'list' && state.bills.filter(b => b.status === 'upcoming').map(bill => {
                            const isExpanded = expandedBill === bill.id;
                            const hasPayments = bill.payments && bill.payments.length > 0;
                            const remaining = hasPayments ? bill.payments.filter(p => !p.paid).reduce((s, p) => s + p.amount, 0) : bill.amount;
                            return (
                            <Card key={bill.id} style={{ marginBottom: '8px', overflow: 'hidden' }}>
                                <div onClick={() => setExpandedBill(isExpanded ? null : bill.id)} style={{ cursor: 'pointer' }}>
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <div style={{ fontWeight: 700, fontSize: '15px' }}>{bill.name}</div>
                                            <div className="text-xs text-muted" style={{ marginTop: '2px' }}>{bill.cat} · Due {hasPayments ? bill.payments.find(p => !p.paid)?.date || ('the ' + bill.due + 'th') : ('Apr ' + bill.due)}</div>
                                        </div>
                                        <div style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '16px' }}>{formatCurrency(bill.amount)}</div>
                                    </div>
                                </div>

                                {isExpanded && hasPayments && (
                                    <div style={{ marginTop: '12px', background: '#0f0f11', borderRadius: '8px', padding: '12px', border: '1px solid #27272a' }}>
                                        <div style={{ fontSize: '10px', fontWeight: 700, color: 'var(--accent)', letterSpacing: '1px', marginBottom: '10px', textTransform: 'uppercase' }}>Payment Schedule</div>
                                        {bill.payments.map(p => (
                                            <div key={p.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #1a1a1f' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                    <span style={{ fontWeight: 600, fontSize: '13px', color: p.paid ? '#52525b' : '#fafafa', textDecoration: p.paid ? 'line-through' : 'none' }}>{p.label}</span>
                                                    <span style={{ fontSize: '12px', color: '#71717a' }}>{p.date}</span>
                                                </div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                    <span style={{ fontWeight: 600, fontSize: '13px', color: p.paid ? '#52525b' : 'var(--accent)' }}>{formatCurrency(p.amount)}</span>
                                                    {!p.paid ? (
                                                        <button onClick={(e) => { e.stopPropagation(); payPayment(bill.id, p.id); }} style={{ padding: '3px 10px', border: '1px solid #27272a', borderRadius: '4px', background: 'transparent', color: '#a1a1a1', cursor: 'pointer', fontSize: '11px', fontFamily: 'inherit' }}>Pay</button>
                                                    ) : (
                                                        <span style={{ fontSize: '12px', color: '#22c55e' }}>✓</span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: '10px', marginTop: '4px' }}>
                                            <span style={{ fontSize: '13px', color: '#a1a1a1' }}>Remaining</span>
                                            <span style={{ fontSize: '14px', fontWeight: 700, color: 'var(--accent)' }}>{formatCurrency(remaining)}</span>
                                        </div>
                                    </div>
                                )}

                                {isExpanded && (
                                    <div style={{ display: 'flex', gap: '8px', marginTop: '12px' }}>
                                        <button onClick={(e) => { e.stopPropagation(); hasPayments ? payAllPayments(bill.id) : payBill(bill.id); }} style={{ flex: 1, padding: '8px', border: 'none', borderRadius: '8px', background: '#22c55e', color: '#fff', fontWeight: 700, fontSize: '12px', cursor: 'pointer', fontFamily: 'inherit' }}>Pay All</button>
                                        <button onClick={(e) => { e.stopPropagation(); hasPayments ? unsplitBill(bill.id) : setSplitBill(bill); }} style={{ flex: 1, padding: '8px', border: 'none', borderRadius: '8px', background: '#27272a', color: '#fafafa', fontWeight: 600, fontSize: '12px', cursor: 'pointer', fontFamily: 'inherit' }}>{hasPayments ? 'Unsplit' : 'Split'}</button>
                                        <button onClick={(e) => { e.stopPropagation(); deleteBill(bill.id); }} style={{ flex: 0.6, padding: '8px', border: 'none', borderRadius: '8px', background: 'rgba(239, 68, 68, 0.2)', color: '#ef4444', fontWeight: 700, fontSize: '12px', cursor: 'pointer', fontFamily: 'inherit' }}>Del</button>
                                    </div>
                                )}
                            </Card>
                            );
                        })}

                        {viewMode === 'compact' && (
                            <Card>
                                {state.bills.filter(b => b.status === 'upcoming').map((bill, i, arr) => (
                                    <div key={bill.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 0', borderBottom: i < arr.length - 1 ? '1px solid #27272a' : 'none' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1 }}>
                                            <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: bill.cat === 'Housing' ? 'var(--accent)' : bill.cat === 'Utilities' ? '#4a9eff' : bill.cat === 'Insurance' ? '#8b5cf6' : bill.cat === 'Entertainment' ? '#f43f5e' : '#10b981', flexShrink: 0 }}></div>
                                            <div style={{ fontSize: '13px', fontWeight: 600 }}>{bill.name}</div>
                                            <div className="text-xs text-muted">Due {bill.due}</div>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <div style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '13px' }}>{formatCurrency(bill.amount)}</div>
                                            <button onClick={() => payBill(bill.id)} style={{ width: '24px', height: '24px', border: 'none', borderRadius: '6px', background: 'rgba(34, 197, 94, 0.15)', color: '#22c55e', cursor: 'pointer', fontSize: '12px' }}>✓</button>
                                            <button onClick={() => setSplitBill(bill)} style={{ width: '24px', height: '24px', border: 'none', borderRadius: '6px', background: 'rgba(var(--accent-rgb), 0.15)', color: 'var(--accent)', cursor: 'pointer', fontSize: '10px' }}>⋯</button>
                                        </div>
                                    </div>
                                ))}
                            </Card>
                        )}
                    </div>
                ),
                billCalendar: (
                    <div key="billCalendar">
                        <div style={{ marginTop: '12px', marginBottom: '12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div style={{ fontWeight: 700 }}>Bill Calendar</div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <button onClick={() => { if (calMonth === 0) { setCalMonth(11); setCalYear(calYear - 1); } else { setCalMonth(calMonth - 1); } }} style={{ width: '28px', height: '28px', border: 'none', borderRadius: '6px', background: '#27272a', color: 'var(--accent)', cursor: 'pointer', fontSize: '14px' }}>◀</button>
                                <div style={{ fontSize: '13px', fontWeight: 600, minWidth: '100px', textAlign: 'center' }}>
                                    {new Date(calYear, calMonth).toLocaleString('default', { month: 'long', year: 'numeric' })}
                                </div>
                                <button onClick={() => { if (calMonth === 11) { setCalMonth(0); setCalYear(calYear + 1); } else { setCalMonth(calMonth + 1); } }} style={{ width: '28px', height: '28px', border: 'none', borderRadius: '6px', background: '#27272a', color: 'var(--accent)', cursor: 'pointer', fontSize: '14px' }}>▶</button>
                            </div>
                        </div>
                        <Card>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px', marginBottom: '4px' }}>
                                {['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => (
                                    <div key={d} style={{ textAlign: 'center', fontSize: '10px', fontWeight: 600, color: '#a1a1a1', padding: '4px 0' }}>{d}</div>
                                ))}
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px' }}>
                                {(() => {
                                    const firstDay = new Date(calYear, calMonth, 1).getDay();
                                    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
                                    const cells = [];

                                    // Build calendar entries: normal bills + split payment entries
                                    const getCalendarEntries = (day) => {
                                        const entries = [];
                                        state.bills.filter(b => b.status === 'upcoming').forEach(bill => {
                                            if (bill.payments && bill.payments.length > 0) {
                                                // Split bill — match using stored calMonth/calDay/calYear
                                                bill.payments.forEach((p, pi) => {
                                                    if (p.paid) return;
                                                    const pMonth = p.calMonth !== undefined ? p.calMonth : null;
                                                    const pDay = p.calDay !== undefined ? p.calDay : null;
                                                    const pYear = p.calYear !== undefined ? p.calYear : null;
                                                    if (pMonth === calMonth && pDay === day && pYear === calYear) {
                                                        entries.push({ name: bill.name + ' #' + (pi + 1), amount: p.amount, isSplit: true });
                                                    }
                                                });
                                            } else {
                                                // Normal bill — show on due date
                                                if (parseInt(bill.due) === day) {
                                                    entries.push({ name: bill.name, amount: bill.amount, isSplit: false });
                                                }
                                            }
                                        });
                                        return entries;
                                    };

                                    for (let i = 0; i < firstDay; i++) {
                                        cells.push(<div key={'e' + i} style={{ padding: '6px', minHeight: '52px' }}></div>);
                                    }
                                    for (let day = 1; day <= daysInMonth; day++) {
                                        const dayEntries = getCalendarEntries(day);
                                        const hasBill = dayEntries.length > 0;
                                        const today = new Date();
                                        const isToday = day === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
                                        const hasSplit = dayEntries.some(e => e.isSplit);
                                        cells.push(
                                            <div key={day} style={{
                                                padding: '4px',
                                                minHeight: '52px',
                                                borderRadius: '6px',
                                                background: hasSplit ? 'rgba(74, 158, 255, 0.08)' : hasBill ? 'rgba(var(--accent-rgb), 0.1)' : 'transparent',
                                                border: isToday ? '1px solid var(--accent)' : '1px solid transparent',
                                                position: 'relative'
                                            }}>
                                                <div style={{ fontSize: '11px', fontWeight: isToday ? 700 : 400, color: isToday ? 'var(--accent)' : '#a1a1a1', marginBottom: '2px' }}>{day}</div>
                                                {dayEntries.slice(0, 2).map((entry, ei) => (
                                                    <div key={ei} style={{
                                                        fontSize: '7px',
                                                        fontWeight: 600,
                                                        color: entry.isSplit ? '#4a9eff' : 'var(--accent)',
                                                        background: entry.isSplit ? 'rgba(74, 158, 255, 0.2)' : 'rgba(var(--accent-rgb), 0.2)',
                                                        borderRadius: '3px',
                                                        padding: '1px 3px',
                                                        marginBottom: '1px',
                                                        overflow: 'hidden',
                                                        textOverflow: 'ellipsis',
                                                        whiteSpace: 'nowrap'
                                                    }}>{entry.name}</div>
                                                ))}
                                                {dayEntries.length > 2 && (
                                                    <div style={{ fontSize: '7px', color: '#71717a', textAlign: 'center' }}>+{dayEntries.length - 2}</div>
                                                )}
                                            </div>
                                        );
                                    }
                                    return cells;
                                })()}
                            </div>
                            <div style={{ marginTop: '12px', paddingTop: '12px', borderTop: '1px solid #27272a' }}>
                                {(() => {
                                    // Build a flat list of all upcoming entries for the legend
                                    const legendItems = [];
                                    state.bills.filter(b => b.status === 'upcoming').forEach(bill => {
                                        if (bill.payments && bill.payments.length > 0) {
                                            bill.payments.filter(p => !p.paid).forEach(p => {
                                                legendItems.push({ key: bill.id + p.id, due: p.date, name: bill.name + ' - ' + p.label, amount: p.amount, isSplit: true });
                                            });
                                        } else {
                                            legendItems.push({ key: bill.id, due: bill.due + 'th', name: bill.name, amount: bill.amount, isSplit: false });
                                        }
                                    });
                                    return (
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                                            {legendItems.map(item => (
                                                <div key={item.key} style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '11px', padding: '4px 8px', background: '#18181b', borderRadius: '6px', border: '1px solid #27272a' }}>
                                                    <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: item.isSplit ? '#4a9eff' : 'var(--accent)' }}></div>
                                                    <span style={{ fontWeight: 600 }}>{item.due}</span>
                                                    <span style={{ color: '#a1a1a1' }}>{item.name}</span>
                                                    <span style={{ color: item.isSplit ? '#4a9eff' : 'var(--accent)', fontWeight: 600 }}>{formatCurrency(item.amount)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })()}
                            </div>
                        </Card>
                    </div>
                ),
                paidBills: (
                    <div key="paidBills">
                        {state.bills.filter(b => b.status === 'paid').length > 0 && (
                            <>
                                <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Paid Bills</div>
                                {state.bills.filter(b => b.status === 'paid').map(bill => (
                                    <Card key={bill.id} style={{ marginBottom: '8px', opacity: 0.5 }}>
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div style={{ fontWeight: 600 }}>✓ {bill.name}</div>
                                                <div className="text-xs text-muted">{bill.cat}</div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <div style={{ color: '#22c55e', fontWeight: 700 }}>{formatCurrency(bill.amount)}</div>
                                                <Button variant="secondary" size="sm" onClick={() => setState({...state, bills: state.bills.map(b => b.id === bill.id ? {...b, status: 'upcoming'} : b)})}>Undo</Button>
                                            </div>
                                        </div>
                                    </Card>
                                ))}
                            </>
                        )}
                    </div>
                ),
                rentReporter: (
                    <div key="rentReporter">
                        {state.bills.some(b => b.cat === 'Housing') && (
                            <>
                                <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Rent Reporter</div>
                                <Card className="hero-gradient">
                                    <div style={{ marginBottom: '12px' }}>
                                        <div className="text-sm text-muted">Monthly Rent</div>
                                        <div style={{ fontSize: '24px', fontWeight: 900, color: 'var(--accent)', marginTop: '4px' }}>
                                            {formatCurrency(state.bills.find(b => b.cat === 'Housing')?.amount || 0)}
                                        </div>
                                    </div>
                                    <Button variant="primary" full>Report This Month</Button>
                                </Card>
                            </>
                        )}
                    </div>
                )
            };

            return (
                <div className="content">
                    {order.map(id => sections[id]).filter(Boolean)}
                    {splitBill && (
                        <Modal isOpen={!!splitBill} onClose={() => setSplitBill(null)} title={'Split ' + splitBill.name}>
                            <div style={{ marginBottom: '16px', textAlign: 'center' }}>
                                <div style={{ fontSize: '24px', fontWeight: 900, color: 'var(--accent)', marginBottom: '4px' }}>
                                    {formatCurrency(splitBill.amount)}
                                </div>
                                <div className="text-xs text-muted">{splitBill.cat} · Due {splitBill.due}th</div>
                            </div>
                            <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
                                {[2, 4, 6].map(n => (
                                    <Button key={n} variant={splitCount === n ? 'primary' : 'secondary'} full onClick={() => setSplitCount(n)}>
                                        {n}x
                                    </Button>
                                ))}
                            </div>
                            <div style={{ background: '#0f0f11', borderRadius: '8px', padding: '12px', border: '1px solid #27272a', marginBottom: '16px' }}>
                                <div style={{ fontSize: '10px', fontWeight: 700, color: 'var(--accent)', letterSpacing: '1px', marginBottom: '10px', textTransform: 'uppercase' }}>Payment Preview</div>
                                {(() => {
                                    const splitAmt = Math.round((splitBill.amount / splitCount) * 100) / 100;
                                    const rem = Math.round((splitBill.amount - splitAmt * (splitCount - 1)) * 100) / 100;
                                    const baseDate = new Date();
                                    const baseDue = parseInt(splitBill.due) || 1;
                                    return Array.from({ length: splitCount }, (_, i) => {
                                        const payDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDue + (i * 7));
                                        return (
                                            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: i < splitCount - 1 ? '1px solid #1a1a1f' : 'none' }}>
                                                <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                                    <span style={{ fontWeight: 600, fontSize: '13px' }}>Payment {i + 1}</span>
                                                    <span style={{ fontSize: '11px', color: '#71717a' }}>{payDate.toLocaleString('default', { month: 'short' })} {payDate.getDate()}</span>
                                                </div>
                                                <span style={{ fontWeight: 600, color: 'var(--accent)', fontSize: '13px' }}>{formatCurrency(i === splitCount - 1 ? rem : splitAmt)}</span>
                                            </div>
                                        );
                                    });
                                })()}
                            </div>
                            <div className="grid-2" style={{ gap: '8px' }}>
                                <Button variant="primary" onClick={() => splitBillInto(splitBill, splitCount)}>Confirm Split</Button>
                                <Button variant="secondary" onClick={() => setSplitBill(null)}>Cancel</Button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }

        // Stack Circle
        function StackCircle({ state, setState }) {
            const [activeTab, setActiveTab] = useState('group');
            const [addAmount, setAddAmount] = useState('');
            const [inviteCopied, setInviteCopied] = useState(false);

            const addToGroup = () => {
                const amount = parseFloat(addAmount) || 0;
                if (amount > 0) {
                    setState({
                        ...state,
                        group: {
                            ...state.group,
                            current: state.group.current + amount,
                            members: state.group.members.map((m, i) => i === 0 ? { ...m, contrib: m.contrib + amount } : m)
                        }
                    });
                    setAddAmount('');
                }
            };

            const rawGroupOrder = getAdminConfig().sectionOrder?.['stack-circle-group'] || [{ id: 'groupProgress', visible: true, label: 'Group Progress' }, { id: 'addMoney', visible: true, label: 'Add Money' }, { id: 'members', visible: true, label: 'Members' }, { id: 'activityFeed', visible: true, label: 'Activity Feed' }, { id: 'inviteLink', visible: true, label: 'Invite Members' }];
            const groupOrder = rawGroupOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);
            const rawRoommatesOrder = getAdminConfig().sectionOrder?.['stack-circle-roommates'] || [{ id: 'totalHousing', visible: true, label: 'Total Housing' }, { id: 'rent', visible: true, label: 'Rent' }, { id: 'sharedUtilities', visible: true, label: 'Shared Utilities' }, { id: 'roommates', visible: true, label: 'Roommates' }];
            const roommatesOrder = rawRoommatesOrder.filter(s => typeof s === 'string' ? true : s.visible !== false).map(s => typeof s === 'string' ? s : s.id);

                                        {state.group.name}

                                    <div style={{ fontSize: '32px', fontWeight: 900, color: 'var(--accent)', marginBottom: '8px' }}>
                                        {formatCurrency(state.group.current)}
                                    </div>
                                    <div className="text-sm text-muted">of {formatCurrency(state.group.target)}</div>
                                    <ProgressBar percent={(state.group.current / state.group.target) * 100} />

                                        Code: {state.group.code}

                                </div>

                                        type="number"
                                        placeholder="Enter amount"
                                        value={addAmount}
                                        onChange={(e) => setAddAmount(e.target.value)}

                                        style={{ flex: 1, marginBottom: 0 }}
                                    />
                                    <Button variant="ok" onClick={addToGroup}>Add</Button>
                                </div>
                            </Card>

                    </div>
                ),
                members: (
                    <div key="members">

                                <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Members</div>

                                    <Card key={member.id} style={{ marginBottom: '8px' }}>
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div style={{ fontWeight: 600 }}>{member.name}</div>
                                                <div className="text-xs text-muted">{formatCurrency(member.contrib)} contributed</div>
                                            </div>

                                    </Card>
                                ))}
                            </>

                                            <div style={{ fontSize: '16px' }}>📍</div>

                                                <div className="text-sm"><strong>{entry.user}</strong> {entry.msg}</div>
                                                <div className="text-xs text-muted">{entry.date}</div>
                                            </div>
                                        </div>
                                    </Card>
                                ))}
                            </>
                        )}
                    </div>

                inviteLink: (
                    <div key="inviteLink">
                        {state.group && (
                            <>
                                <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Invite Members</div>

                                    <div style={{ marginBottom: '16px' }}>
                                        <div style={{ fontSize: '14px', color: '#a1a1a1', marginBottom: '8px' }}>{state.group.name} • {state.group.members.length} members</div>

                                    </div>

                                        background: '#18181b',

                                        borderRadius: '8px',

                                        color: 'var(--accent)',

                                            }}

            const roommatesSections = {
                totalHousing: (

                            <div style={{ textAlign: 'center' }}>
                                <div className="text-sm text-muted">Total Monthly Housing</div>

                                    {formatCurrency(state.roommates.rent + state.roommates.utilities.reduce((s, u) => s + u.amount, 0))}
                                </div>
                                <div style={{ fontSize: '14px', marginBottom: '4px' }}>Rent: {formatCurrency(state.roommates.rent)}</div>
                                <div className="text-sm text-muted" style={{ marginBottom: '8px' }}>
                                    Utilities: {formatCurrency(state.roommates.utilities.reduce((s, u) => s + u.amount, 0))}
                                </div>
                                <Badge variant="green">All Paid</Badge>
                            </div>
                        </Card>
                    </div>
                ),
                rent: (
                    <div key="rent">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Rent</div>

                            <div className="text-sm text-muted">Monthly Rent</div>
                            <div style={{ fontSize: '20px', fontWeight: 900, color: 'var(--accent)', marginTop: '8px' }}>
                                {formatCurrency(state.roommates.rent)}
                            </div>
                            <Button variant="secondary" size="sm" style={{ marginTop: '12px' }}>Edit</Button>
                        </Card>
                    </div>

                    <div key="sharedUtilities">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Shared Utilities</div>

                            <Card key={util.id} style={{ marginBottom: '8px' }}>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div style={{ fontWeight: 600 }}>{util.name}</div>
                                        <div style={{ color: 'var(--accent)', fontWeight: 700 }}>{formatCurrency(util.amount)}</div>
                                    </div>
                                    <Button variant="bad" size="sm">✕</Button>
                                </div>
                            </Card>
                        ))}
                    </div>
                ),
                roommates: (
                    <div key="roommates">
                        <div style={{ marginTop: '24px', marginBottom: '12px', fontWeight: 700 }}>Roommates</div>

                            <Card key={member.id} style={{ marginBottom: '8px' }}>
                                <div style={{ marginBottom: '12px' }}>
                                    <div style={{ fontWeight: 600, marginBottom: '4px' }}>{member.name}</div>
                                    <div className="text-sm text-muted">Share: {member.share}% · Owes {formatCurrency((state.roommates.rent / 100) * member.share)}/mo</div>
                                </div>
                                <div className="flex items-center gap-8" style={{ marginBottom: '12px' }}>
                                    <Badge variant={member.paidRent ? 'green' : 'default'}>
                                        {member.paidRent ? '✓ Rent Paid' : 'Rent Pending'}
                                    </Badge>
                                    <Badge variant={member.paidUtilities ? 'green' : 'default'}>
                                        {member.paidUtilities ? '✓ Utils Paid' : 'Utils Pending'}
                                    </Badge>
                                </div>
                            </Card>
                        ))}
                    </div>
                )
            };

            return (
                <>
                    <div className="tab-bar">
                        <div

                        >
                            Group Savings

                        <div
                            className={`tab ${activeTab === 'roommates' ? 'active' : ''}`}

                            Roommates

                            <>
                                {roommatesOrder.map(id => roommatesSections[id]).filter(Boolean)}
                            </>
                        )}
                    </div>
                </>
            );

        // Settings

                            <div className="text-sm" style={{ marginBottom: '12px' }}>

                            </div>
                        </Card>
                    </div>

                            <Button variant="bad" full onClick={() => setShowReset(true)}>Reset All Data</Button>
                        </Card>

                        <Card>
                            <Button variant="bad" full onClick={onLogout}>Sign Out</Button>

                                </p>
                                <div className="grid-2" style={{ gap: '8px' }}>

                                    <Button variant="secondary" onClick={() => setShowReset(false)}>Cancel</Button>
                                </div>
                            </Modal>
                        )}
                    </div>
                )
            };

            return (
                <div className="content">
                    {order.map(id => sections[id]).filter(Boolean)}
                </div>
            );
        }

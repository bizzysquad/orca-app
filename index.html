                                            )}
                                        </div>
                                        <div style={{ flex: 1 }}>
                                            <input type="file" ref={logoInputRef} onChange={(e) => handleLogoUpload(e, setLogoUrl)} accept="image/*" style={{ display: 'none' }} />
                                            <Button variant="primary" onClick={() => logoInputRef.current?.click()} style={{ marginBottom: '8px' }}>Upload Logo</Button>
                                            <div style={{ fontSize: '12px', color: '#a1a1a1' }}>Used on login and welcome screens</div>
                                        </div>
                                    </div>
                                </div>
                                <div style={{ borderTop: '1px solid #27272a', paddingTop: '20px', marginTop: '20px' }}>
                                    <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '12px', color: 'var(--accent)' }}>Sidebar Logo</div>
                                    <div style={{ display: 'flex', gap: '16px', alignItems: 'flex-start' }}>
                                        <div style={{ width: '48px', height: '48px', backgroundColor: '#27272a', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                            {sidebarLogoUrl ? (
                                                <img src={sidebarLogoUrl} alt="Sidebar Logo" style={{ width: '100%', height: '100%', objectFit: 'contain', borderRadius: '8px' }} />
                                            ) : (
                                                <div style={{ fontSize: '20px', color: '#a1a1a1' }}>📸</div>
                                            )}
                                        </div>
                                        <div style={{ flex: 1 }}>
                                            <input type="file" ref={sidebarLogoInputRef} onChange={(e) => handleLogoUpload(e, setSidebarLogoUrl)} accept="image/*" style={{ display: 'none' }} />
                                            <Button variant="primary" onClick={() => sidebarLogoInputRef.current?.click()} style={{ marginBottom: '8px' }}>Upload Logo</Button>
                                            <div style={{ fontSize: '12px', color: '#a1a1a1' }}>Displayed in the sidebar header</div>
                                        </div>
                                    </div>
                                </div>
                            </Card>
                        ),
                        themes: (
                            <Card style={{ borderRadius: '0 0 10px 10px', marginBottom: '16px' }}>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px' }}>
                                    {themePresets.map(theme => (
                                        <div
                                            key={theme.id}
                                            onClick={() => { setAccentColor(theme.accent); setThemeName(theme.id); }}
                                            style={{
                                                padding: '12px',
                                                border: themeName === theme.id ? '2px solid ' + theme.accent : '1px solid #27272a',
                                                borderRadius: '12px', cursor: 'pointer',
                                                backgroundColor: themeName === theme.id ? 'rgba(var(--accent-rgb), 0.1)' : '#1a1a1f',
                                                transition: 'all 0.2s', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px'
                                            }}
                                        >
                                            <div style={{ width: '28px', height: '28px', backgroundColor: theme.accent, borderRadius: '6px' }}></div>
                                            <div style={{ fontSize: '12px', fontWeight: 600, textAlign: 'center' }}>{theme.name}</div>
                                            {themeName === theme.id && <div style={{ fontSize: '16px' }}>✓</div>}
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        ),
                        features: (
                            <Card style={{ borderRadius: '0 0 10px 10px', marginBottom: '16px' }}>
                                {[
                                    { key: 'stackCircle', label: 'Stack Circle' },
                                    { key: 'twoFA', label: '2FA' },
                                    { key: 'smartInsights', label: 'Smart Insights' },
                                    { key: 'billReminders', label: 'Bill Reminders' },
                                    { key: 'creditScore', label: 'Credit Score' },
                                    { key: 'rentReporter', label: 'Rent Reporter' },
                                    { key: 'groupSavings', label: 'Group Savings' }
                                ].map(flag => (
                                    <div key={flag.key} style={{ display: 'flex', alignItems: 'center', gap: '12px', paddingBottom: '12px', marginBottom: '12px', borderBottom: '1px solid #27272a' }}>
                                        <input type="checkbox" checked={features[flag.key]} onChange={(e) => setFeatures({ ...features, [flag.key]: e.target.checked })} style={{ width: '18px', height: '18px', cursor: 'pointer' }} />
                                        <label style={{ fontWeight: 500, cursor: 'pointer' }}>{flag.label}</label>
                                    </div>
                                ))}
                            </Card>
                        ),
                        budgeting: (
                            <Card style={{ borderRadius: '0 0 10px 10px', marginBottom: '16px' }}>
                                <Input label="Default Budget Threshold (%)" type="number" value={budgetRules.defaultThreshold} onChange={(e) => setBudgetRules({ ...budgetRules, defaultThreshold: Number(e.target.value) })} />
                                <Input label="Overspend Alert (%)" type="number" value={budgetRules.overspendAlert} onChange={(e) => setBudgetRules({ ...budgetRules, overspendAlert: Number(e.target.value) })} />
                                <Input label="Savings Auto-allocation (%)" type="number" value={budgetRules.savingsAllocation} onChange={(e) => setBudgetRules({ ...budgetRules, savingsAllocation: Number(e.target.value) })} />
                            </Card>
                        ),
                        sectionOrder: (
                            <Card style={{ borderRadius: '0 0 10px 10px', marginBottom: '16px' }}>
                                <div style={{ fontSize: '13px', color: '#a1a1a1', marginBottom: '16px' }}>
                                    Reorder, rename, or hide sections on each page. Changes apply after saving.
                                </div>
                                {(() => {
                                    const pageNames = {
                                        dashboard: 'Dashboard',
                                        'bill-boss': 'Bill Boss',
                                        'smart-stack-budget': 'Smart Stack - Budget',
                                        'smart-stack-savings': 'Smart Stack - Savings',
                                        'smart-stack-credit': 'Smart Stack - Credit',
                                        'stack-circle-group': 'Stack Circle - Group',
                                        'stack-circle-roommates': 'Stack Circle - Roommates',
                                        settings: 'Settings'
                                    };

                                    const moveSection = (pageKey, index, direction) => {
                                        const newOrder = { ...sectionOrder };
                                        const arr = [...(newOrder[pageKey] || [])];
                                        const newIndex = index + direction;
                                        if (newIndex < 0 || newIndex >= arr.length) return;
                                        [arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];
                                        newOrder[pageKey] = arr;
                                        setSectionOrder(newOrder);
                                    };

                                    const toggleVisibility = (pageKey, index) => {
                                        const newOrder = { ...sectionOrder };
                                        const arr = [...(newOrder[pageKey] || [])];
                                        arr[index] = { ...arr[index], visible: !arr[index].visible };
                                        newOrder[pageKey] = arr;
                                        setSectionOrder(newOrder);
                                    };

                                    const renameSection = (pageKey, index, newLabel) => {
                                        const newOrder = { ...sectionOrder };
                                        const arr = [...(newOrder[pageKey] || [])];
                                        arr[index] = { ...arr[index], label: newLabel };
                                        newOrder[pageKey] = arr;
                                        setSectionOrder(newOrder);
                                    };

                                    return Object.entries(pageNames).map(([pageKey, pageName]) => (
                                        <div key={pageKey} style={{ marginBottom: '8px' }}>
                                            <div
                                                onClick={() => setExpandedPage(expandedPage === pageKey ? null : pageKey)}
                                                style={{
                                                    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                                                    padding: '12px',
                                                    background: expandedPage === pageKey ? 'rgba(var(--accent-rgb), 0.1)' : '#1a1a1f',
                                                    borderRadius: '8px', cursor: 'pointer',
                                                    border: expandedPage === pageKey ? '1px solid rgba(var(--accent-rgb), 0.3)' : '1px solid #27272a',
                                                    transition: 'all 0.2s'
                                                }}
                                            >
                                                <span style={{ fontWeight: 600, fontSize: '13px' }}>{pageName}</span>
                                                <span style={{ fontSize: '12px', color: '#a1a1a1' }}>{expandedPage === pageKey ? '▼' : '▶'}</span>
                                            </div>
                                            {expandedPage === pageKey && (
                                                <div style={{ padding: '8px 0' }}>
                                                    {(sectionOrder[pageKey] || []).map((section, idx) => {
                                                        const sectionObj = typeof section === 'string' ? { id: section, visible: true, label: section } : section;
                                                        return (
                                                            <div
                                                                key={sectionObj.id}
                                                                style={{
                                                                    display: 'flex', alignItems: 'center', gap: '6px',
                                                                    padding: '8px 10px', marginBottom: '4px',
                                                                    background: sectionObj.visible !== false ? '#18181b' : '#0f0f11',
                                                                    borderRadius: '6px', border: '1px solid #27272a',
                                                                    opacity: sectionObj.visible !== false ? 1 : 0.5
                                                                }}
                                                            >
                                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                                                                    <button onClick={() => moveSection(pageKey, idx, -1)} disabled={idx === 0}
                                                                        style={{ width: '22px', height: '14px', border: 'none', borderRadius: '3px', background: idx === 0 ? '#1a1a1f' : '#27272a', color: idx === 0 ? '#3f3f46' : 'var(--accent)', cursor: idx === 0 ? 'not-allowed' : 'pointer', fontSize: '9px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>▲</button>
                                                                    <button onClick={() => moveSection(pageKey, idx, 1)} disabled={idx === (sectionOrder[pageKey] || []).length - 1}
                                                                        style={{ width: '22px', height: '14px', border: 'none', borderRadius: '3px', background: idx === (sectionOrder[pageKey] || []).length - 1 ? '#1a1a1f' : '#27272a', color: idx === (sectionOrder[pageKey] || []).length - 1 ? '#3f3f46' : 'var(--accent)', cursor: idx === (sectionOrder[pageKey] || []).length - 1 ? 'not-allowed' : 'pointer', fontSize: '9px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>▼</button>
                                                                </div>
                                                                <button
                                                                    onClick={() => toggleVisibility(pageKey, idx)}
                                                                    style={{ width: '28px', height: '28px', border: 'none', borderRadius: '6px', background: sectionObj.visible !== false ? 'rgba(34, 197, 94, 0.15)' : 'rgba(239, 68, 68, 0.15)', color: sectionObj.visible !== false ? '#22c55e' : '#ef4444', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}
                                                                >{sectionObj.visible !== false ? '\uD83D\uDC41' : '\uD83D\uDEAB'}</button>
                                                                <input
                                                                    type="text" value={sectionObj.label}
                                                                    onChange={(e) => renameSection(pageKey, idx, e.target.value)}
                                                                    style={{ flex: 1, background: '#09090b', border: '1px solid #27272a', borderRadius: '4px', padding: '4px 8px', color: '#fafafa', fontSize: '12px', fontFamily: 'inherit' }}
                                                                />
                                                                <div style={{ fontSize: '10px', color: '#52525b', minWidth: '20px', textAlign: 'right' }}>#{idx + 1}</div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ));
                                })()}
                            </Card>
                        )
                    };

                    return (
                        <>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
                                <div style={{ fontWeight: 700, color: 'var(--accent)' }}>App Settings & Feature Controls</div>
                                <button onClick={toggleGlobalSettingsLock} style={{
                                    display: 'flex', alignItems: 'center', gap: '6px',
                                    padding: '6px 14px', border: settingsLocked ? '1px solid rgba(var(--accent-rgb), 0.4)' : '1px solid #27272a',
                                    borderRadius: '8px', cursor: 'pointer', fontSize: '12px', fontFamily: 'inherit',
                                    background: settingsLocked ? 'rgba(var(--accent-rgb), 0.1)' : '#18181b',
                                    color: settingsLocked ? 'var(--accent)' : '#a1a1a1', fontWeight: 600
                                }}>
                                    {settingsLocked ? '\uD83D\uDD12 Locked' : '\uD83D\uDD13 Unlocked'}
                                </button>
                            </div>

                            {settingsLayout.map((item, idx) => (
                                <div key={item.id}>
                                    <SettingsSectionHeader item={item} idx={idx} total={settingsLayout.length} />
                                    {!item.minimized && settingsSections[item.id]}
                                </div>
                            ))}
                        </>
                    );
                }

                // Tab 4: Notifications System
                if (currentTab === 'notifications') {
                    return (
                        <>
                            <div style={{ marginBottom: '12px', fontWeight: 700, color: 'var(--accent)' }}>Notification Templates</div>
                            <Card style={{ marginBottom: '24px' }}>
                                <div style={{ display: 'flex', gap: '12px', marginBottom: '16px' }}>
                                    <div style={{ flex: 1 }}>
                                        <input type="checkbox" defaultChecked style={{ marginRight: '8px' }} />
                                        <label>Push Notifications</label>
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <input type="checkbox" defaultChecked style={{ marginRight: '8px' }} />
                                        <label>Email Notifications</label>
                                    </div>
                                </div>
                                <Button variant="primary" full>Test Notification</Button>
                            </Card>

                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', fontSize: '12px', borderCollapse: 'collapse' }}>
                                    <thead>
                                        <tr style={{ borderBottom: '2px solid #27272a' }}>
                                            <th style={{ padding: '12px', textAlign: 'left', fontWeight: 600, color: 'var(--accent)' }}>Template</th>
                                            <th style={{ padding: '12px', textAlign: 'left', fontWeight: 600, color: 'var(--accent)' }}>Sent</th>
                                            <th style={{ padding: '12px', textAlign: 'left', fontWeight: 600, color: 'var(--accent)' }}>Failed</th>
                                            <th style={{ padding: '12px', textAlign: 'left', fontWeight: 600, color: 'var(--accent)' }}>Pending</th>
                                            <th style={{ padding: '12px', textAlign: 'left', fontWeight: 600, color: 'var(--accent)' }}>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {adminData.notificationTemplates.map((template, idx) => (
                                            <tr key={template.id} style={{ borderBottom: '1px solid #27272a', background: idx % 2 === 0 ? 'rgba(0,0,0,0.1)' : 'transparent' }}>
                                                <td style={{ padding: '12px' }}>{template.name}</td>
                                                <td style={{ padding: '12px' }}>{template.sent}</td>
                                                <td style={{ padding: '12px' }}><span style={{ color: '#ef4444' }}>{template.failed}</span></td>
                                                <td style={{ padding: '12px' }}><span style={{ color: '#f59e0b' }}>{template.pending}</span></td>
                                                <td style={{ padding: '12px' }}>
                                                    <button style={{
                                                        padding: '4px 8px',
                                                        fontSize: '11px',
                                                        border: 'none',
                                                        borderRadius: '4px',
                                                        background: '#27272a',
                                                        color: 'var(--accent)',
                                                        cursor: 'pointer'
                                                    }}>
                                                        Edit
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </>
                    );
                }

                // Tab 5: Smart Stack Module Controls
                if (currentTab === 'modules') {
                    const moveModule = (index, direction) => {
                        const newOrder = [...moduleOrder];
                        const newIndex = index + direction;
                        if (newIndex < 0 || newIndex >= newOrder.length) return;
                        [newOrder[index], newOrder[newIndex]] = [newOrder[newIndex], newOrder[index]];
                        setModuleOrder(newOrder);
                    };

                    const toggleModuleEnabled = (index) => {
                        const newOrder = [...moduleOrder];
                        newOrder[index] = { ...newOrder[index], enabled: !newOrder[index].enabled };
                        setModuleOrder(newOrder);
                    };

                    return (
                        <>
                            <div style={{ marginBottom: '12px', fontWeight: 700, color: 'var(--accent)' }}>Smart Stack Modules</div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '12px', marginBottom: '24px' }}>
                                {moduleOrder.sort((a, b) => (b.enabled ? 1 : 0) - (a.enabled ? 1 : 0)).map((mod, idx) => {
                                    const origIdx = moduleOrder.findIndex(m => m.id === mod.id);
                                    return (
                                        <Card key={mod.id} style={{ padding: '16px', cursor: 'pointer', background: mod.enabled ? '#18181b' : '#0f0f11', opacity: mod.enabled ? 1 : 0.6 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                                                <div style={{ fontWeight: 600, fontSize: '14px' }}>{mod.label}</div>
                                                <button
                                                    onClick={() => toggleModuleEnabled(origIdx)}
                                                    style={{ width: '28px', height: '28px', border: 'none', borderRadius: '6px', background: mod.enabled ? 'rgba(34, 197, 94, 0.15)' : 'rgba(239, 68, 68, 0.15)', color: mod.enabled ? '#22c55e' : '#ef4444', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                                                >{mod.enabled ? '✓' : '✕'}</button>
                                            </div>
                                            <div style={{ display: 'flex', gap: '4px', marginBottom: '12px' }}>
                                                <button onClick={() => moveModule(origIdx, -1)} disabled={origIdx === 0} style={{ flex: 1, padding: '6px', border: 'none', borderRadius: '4px', background: origIdx === 0 ? '#1a1a1f' : '#27272a', color: origIdx === 0 ? '#3f3f46' : 'var(--accent)', cursor: origIdx === 0 ? 'not-allowed' : 'pointer', fontSize: '12px' }}>▲ Up</button>
                                                <button onClick={() => moveModule(origIdx, 1)} disabled={origIdx === moduleOrder.length - 1} style={{ flex: 1, padding: '6px', border: 'none', borderRadius: '4px', background: origIdx === moduleOrder.length - 1 ? '#1a1a1f' : '#27272a', color: origIdx === moduleOrder.length - 1 ? '#3f3f46' : 'var(--accent)', cursor: origIdx === moduleOrder.length - 1 ? 'not-allowed' : 'pointer', fontSize: '12px' }}>Down ▼</button>
                                            </div>
                                            <button
                                                onClick={() => setActiveModule(mod.id)}
                                                style={{ width: '100%', padding: '8px', border: activeModule === mod.id ? '2px solid var(--accent)' : '1px solid #27272a', borderRadius: '6px', background: activeModule === mod.id ? 'rgba(var(--accent-rgb), 0.1)' : '#09090b', color: '#fafafa', cursor: 'pointer', fontWeight: activeModule === mod.id ? 600 : 400 }}
                                            >
                                                Settings
                                            </button>
                                        </Card>
                                    );
                                })}
                            </div>

                            <Card>
                                {activeModule === 'checkSpitter' && (
                                    <>
                                        <div style={{ fontWeight: 600, marginBottom: '12px' }}>Allocation Logic Settings</div>
                                        <Input
                                            label="Needs Ratio (%)"
                                            type="number"
                                            value={adminData.moduleSettings.checkSpitter.needsRatio}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    checkSpitter: { ...adminData.moduleSettings.checkSpitter, needsRatio: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                        <Input
                                            label="Wants Ratio (%)"
                                            type="number"
                                            value={adminData.moduleSettings.checkSpitter.wantsRatio}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    checkSpitter: { ...adminData.moduleSettings.checkSpitter, wantsRatio: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                        <Input
                                            label="Savings Ratio (%)"
                                            type="number"
                                            value={adminData.moduleSettings.checkSpitter.savingsRatio}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    checkSpitter: { ...adminData.moduleSettings.checkSpitter, savingsRatio: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                    </>
                                )}
                                {activeModule === 'billBoss' && (
                                    <>
                                        <div style={{ fontWeight: 600, marginBottom: '12px' }}>Bill Boss Settings</div>
                                        <Input
                                            label="Reminder Days Before Due"
                                            type="number"
                                            value={adminData.moduleSettings.billBoss.reminderDays}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    billBoss: { ...adminData.moduleSettings.billBoss, reminderDays: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                        <Input
                                            label="Overdue Grace Period (days)"
                                            type="number"
                                            value={adminData.moduleSettings.billBoss.overduePeriod}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    billBoss: { ...adminData.moduleSettings.billBoss, overduePeriod: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                        <div style={{ marginTop: '12px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <input type="checkbox" checked={adminData.moduleSettings.billBoss.autoPay}
                                                onChange={(e) => setAdminData({ ...adminData, moduleSettings: { ...adminData.moduleSettings, billBoss: { ...adminData.moduleSettings.billBoss, autoPay: e.target.checked } } })}
                                                style={{ width: '18px', height: '18px', cursor: 'pointer' }} />
                                            <label style={{ fontWeight: 500 }}>Enable Auto-Pay Rules</label>
                                        </div>
                                    </>
                                )}
                                {activeModule === 'stackCircle' && (
                                    <>
                                        <div style={{ fontWeight: 600, marginBottom: '12px' }}>Stack Circle Settings</div>
                                        <Input
                                            label="Max Group Size"
                                            type="number"
                                            value={adminData.moduleSettings.stackCircle.maxGroupSize}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    stackCircle: { ...adminData.moduleSettings.stackCircle, maxGroupSize: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                        <Input
                                            label="Min Contribution Amount"
                                            type="number"
                                            value={adminData.moduleSettings.stackCircle.minContribution}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    stackCircle: { ...adminData.moduleSettings.stackCircle, minContribution: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                        <Input
                                            label="Invite Expiry (days)"
                                            type="number"
                                            value={adminData.moduleSettings.stackCircle.inviteExpiry}
                                            onChange={(e) => setAdminData({
                                                ...adminData,
                                                moduleSettings: {
                                                    ...adminData.moduleSettings,
                                                    stackCircle: { ...adminData.moduleSettings.stackCircle, inviteExpiry: Number(e.target.value) }
                                                }
                                            })}
                                        />
                                    </>
                                )}
                                {activeModule === 'expenseCore' && (
                                    <>
                                        <div style={{ fontWeight: 600, marginBottom: '12px' }}>Expense Core Settings</div>
                                        <div style={{ marginBottom: '12px' }}>
                                            <div style={{ fontSize: '13px', fontWeight: 500, marginBottom: '8px' }}>Expense Categories</div>
                                            {(adminData.moduleSettings.expenseCore.categories || []).map((cat, ci) => (
                                                <div key={ci} style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                                                    <input type="text" value={cat} onChange={(e) => {
                                                        const newCats = [...adminData.moduleSettings.expenseCore.categories];
                                                        newCats[ci] = e.target.value;
                                                        setAdminData({ ...adminData, moduleSettings: { ...adminData.moduleSettings, expenseCore: { ...adminData.moduleSettings.expenseCore, categories: newCats } } });
                                                    }} style={{ flex: 1, background: '#09090b', border: '1px solid #27272a', borderRadius: '4px', padding: '6px 8px', color: '#fafafa', fontSize: '12px', fontFamily: 'inherit' }} />
                                                    <button onClick={() => {
                                                        const newCats = adminData.moduleSettings.expenseCore.categories.filter((_, i) => i !== ci);
                                                        setAdminData({ ...adminData, moduleSettings: { ...adminData.moduleSettings, expenseCore: { ...adminData.moduleSettings.expenseCore, categories: newCats } } });
                                                    }} style={{ width: '24px', height: '24px', border: 'none', borderRadius: '4px', background: 'rgba(239, 68, 68, 0.15)', color: '#ef4444', cursor: 'pointer', fontSize: '12px' }}>✕</button>
                                                </div>
                                            ))}
                                            <Button variant="ghost" size="sm" onClick={() => {
                                                const newCats = [...(adminData.moduleSettings.expenseCore.categories || []), 'New Category'];

                                                    fontSize: '11px',
                                                    fontWeight: 600,
                                                    background: enabled ? 'rgba(34, 197, 94, 0.15)' : 'rgba(239, 68, 68, 0.15)',
                                                    color: enabled ? '#22c55e' : '#ef4444',
                                                    border: `1px solid ${enabled ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)'}`
                                                }}>{key}: {enabled ? 'ON' : 'OFF'}</span>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        </div>
                    )}

                    {showConfirm && (
                        <Modal isOpen={showConfirm !== null} onClose={() => setShowConfirm(null)}>
                            <p style={{ marginBottom: '16px', color: 'rgba(250, 250, 250, 0.7)' }}>
                                Confirm this action
                            </p>
                            <div className="grid-2" style={{ gap: '8px' }}>
                                <Button variant="primary" onClick={() => setShowConfirm(null)}>Confirm</Button>
                                <Button variant="secondary" onClick={() => setShowConfirm(null)}>Cancel</Button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }

        // Main App
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(localStorage.getItem('orca_logged_in') === 'true');
            const [state, setStateLocal] = useState(getInitialState());
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [currentTab, setCurrentTab] = useState('budget');
            const isDesktop = useWindowWidth() >= 768;

            const setState = (newState) => {
                setStateLocal(newState);
                saveState(newState);
            };

            const onNavigate = (page, tab = null) => {
                setCurrentPage(page);
                if (tab) setCurrentTab(tab);
            };

            const onLogin = () => {
                localStorage.setItem('orca_logged_in', 'true');
                setIsLoggedIn(true);
            };

            const onLogout = () => {
                localStorage.setItem('orca_logged_in', 'false');
                setIsLoggedIn(false);
            };

            useEffect(() => {
                const theme = localStorage.getItem('orca_theme') || 'dark';
                document.body.classList.toggle('light', theme === 'light');
            }, []);

            useEffect(() => {
                const config = getAdminConfig();
                const root = document.documentElement;
                const presets = [
                    { id: 'midnight-gold', accent: '#d4a843', accentRgb: '212, 168, 67', font: 'Inter' },
                    { id: 'ocean-blue', accent: '#4a9eff', accentRgb: '74, 158, 255', font: 'Inter' },
                    { id: 'emerald', accent: '#10b981', accentRgb: '16, 185, 129', font: 'Inter' },
                    { id: 'royal-purple', accent: '#8b5cf6', accentRgb: '139, 92, 246', font: 'DM Sans' },
                    { id: 'sunset-orange', accent: '#f97316', accentRgb: '249, 115, 22', font: 'Inter' },
                    { id: 'rose', accent: '#f43f5e', accentRgb: '244, 63, 94', font: 'Inter' }
                ];
                const theme = presets.find(p => p.id === config.themeName) || presets[0];
                root.style.setProperty('--accent', config.accentColor || theme.accent);
                root.style.setProperty('--accent-rgb', theme.accentRgb);
                root.style.setProperty('--font-family', "'" + (config.fontFamily || theme.font) + "', sans-serif");
            }, []);

            if (!isLoggedIn) {
                return <AuthScreen onLogin={onLogin} />;
            }

            return (
                <div className="layout">
                    {isDesktop && (
                        <div className="sidebar show">
                            <div className="sidebar-logo" style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                {getAdminConfig().sidebarLogoUrl && (
                                    <img src={getAdminConfig().sidebarLogoUrl} alt="" style={{ width: '28px', height: '28px', borderRadius: '6px', objectFit: 'contain' }} />
                                )}
                                {getAdminConfig().appName}
                            </div>
                            {['dashboard', 'smart-stack', 'bill-boss', 'stack-circle', 'settings', 'admin'].map(item => (
                                <button
                                    key={item}
                                    className={`nav-item ${currentPage === item ? 'active' : ''}`}
                                    onClick={() => onNavigate(item)}
                                    style={{ border: 'none' }}
                                >
                                    {getAdminConfig().navLabels[item] || item}
                                </button>
                            ))}
                        </div>
                    )}

                    <div className={`main-container ${isDesktop ? 'desktop' : ''}`}>
                        <div className="top-bar">
                            <div className="top-bar-title">
                                {getAdminConfig().pageLabels[currentPage] || currentPage}
                            </div>
                            <div className="user-avatar">{getInitials(state.user.name)}</div>
                        </div>

                        {currentPage === 'dashboard' && <Dashboard state={state} onNavigate={onNavigate} />}
                        {currentPage === 'smart-stack' && <SmartStack state={state} setState={setState} onNavigate={onNavigate} />}
                        {currentPage === 'bill-boss' && <BillBoss state={state} setState={setState} />}
                        {currentPage === 'stack-circle' && <StackCircle state={state} setState={setState} />}
                        {currentPage === 'settings' && <Settings state={state} setState={setState} onLogout={onLogout} />}
                        {currentPage === 'admin' && <AdminPanel state={state} setState={setState} />}

                        {!isDesktop && (
                            <div className="bottom-nav">
                                <button className={`nav-btn ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => onNavigate('dashboard')}>
                                    <span>🏠</span>
                                    <span style={{ fontSize: '10px' }}>Home</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'smart-stack' ? 'active' : ''}`} onClick={() => onNavigate('smart-stack')}>
                                    <span>📊</span>
                                    <span style={{ fontSize: '10px' }}>Stack</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'bill-boss' ? 'active' : ''}`} onClick={() => onNavigate('bill-boss')}>
                                    <span>📄</span>
                                    <span style={{ fontSize: '10px' }}>Bills</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'stack-circle' ? 'active' : ''}`} onClick={() => onNavigate('stack-circle')}>
                                    <span>👥</span>
                                    <span style={{ fontSize: '10px' }}>Circle</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'settings' ? 'active' : ''}`} onClick={() => onNavigate('settings')}>
                                    <span>⚙️</span>
                                    <span style={{ fontSize: '10px' }}>Settings</span>
                                </button>
                                <button className={`nav-btn ${currentPage === 'admin' ? 'active' : ''}`} onClick={() => onNavigate('admin')}>
                                    <span>🔧</span>
                                    <span style={{ fontSize: '10px' }}>Admin</span>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

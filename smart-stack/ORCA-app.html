    // ============== SECURITY ==============
    const sanitize = (s) => { if(typeof s!=='string') return ''; return s.replace(/[&<>"'/]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#47;'}[c]||c)).substring(0,500); };
    const sanitizeNum = (v,min=-Infinity,max=Infinity) => { const n=parseFloat(v); if(isNaN(n))return 0; return Math.min(max,Math.max(min,n)); };

    // ============== SUPABASE CONFIG ==============
    // Replace these with your Supabase project credentials
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    // Initialize Supabase client (null if not configured)
    const supabase = (SUPABASE_URL !== 'YOUR_SUPABASE_URL' && typeof window.supabase !== 'undefined')
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;
    const isSupabaseConfigured = () => supabase !== null;

    // ============== LOCAL STORAGE PERSISTENCE ==============
    const STORAGE_KEY = 'orca_app_data';
    const STORAGE_THEME = 'orca_theme';
    const STORAGE_CONFIG = 'orca_admin_config';

    function saveToLocal(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.warn('localStorage save failed:', e); }
    }
    function loadFromLocal() {
      try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; }
    }
    function saveThemeLocal(isDark) {
      try { localStorage.setItem(STORAGE_THEME, isDark ? 'dark' : 'light'); } catch(e) {}
    }
    function loadThemeLocal() {
      try { return localStorage.getItem(STORAGE_THEME) !== 'light'; } catch(e) { return true; }
    }
    function saveConfigLocal(config) {
      try { localStorage.setItem(STORAGE_CONFIG, JSON.stringify(config)); } catch(e) {}
    }
    function loadConfigLocal() {
      try { const s = localStorage.getItem(STORAGE_CONFIG); return s ? JSON.parse(s) : null; } catch(e) { return null; }
    }

    // ============== CLOUD SYNC (Supabase) ==============
    // Offline-first: always saves locally first, then syncs to cloud
    async function syncToCloud(data, userId) {
      if (!isSupabaseConfigured() || !userId) return;
      try {
        // Upsert profile
        const { user, ...profileFields } = {
          name: data.user.name, email: data.user.email,
          pay_freq: data.user.payFreq, pay_cycle: data.user.payCycle,
          pay_rate: data.user.payRate, hours_per_day: data.user.hoursPerDay,
          next_pay: data.user.nextPay, credit_score: data.user.creditScore,
          utilization: data.user.utilization, on_time: data.user.onTime,
          acct_age: data.user.acctAge, inquiries: data.user.inquiries,
          total_debt: data.user.totalDebt, credit_limit: data.user.creditLimit,
          score_history: data.user.scoreHistory, split_mode: data.splitMode,
          onboarded: data.user.onboarded,
        };
        await supabase.from('profiles').update(profileFields).eq('id', userId);

        // Sync bills, income, expenses, goals — full replace strategy
        await supabase.from('bills').delete().eq('user_id', userId);
        if (data.bills.length > 0) {
          await supabase.from('bills').insert(data.bills.map(b => ({
            user_id: userId, name: b.name, amount: b.amount, cat: b.cat,
            due: b.due, freq: b.freq, status: b.status, alloc: b.alloc || [],
          })));
        }

        await supabase.from('income_sources').delete().eq('user_id', userId);
        if (data.income.length > 0) {
          await supabase.from('income_sources').insert(data.income.map(i => ({
            user_id: userId, name: i.name, amount: i.amount, freq: i.freq, active: i.active,
          })));
        }

        await supabase.from('expenses').delete().eq('user_id', userId);
        if (data.expenses.length > 0) {
          await supabase.from('expenses').insert(data.expenses.map(e => ({
            user_id: userId, name: e.name, amount: e.amount, cat: e.cat, date: e.date,
          })));
        }

        await supabase.from('savings_goals').delete().eq('user_id', userId);
        if (data.goals.length > 0) {
          await supabase.from('savings_goals').insert(data.goals.map(g => ({
            user_id: userId, name: g.name, target: g.target, current: g.current,
            date: g.date, c_type: g.cType, c_val: g.cVal, active: g.active,
          })));
        }

        // Update sync timestamp
        await supabase.from('sync_log').upsert({
          user_id: userId, client_type: 'html_app', last_sync: new Date().toISOString(),
        }, { onConflict: 'user_id,client_type' });

      } catch (e) { console.warn('Cloud sync failed (will retry):', e); }
    }

    async function loadFromCloud(userId) {
      if (!isSupabaseConfigured() || !userId) return null;
      try {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', userId).single();
        if (!profile) return null;
        const { data: income } = await supabase.from('income_sources').select('*').eq('user_id', userId);
        const { data: bills } = await supabase.from('bills').select('*').eq('user_id', userId);
        const { data: expenses } = await supabase.from('expenses').select('*').eq('user_id', userId);
        const { data: goals } = await supabase.from('savings_goals').select('*').eq('user_id', userId);
        const { data: notifs } = await supabase.from('notifications').select('*').eq('user_id', userId);
        const { data: rent } = await supabase.from('rent_entries').select('*').eq('user_id', userId);

        return {
          user: {
            name: profile.name, email: profile.email, onboarded: profile.onboarded,
            payFreq: profile.pay_freq, payCycle: profile.pay_cycle, payRate: profile.pay_rate,
            hoursPerDay: profile.hours_per_day, nextPay: profile.next_pay,
            creditScore: profile.credit_score, utilization: profile.utilization,
            onTime: profile.on_time, acctAge: profile.acct_age, inquiries: profile.inquiries,
            totalDebt: profile.total_debt, creditLimit: profile.credit_limit,
            scoreHistory: profile.score_history || [],
          },
          income: (income || []).map(i => ({ id: i.id, name: i.name, amount: i.amount, freq: i.freq, active: i.active })),
          bills: (bills || []).map(b => ({ id: b.id, name: b.name, amount: b.amount, cat: b.cat, due: b.due, freq: b.freq, status: b.status, alloc: b.alloc || [] })),
          expenses: (expenses || []).map(e => ({ id: e.id, name: e.name, amount: e.amount, cat: e.cat, date: e.date })),
          goals: (goals || []).map(g => ({ id: g.id, name: g.name, target: g.target, current: g.current, date: g.date, cType: g.c_type, cVal: g.c_val, active: g.active })),
          splitMode: profile.split_mode || 'equal',
          notifs: (notifs || []).map(n => ({ id: n.id, type: n.type, title: n.title, body: n.body, read: n.read })),
          groups: [], // Groups loaded separately
          rent: (rent || []).map(r => ({ id: r.id, month: r.month, amount: r.amount, status: r.status, reported: r.reported, rDate: r.r_date })),
          plaid: null,
          roommates: { enabled: false, totalRent: 0, utilities: [], members: [], history: [] },
        };
      } catch (e) { console.warn('Cloud load failed:', e); return null; }
    }

    // Merge Plaid data into app data
    function mergePlaidData(appData, plaidData) {
      if(!plaidData || !plaidData.accounts) return appData;

      const checking = plaidData.accounts.filter(a=>a.subtype==='checking');
      const savings = plaidData.accounts.filter(a=>a.subtype==='savings');
      const credit = plaidData.accounts.filter(a=>a.subtype==='credit card');

      // Build real income from deposit transactions
      const deposits = plaidData.transactions.filter(tx=>tx.amount<0 && tx.category==='Payroll');
      const incomeItems = deposits.length>0 ? [{
        id:gid(), name:plaidData.income.employer||'Direct Deposit',
        amount:plaidData.income.lastAmount, freq:plaidData.income.frequency, active:true
      }] : appData.income;

      // Build real expenses from non-payroll, non-transfer transactions
      const realExpenses = plaidData.transactions
        .filter(tx=>tx.amount>0 && tx.category!=='Transfer' && tx.category!=='Payroll')
        .slice(0,10)
        .map(tx=>({id:gid(), name:tx.name, amount:tx.amount, cat:tx.category, date:tx.date}));

      // Update savings goals with real balances
      const updatedGoals = appData.goals.map((g,i)=>{
        const savAcct = savings[i];
        if(savAcct) return {...g, current: savAcct.balances.current, plaidAccountId: savAcct.id};
        return g;
      });

      // Update credit info from credit accounts
      const totalCreditUsed = credit.reduce((s,a)=>s+(a.balances.current||0),0);
      const totalCreditLimit = credit.reduce((s,a)=>s+(a.balances.limit||0),0);
      const utilization = totalCreditLimit>0 ? Math.round((totalCreditUsed/totalCreditLimit)*100) : appData.user.utilization;

      return {
        ...appData,
        income: incomeItems,
        expenses: realExpenses.length>0 ? realExpenses : appData.expenses,
        goals: updatedGoals,
        user: {
          ...appData.user,
          nextPay: plaidData.income.nextDate || appData.user.nextPay,
          payFreq: plaidData.income.frequency || appData.user.payFreq,
          utilization,
          totalDebt: totalCreditUsed || appData.user.totalDebt,
          creditLimit: totalCreditLimit || appData.user.creditLimit,
        },
        plaid: {
          connected: true,
          accounts: plaidData.accounts,
          lastSync: today(),
          checkingBalance: checking.reduce((s,a)=>s+(a.balances.available||0),0),
          savingsBalance: savings.reduce((s,a)=>s+(a.balances.available||0),0),
          creditUsed: totalCreditUsed,
          creditLimit: totalCreditLimit,
        },
      };
    }

    // ============== DONUT CHART ==============
    function DonutChart({slices,size=200,hole=60}) {
      const r=size/2,ir=hole/2*r/50; let cum=0;
      const paths=slices.map((s,i)=>{
        const a=s.pct/100*360; const start=cum; cum+=a;
        const s1=(start-90)*Math.PI/180, s2=((start+a)-90)*Math.PI/180;
        const x1=r+r*0.9*Math.cos(s1), y1=r+r*0.9*Math.sin(s1);
        const x2=r+r*0.9*Math.cos(s2), y2=r+r*0.9*Math.sin(s2);
        const ix1=r+ir*Math.cos(s2), iy1=r+ir*Math.sin(s2);
        const ix2=r+ir*Math.cos(s1), iy2=r+ir*Math.sin(s1);
        const lg=a>180?1:0;
        return <path key={i} d={`M${x1},${y1} A${r*0.9},${r*0.9} 0 ${lg} 1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${lg} 0 ${ix2},${iy2} Z`} fill={s.color} stroke="#0a0a0a" strokeWidth="2"/>;
      });
      return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="Paycheck breakdown chart">{paths}</svg>;
    }

      const t=useContext(TC);

      const [password, setPassword] = useState('');

      const [confirmPass, setConfirmPass] = useState('');

      const [sbLoading, setSbLoading] = useState(false);

      const storedHash = useMemo(()=>{
        try { return localStorage.getItem('orca_pass'); } catch(e) { return null; }
      },[]);
      const storedOAuth = useMemo(()=>{
        try { return JSON.parse(localStorage.getItem('orca_oauth')||'null'); } catch(e) { return null; }
      },[]);
      const hasAccount = !!storedHash || !!storedOAuth;
      const useSupabase = isSupabaseConfigured();

      const hashPass = (s) => {
        let h=0;
        for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
        return 'orca_'+Math.abs(h).toString(36);
      };

      const handlePasswordLogin = () => {
        if(!password){setError('Enter your password');return;}
        if(hashPass(password)===storedHash){setError('');onLogin();}
        else{setError('Incorrect password');}
      };

      const handleCreate = () => {
        if(!newPass||newPass.length<4){setError('Password must be at least 4 characters');return;}
        if(newPass!==confirmPass){setError('Passwords do not match');return;}
        try{localStorage.setItem('orca_pass',hashPass(newPass));}catch(e){}
        setError('');

      };

      // ====== SUPABASE AUTH ======
      const handleSupabaseLogin = async () => {
        if(!sbEmail||!sbPass){setError('Enter email and password');return;}
        setSbLoading(true); setError('');
        const { data, error: err } = await supabase.auth.signInWithPassword({ email: sbEmail, password: sbPass });
        setSbLoading(false);
        if(err){setError(err.message);return;}
        if(data.user) onSupabaseLogin(data.user);
      };

      const handleSupabaseSignup = async () => {
        if(!sbEmail||!sbPass){setError('Enter email and password');return;}
        if(sbPass.length<6){setError('Password must be at least 6 characters');return;}
        setSbLoading(true); setError('');
        const { data, error: err } = await supabase.auth.signUp({ email: sbEmail, password: sbPass });
        setSbLoading(false);
        if(err){setError(err.message);return;}
        if(data.user) onSupabaseLogin(data.user);

      const handleSupabaseOAuth = async (provider) => {
        setOauthProvider(provider); setMode('oauth-loading');

        if(err){setError(err.message);setMode('main');}

        {id:'apple',name:'Apple',icon:'\uD83C\uDF4E',color:'#000000',
          authUrl:'https://appleid.apple.com/auth/authorize',
          scopes:'openid name email'},
        {id:'microsoft',name:'Microsoft',icon:'\u2B1B',color:'#00A4EF',
          authUrl:'https://login.microsoftonline.com/common/oauth2/v2.0/authorize',
          scopes:'openid profile email'},
      ];

      const initiateOAuth = (provider) => {
        setOauthProvider(provider.name);
        setMode('oauth-loading');
        setError('');

        // OAuth 2.0 Authorization Code Flow with PKCE
        // 1. Generate code_verifier + code_challenge (PKCE)
        // 2. Build authorization URL with: response_type=code, client_id, redirect_uri,
        //    scope (openid profile email), state (CSRF), code_challenge, code_challenge_method=S256
        // 3. Redirect user to provider's authorization endpoint
        // 4. Provider authenticates user, returns authorization code to redirect_uri
        // 5. Exchange code for tokens (id_token + access_token) at token endpoint
        // 6. Validate id_token (JWT) — verify signature, issuer, audience, expiry, nonce
        // 7. Extract user claims (sub, email, name) from id_token

        // Demo simulation — in production, this would be a real redirect flow
        const oauthState = Math.random().toString(36).substring(2);
        const codeVerifier = Math.random().toString(36).substring(2)+Math.random().toString(36).substring(2);

        setTimeout(()=>{
          // Simulate successful OIDC token response
          const simulatedIdToken = {
            iss: provider.authUrl,
            sub: 'orca_user_'+Math.random().toString(36).substring(2,8),
            email: 'user@example.com',
            name: 'ORCA User',
            aud: 'orca-financial-app',
            exp: Math.floor(Date.now()/1000)+3600,
            iat: Math.floor(Date.now()/1000),
            nonce: oauthState,
            provider: provider.id,
          };
          try{
            localStorage.setItem('orca_oauth', JSON.stringify({
              provider: provider.id,
              sub: simulatedIdToken.sub,
              email: simulatedIdToken.email,
              name: simulatedIdToken.name,
              exp: simulatedIdToken.exp,
              authTime: Date.now(),
            }));
          }catch(e){}
          onLogin();
        }, 1500);

      const inputStyle = {width:'100%',padding:'14px 18px',borderRadius:14,border:`1.5px solid ${t.border}`,fontSize:16,background:t.input,color:t.text,outline:'none',fontFamily:'inherit',boxSizing:'border-box',textAlign:'center'};

        <button onClick={()=>initiateOAuth(provider)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'13px 20px',borderRadius:14,border:`1.5px solid ${t.border}`,background:t.card,cursor:'pointer',marginBottom:8,transition:'all 0.2s',fontFamily:'inherit'}}

    // --- SMART STACK (Budget / Check Splitter / Savings / Credit) ---
    function SmartStackScreen({data,setData,subTab,setSubTab}) {
      const t=useContext(TC);
      const tabs=['budget','savings','credit'];
      const labels=['Budget','Savings','Credit'];

      return <div style={{padding:'0 0 100px'}}>
        <div role="tablist" style={{display:'flex',gap:0,background:t.bgS,borderBottom:`1px solid ${t.border}`,position:'sticky',top:56,zIndex:50}}>
          {tabs.map((tb,i)=><button role="tab" aria-selected={subTab===tb} key={tb} onClick={()=>setSubTab(tb)} style={{flex:1,padding:'12px 0',background:'none',border:'none',borderBottom:subTab===tb?`3px solid ${t.gold}`:'3px solid transparent',color:subTab===tb?t.gold:t.textM,fontWeight:700,fontSize:11,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>{labels[i]}</button>)}
        </div>
        <div role="tabpanel" style={{padding:'16px 20px'}}>
          {subTab==='budget'&&<BudgetSub data={data} setData={setData}/>}
          {subTab==='savings'&&<SavingsSub data={data} setData={setData}/>}
          {subTab==='credit'&&<CreditSub data={data}/>}
        </div>
      </div>;
    }

    function BudgetSub({data,setData}) {
      const t=useContext(TC);
      const alloc=useMemo(()=>calcAlloc(data.income,data.bills,data.goals,data.splitMode),[data]);

      // ======= CHECK SPLITTER (reactive to user data) =======
      const paycheck = getPaycheckAmount(data.user, data.income);

      // Build slices from actual user data: bills, savings, spending (NO Free Cash, NO donut)
      const COLORS = ['#d4a843','#f87171','#fb923c','#fbbf24','#4ade80','#60a5fa','#a78bfa','#e879f9','#34d399','#f97316','#06b6d4','#ec4899'];
      const splitterSlices = useMemo(()=>{
        const slices=[];
        let ci=0;

        data.bills.filter(b=>b.status!=='paid').forEach(b=>{
          const m={weekly:52,biweekly:26,semimonthly:24,monthly:12};
          const paychecksPerYear = m[data.user.payFreq]||26;
          const perPaycheck = (b.amount * 12) / paychecksPerYear;
          const p = paycheck>0 ? Math.round((perPaycheck/paycheck)*1000)/10 : 0;
          slices.push({name:b.name,amount:perPaycheck,pct:p,color:COLORS[ci%COLORS.length],type:'bill'});
          ci++;
        });

        data.goals.filter(g=>g.active!==false).forEach(g=>{
          const weeklyAmt = g.cType==='fixed' ? (g.cVal||0) : (alloc.inc*(g.cVal||0)/100);
          const m2={weekly:1,biweekly:2,semimonthly:52/24,monthly:52/12};
          const perPaycheck = weeklyAmt * (m2[data.user.payFreq]||2);
          const p = paycheck>0 ? Math.round((perPaycheck/paycheck)*1000)/10 : 0;
          slices.push({name:g.name,amount:perPaycheck,pct:p,color:COLORS[ci%COLORS.length],type:'savings'});
          ci++;
        });

        const totalSpending = data.expenses.reduce((s,e)=>s+e.amount,0);
        if(totalSpending>0){
          const p = paycheck>0 ? Math.round((totalSpending/paycheck)*1000)/10 : 0;
          slices.push({name:'Spending',amount:totalSpending,pct:p,color:COLORS[ci%COLORS.length],type:'spending'});
        }

        // Normalize percentages
        const totalPct = slices.reduce((s,x)=>s+x.pct,0);
        if(totalPct>0 && totalPct!==100){
          slices.forEach(s=>{ s.pct=Math.round((s.pct/totalPct)*1000)/10; });
        }
        return slices;
      },[data.bills,data.goals,data.expenses,data.income,data.user.payFreq,paycheck,alloc.inc]);

      const typeIcons = {bill:'\uD83D\uDCC4',savings:'\uD83C\uDFAF',spending:'\uD83D\uDED2'};
      const typeLabels = {bill:'Bill',savings:'Goal',spending:'Expenses'};

      // ======= INCOME / EXPENSE RATIO =======
      const totalAllocated = splitterSlices.reduce((s,x)=>s+x.amount,0);
      const ratio = paycheck>0 ? Math.round((totalAllocated/paycheck)*100) : 0;
      const surplus = paycheck - totalAllocated;
      const ratioColor = ratio<=70 ? t.ok : ratio<=90 ? t.warn : t.bad;
      const ratioLabel = ratio<=70 ? 'Healthy' : ratio<=90 ? 'Tight' : 'Over Budget';

      // ======= CHECK PROJECTION CALENDAR =======
      const [projFreq, setProjFreq] = useState(data.user.payFreq||'biweekly');
      const [hrRate, setHrRate] = useState(data.user.payRate||'');
      const [locked, setLocked] = useState(false);
      const [editingHoursDay, setEditingHoursDay] = useState(null); // date string of day being hour-edited

      const hourlyRate = parseFloat(hrRate)||0;
      const defaultHrsPerDay = parseFloat(data.user.hoursPerDay)||8;

      const workDaysPerPay = {weekly:5,biweekly:10,semimonthly:11,monthly:22};
      const totalWorkDays = workDaysPerPay[projFreq]||10;

      // Build calendar days for the current pay period
      const calendarDays = useMemo(()=>{
        const nextPay = data.user.nextPay || today();
        const gap = {weekly:7,biweekly:14,semimonthly:15,monthly:30}[projFreq]||14;
        const startDate = addD(nextPay, -gap);
        const days = [];
        for(let i=0; i<gap; i++){
          const d = addD(startDate, i);
          const dt = new Date(d+'T00:00:00');
          const dow = dt.getDay();
          const isWeekend = dow===0||dow===6;
          days.push({date:d, dayName:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow], dayNum:dt.getDate(), isWeekend, month:dt.toLocaleDateString('en-US',{month:'short'})});
        }
        return days;
      },[data.user.nextPay,projFreq]);

      // Track day status: 'off' or number of hours (e.g. 8, 4, 6)
      const [dayHours, setDayHours] = useState(()=>{
        const s={};
        calendarDays.forEach(d=>{ s[d.date] = d.isWeekend ? 0 : defaultHrsPerDay; });
        return s;
      });

      useEffect(()=>{
        const s={};
        calendarDays.forEach(d=>{ s[d.date] = d.isWeekend ? 0 : defaultHrsPerDay; });
        setDayHours(s);
        setLocked(false);
        setEditingHoursDay(null);
      },[data.user.nextPay,projFreq]);

      const toggleDay = (date) => {
        if(locked) return;
        setDayHours(prev=>{
          const cur = prev[date]||0;
          return {...prev, [date]: cur>0 ? 0 : defaultHrsPerDay};
        });
      };

      const setDayHourVal = (date, val) => {
        const h = Math.max(0, Math.min(24, parseFloat(val)||0));
        setDayHours(prev=>({...prev, [date]: h}));
      };

      const daysWorked = Object.values(dayHours).filter(v=>v>0).length;
      const totalHoursWorked = Object.values(dayHours).reduce((s,v)=>s+(v||0),0);
      const daysOff = Object.values(dayHours).filter(v=>v===0).length - calendarDays.filter(d=>d.isWeekend).length;

      // === PROJECTED CHECK: total hours × hourly rate ===
      const projectedCheck = useMemo(()=>{
        if(hourlyRate>0){
          return totalHoursWorked * hourlyRate;
        }
        // Salary fallback
        const dailyRate = paycheck / totalWorkDays;
        return daysWorked * dailyRate;
      },[hourlyRate,totalHoursWorked,daysWorked,paycheck,totalWorkDays]);

      // Base check (normal full period)
      const baseCheck = useMemo(()=>{
        if(hourlyRate>0){
          return totalWorkDays * defaultHrsPerDay * hourlyRate;
        }
        return paycheck;
      },[hourlyRate,defaultHrsPerDay,totalWorkDays,paycheck]);

      const projDiff = projectedCheck - baseCheck;

      // Lock in: save inputs to data and freeze calendar
      const lockIn = () => {
        setLocked(true);
        setEditingHoursDay(null);
        setData({...data, user:{...data.user, payRate:hrRate, payFreq:projFreq}});
      };
      const unlock = () => { setLocked(false); };

      // ======= PAYCHECK HISTORY (linked to projected amounts) =======
      const paycheckHistory = useMemo(()=>{
        const nextPay = data.user.nextPay || today();
        const daysBetween = {weekly:7,biweekly:14,semimonthly:15,monthly:30};
        const gap = daysBetween[projFreq]||14;
        const history = [];
        // 4 past checks (use base check as historical)
        for(let i=4;i>=1;i--){
          const d = addD(nextPay, -gap*i);
          history.push({date:d, amount:baseCheck, status:'paid'});
        }
        // Next check uses projected (reflects off days, extra hours, etc.)
        history.push({date:nextPay, amount:projectedCheck, status:'next'});
        // 3 future checks use base (assumes normal schedule)
        for(let i=1;i<=3;i++){
          history.push({date:addD(nextPay, gap*i), amount:baseCheck, status:'upcoming'});
        }
        return history;
      },[data.user.nextPay,projFreq,baseCheck,projectedCheck]);

      return <>
        <Card style={{background:t.goldBg,border:`1px solid ${t.gold}30`,marginBottom:16,textAlign:'center',padding:20}}>
          <div style={{fontSize:13,color:t.textM}}>Weekly Safe to Spend</div>
          <div style={{fontSize:36,fontWeight:900,color:t.gold}}>{fmt(alloc.sts)}</div>
          <div style={{fontSize:13,color:t.textM}}>~{fmt(alloc.daily)}/day</div>
        </Card>

        {/* Income / Expense Ratio */}
        <Card style={{marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:t.text}}>Income / Expense Ratio</span>
            <Badge color={ratioColor}>{ratioLabel}</Badge>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:13,color:t.textM}}>Paycheck</span>
            <span style={{fontSize:13,fontWeight:700,color:t.ok}}>{fmt(paycheck)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:13,color:t.textM}}>Allocated (Bills + Savings + Spending)</span>
            <span style={{fontSize:13,fontWeight:700,color:t.bad}}>{fmt(totalAllocated)}</span>
          </div>
          <div style={{background:t.bgS,borderRadius:6,height:10,overflow:'hidden',marginBottom:8}}>
            <div style={{width:`${Math.min(ratio,100)}%`,height:'100%',borderRadius:6,background:ratioColor,transition:'width 0.4s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:14,fontWeight:700,color:surplus>=0?t.ok:t.bad}}>{surplus>=0?'Remaining:':'Deficit:'} {fmt(Math.abs(surplus))}</span>
            <span style={{fontSize:14,fontWeight:800,color:ratioColor}}>{ratio}% used</span>
          </div>
        </Card>


        {/* ===== CHECK PROJECTION CALENDAR ===== */}
        <Hdr title="Check Projection" sub={locked?"Locked in — tap Edit to adjust":"Tap days to toggle work/off, then Lock In"}/>
        <Card style={{marginBottom:16}}>
          {/* Pay Frequency Toggle */}
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            {['weekly','biweekly'].map(f=><button key={f} onClick={()=>{if(!locked)setProjFreq(f);}}
              style={{flex:1,padding:'8px 0',borderRadius:8,border:`1.5px solid ${projFreq===f?t.gold:t.border}`,background:projFreq===f?t.goldBg:'transparent',
                color:projFreq===f?t.gold:t.textM,fontWeight:700,fontSize:12,cursor:locked?'not-allowed':'pointer',fontFamily:'inherit',opacity:locked?0.6:1}}>
              {f==='weekly'?'Weekly':'Bi-Weekly'}
            </button>)}
          </div>

          {/* Hourly Rate + Total Hours */}
          <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
            <div style={{flex:1}}>
              <label style={{fontSize:10,color:t.textM,fontWeight:700,display:'block',marginBottom:3}}>Hourly Rate ($)</label>
              <input type="number" value={hrRate} onChange={e=>{if(!locked)setHrRate(e.target.value);}} placeholder="0.00" onKeyDown={e=>{if(e.key==='Enter')lockIn();}}
                style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${t.border}`,background:t.bgS,color:t.text,fontSize:14,fontWeight:700,fontFamily:'inherit',outline:'none',boxSizing:'border-box',opacity:locked?0.6:1}}
                disabled={locked} />
            </div>
            <div style={{padding:'8px 14px',borderRadius:8,background:t.goldBg,border:`1px solid ${t.gold}30`,textAlign:'center',minWidth:80}}>
              <div style={{fontSize:20,fontWeight:900,color:t.gold}}>{totalHoursWorked}</div>
              <div style={{fontSize:9,color:t.textM,fontWeight:700}}>Total Hours</div>
            </div>
          </div>

    // --- CREDIT (moved from Settings to Smart Stack) ---
    function CreditSub({data}) {
      const t=useContext(TC);
      const {creditScore:cs,utilization:ut,onTime:ot,inquiries:iq}=data.user;
      const range=CREDIT_RANGES.find(r=>cs>=r.min&&cs<=r.max)||CREDIT_RANGES[4];
      const hist=data.user.scoreHistory||[];

      // Score Simulator
      const [simUt,setSimUt]=useState(ut);
      const [simOt,setSimOt]=useState(ot);
      const simScore = useMemo(()=>{
        let s=cs;
        if(simUt<ut) s+=Math.round((ut-simUt)*0.8);
        if(simUt>ut) s-=Math.round((simUt-ut)*0.6);
        if(simOt>ot) s+=Math.round((simOt-ot)*1.5);
        if(simOt<ot) s-=Math.round((ot-simOt)*2);
        return Math.max(300,Math.min(850,s));
      },[simUt,simOt,cs,ut,ot]);

      // SVG Line Chart
      const chartW=320, chartH=120, pad=30;
      const maxS=Math.max(...hist.map(h=>h.s),700), minS=Math.min(...hist.map(h=>h.s),550);
      const pts=hist.map((h,i)=>{
        const x=pad+i*(chartW-2*pad)/(hist.length-1||1);
        const y=chartH-pad-(h.s-minS)/(maxS-minS||1)*(chartH-2*pad);
        return {x,y,s:h.s,m:h.m};
      });

      const insights=[
        {p:1,type:ut>30?'bad':'ok',icon:'\uD83D\uDCB3',title:'Credit Utilization',msg:ut>30?`High (${ut}%). Aim for under 30%.`:`Great (${ut}%). Under 10% is ideal.`},
        {p:1,type:ot<95?'bad':'ok',icon:'\uD83D\uDCC5',title:'Payment History',msg:ot<95?`${ot}% on-time. Set up autopay.`:`Excellent (${ot}%)!`},
        {p:2,type:'info',icon:'\uD83C\uDFE0',title:'Rent Reporting',msg:data.rent.filter(r=>r.reported).length>0?'Rent being reported. Update coming soon.':'Start reporting rent for +20-40 pts.'},
        {p:3,type:iq>2?'warn':'ok',icon:'\uD83D\uDD0D',title:'Hard Inquiries',msg:iq>2?`${iq} inquiries. Avoid new apps 6mo.`:`${iq} inquiries. Good.`},
        {p:2,type:'info',icon:'\uD83D\uDCA1',title:'AI Tip: Debt Snowball',msg:'Pay minimums on all debts, extra at smallest.'},
        {p:3,type:'info',icon:'\uD83D\uDCCA',title:'AI Tip: 50/30/20 Rule',msg:'50% needs, 30% wants, 20% savings.'},
      ].sort((a,b)=>a.p-b.p);

      const bgM={bad:t.badBg,warn:t.warnBg,ok:t.okBg,info:t.goldBg};
      const cM={bad:t.bad,warn:t.warn,ok:t.ok,info:t.gold};

      return <>
        <Card style={{marginBottom:16,textAlign:'center',padding:20,background:`${range.c}15`,border:`1px solid ${range.c}40`}}>
          <div style={{fontSize:48,fontWeight:900,color:range.c}}>{cs}</div>
          <div style={{fontSize:16,fontWeight:700,color:range.c}}>{range.l}</div>
          <PBar val={cs-300} max={550} color={range.c} style={{marginTop:12}}/>
        </Card>

        {/* Score History */}
        {hist.length>1&&<Card style={{marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Score History</div>
          <svg width={chartW} height={chartH} viewBox={`0 0 ${chartW} ${chartH}`} role="img" aria-label="Credit score history chart">
            <polyline fill="none" stroke={t.gold} strokeWidth="2.5" points={pts.map(p=>`${p.x},${p.y}`).join(' ')}/>
            {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="4" fill={t.gold}/><text x={p.x} y={p.y-10} textAnchor="middle" fontSize="10" fill={t.textS}>{p.s}</text><text x={p.x} y={chartH-5} textAnchor="middle" fontSize="9" fill={t.textM}>{p.m}</text></g>)}
          </svg>
        </Card>}

        <Hdr title="Credit Factors"/>
        {[{l:'Payment History',v:ot,mx:100,w:'35%',c:ot>=95?t.ok:t.warn},{l:'Utilization',v:ut,mx:100,w:'30%',c:ut<=30?t.ok:ut<=50?t.warn:t.bad},{l:'Account Age',v:data.user.acctAge,mx:30,w:'15%',c:data.user.acctAge>=5?t.ok:t.warn},{l:'Credit Mix',v:40,mx:100,w:'10%',c:t.ok},{l:'Inquiries',v:Math.max(0,10-iq),mx:10,w:'10%',c:iq<=2?t.ok:t.warn}].map((f,i)=>
          <Card key={i} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <div><div style={{fontSize:13,fontWeight:600,color:t.text}}>{f.l}</div><div style={{fontSize:11,color:t.textM}}>Weight: {f.w}</div></div>
              <div style={{fontSize:14,fontWeight:700,color:f.c}}>{Math.round(f.v)}/{Math.round(f.mx)}</div>
            </div>
            <PBar val={f.v} max={f.mx} color={f.c}/>
          </Card>
        )}

        {/* Score Simulator */}
        <Hdr title="Score Simulator"/>
        <Card style={{marginBottom:16}}>
          <div style={{textAlign:'center',marginBottom:12}}>
            <div style={{fontSize:11,color:t.textM}}>Simulated Score</div>
            <div style={{fontSize:32,fontWeight:900,color:simScore>cs?t.ok:simScore<cs?t.bad:t.gold}}>{simScore}</div>
            {simScore!==cs&&<div style={{fontSize:12,color:simScore>cs?t.ok:t.bad}}>{simScore>cs?'+':''}{simScore-cs} pts</div>}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:t.textS}}><span>Utilization</span><span>{simUt}%</span></div>
            <input type="range" min="0" max="100" value={simUt} onChange={e=>setSimUt(parseInt(e.target.value))} aria-label="Simulated utilization" style={{width:'100%',accentColor:t.gold}}/>
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:t.textS}}><span>On-Time Payments</span><span>{simOt}%</span></div>
            <input type="range" min="0" max="100" value={simOt} onChange={e=>setSimOt(parseInt(e.target.value))} aria-label="Simulated on-time payments" style={{width:'100%',accentColor:t.gold}}/>
          </div>
        </Card>

        <Hdr title="AI Insights &amp; Tips"/>
        {insights.map((ins,i)=><Card key={i} style={{marginBottom:10,background:bgM[ins.type],border:`1px solid ${cM[ins.type]}30`}}>
          <div style={{display:'flex',gap:10}}>
            <span style={{fontSize:18}}>{ins.icon}</span>
            <div><div style={{fontSize:13,fontWeight:700,color:cM[ins.type]}}>{ins.title}</div><div style={{fontSize:12,color:cM[ins.type],marginTop:3,opacity:0.9}}>{ins.msg}</div></div>
          </div>
        </Card>)}
      </>;
    }

    // --- BILL BOSS ---
    function BillBossScreen({data,setData}) {
      const t=useContext(TC);
      const [showAdd,setShowAdd]=useState(false);
      const [nb,setNb]=useState({name:'',amount:'',cat:BILL_CATS[0],due:today(),customCat:''});
      const [allocModal,setAllocModal]=useState(null);
      const [allocParts,setAllocParts]=useState(2);

      const totalBills=data.bills.reduce((s,b)=>s+b.amount,0);
      // For bills with split payments, deduct any paid split amounts from the unpaid total
      const unpaidTotal=data.bills.filter(b=>b.status!=='paid').reduce((s,b)=>{
        if(b.alloc&&b.alloc.length>0){
          return s + b.alloc.filter(a=>!a.paid).reduce((ps,a)=>ps+a.amount,0);
        }
        return s+b.amount;
      },0);
      const paidTotal=data.bills.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0)
        + data.bills.filter(b=>b.status!=='paid').reduce((s,b)=>{
          if(b.alloc&&b.alloc.length>0) return s+b.alloc.filter(a=>a.paid).reduce((ps,a)=>ps+a.amount,0);
          return s;
        },0);
      const upcoming=data.bills.filter(b=>b.status!=='paid').sort((a,b)=>daysTo(a.due)-daysTo(b.due));
      const paid=data.bills.filter(b=>b.status==='paid');

      const addBill=()=>{
        if(nb.name&&nb.amount){
          const cat=nb.cat==='Other'&&nb.customCat?nb.customCat:nb.cat;
          setData({...data,bills:[...data.bills,{id:gid(),name:sanitize(nb.name),amount:sanitizeNum(nb.amount,0),cat,due:nb.due,freq:'monthly',status:'upcoming',alloc:[]}]});
          setNb({name:'',amount:'',cat:BILL_CATS[0],due:today(),customCat:''});setShowAdd(false);
        }
      };
      const rmBill=id=>setData({...data,bills:data.bills.filter(b=>b.id!==id)});
      const payBill=id=>setData({...data,bills:data.bills.map(b=>b.id===id?{...b,status:'paid'}:b)});
      const revert=id=>setData({...data,bills:data.bills.map(b=>b.id===id?{...b,status:'upcoming',alloc:b.alloc?.map(a=>({...a,paid:false}))||[]}:b)});
      const splitBill=(id)=>{
        const bill=data.bills.find(b=>b.id===id);
        if(!bill)return;
        const parts=[];
        const each=Math.round((bill.amount/allocParts)*100)/100;
        for(let i=0;i<allocParts;i++){
          parts.push({id:gid(),date:addD(bill.due,i*7),amount:i===allocParts-1?Math.round((bill.amount-each*(allocParts-1))*100)/100:each,paid:false});
        }
        setData({...data,bills:data.bills.map(b=>b.id===id?{...b,alloc:parts}:b)});
        setAllocModal(null);
      };
      // Pay a single split payment by its index — deduct from bill amount shown, keep remaining schedule
      const paySplitPayment=(billId,partIdx)=>{
        setData({...data,bills:data.bills.map(b=>{
          if(b.id!==billId)return b;
          const newAlloc=b.alloc.map((a,i)=>i===partIdx?{...a,paid:true}:a);
          // If ALL split payments are paid, mark the whole bill as paid
          const allPaid = newAlloc.every(a=>a.paid);
          return {...b, alloc:newAlloc, status:allPaid?'paid':'upcoming'};
        })});
      };

      const rentBill=data.bills.find(b=>b.cat==='Rent/Mortgage');
      const reportRent=()=>{
        const t2=today();
        if(!data.rent.find(r=>r.month===t2)){
          setData({...data,rent:[...data.rent,{id:gid(),month:t2,amount:rentBill?.amount||0,status:'paid',reported:true,rDate:t2}]});
        }
      };

      return <div style={{padding:'16px 20px',paddingBottom:100}}>
        <Card style={{background:`linear-gradient(135deg, ${t.gold}, ${t.goldD})`,color:'#000',padding:24,marginBottom:16,textAlign:'center'}}>
          <div style={{fontSize:13,opacity:0.9}}>Total Monthly Bills</div>
          <div style={{fontSize:40,fontWeight:900}}>{fmt(unpaidTotal)}</div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,opacity:0.8}}>Paid</div>
            <div style={{fontSize:20,fontWeight:700}}>{fmt(paidTotal)}</div>
          </div>
        </Card>

        <Btn onClick={()=>setShowAdd(!showAdd)} full style={{marginBottom:16}}>{showAdd?'Cancel':'+ Add Bill'}</Btn>

        {showAdd&&<Card style={{marginBottom:16}}>
          <Inp label="Bill Name" value={nb.name} onChange={v=>setNb({...nb,name:v})} ph="e.g. Rent"/>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Inp label="Amount" value={nb.amount} onChange={v=>setNb({...nb,amount:v})} type="number" pre="$"/></div>
            <div style={{flex:1}}><Inp label="Due Date" value={nb.due} onChange={v=>setNb({...nb,due:v})} type="date"/></div>
          </div>
          <Sel label="Category" value={nb.cat} onChange={v=>setNb({...nb,cat:v})} opts={BILL_CATS}/>
          {nb.cat==='Other'&&<Inp label="Custom Category" value={nb.customCat} onChange={v=>setNb({...nb,customCat:v})} ph="Enter category"/>}
          <Btn onClick={addBill} full>Save Bill</Btn>
        </Card>}

        <Hdr title="Upcoming Bills"/>
        {upcoming.map(b=><Card key={b.id} style={{marginBottom:10,padding:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div><div style={{fontSize:14,fontWeight:600,color:t.text}}>{b.name}</div><div style={{fontSize:12,color:t.textM}}>{b.cat} &middot; Due {fmtD(b.due)}</div></div>
            <div style={{fontSize:16,fontWeight:700,color:t.gold}}>{fmt(b.amount)}</div>
          </div>
          {b.alloc&&b.alloc.length>0&&<div style={{marginBottom:8,padding:8,background:t.bgS,borderRadius:8}}>
            <div style={{fontSize:11,fontWeight:700,color:t.textM,marginBottom:6}}>PAYMENT SCHEDULE</div>
            {b.alloc.map((a,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,color:a.paid?t.ok:t.textS,padding:'4px 0',borderBottom:i<b.alloc.length-1?`1px solid ${t.border}`:'none',opacity:a.paid?0.6:1}}>
              <div>
                <span style={{fontWeight:600}}>{a.paid?'\u2713 ':''} Payment {i+1}</span>
                <span style={{color:t.textM,marginLeft:6}}>{fmtD(a.date)}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontWeight:700,textDecoration:a.paid?'line-through':'none'}}>{fmt(a.amount)}</span>
                {!a.paid&&<button onClick={()=>paySplitPayment(b.id,i)} style={{background:t.okBg,border:`1px solid ${t.ok}40`,borderRadius:6,padding:'2px 8px',cursor:'pointer',color:t.ok,fontSize:10,fontWeight:700,fontFamily:'inherit'}}>Pay</button>}
                {a.paid&&<span style={{fontSize:10,color:t.ok,fontWeight:700}}>Paid</span>}
              </div>
            </div>)}
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6,paddingTop:6,borderTop:`1px solid ${t.border}`}}>
              <span style={{fontSize:11,fontWeight:700,color:t.textM}}>Remaining</span>
              <span style={{fontSize:12,fontWeight:800,color:t.gold}}>{fmt(b.alloc.filter(a=>!a.paid).reduce((s,a)=>s+a.amount,0))}</span>
            </div>
          </div>}
          <div style={{display:'flex',gap:6}}>
            {!(b.alloc&&b.alloc.length>0)&&<Btn sz="sm" onClick={()=>payBill(b.id)} v="ok">Pay Full</Btn>}
            {b.alloc&&b.alloc.length>0&&<Btn sz="sm" onClick={()=>payBill(b.id)} v="ok">Pay All</Btn>}
            <Btn sz="sm" onClick={()=>{setAllocModal(b.id);setAllocParts(2);}} v="secondary">Split</Btn>
            <Btn sz="sm" onClick={()=>rmBill(b.id)} v="bad">Del</Btn>
          </div>
        </Card>)}

        {paid.length>0&&<>
          <Hdr title="Paid Bills"/>
          {paid.map(b=><Card key={b.id} style={{marginBottom:8,padding:12,opacity:0.5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:14,color:t.textM}}>&#10003; {b.name}</div><div style={{fontSize:12,color:t.textM}}>{fmt(b.amount)}</div></div>
            <Btn sz="sm" onClick={()=>revert(b.id)} v="secondary">Undo</Btn>
          </Card>)}
        </>}

        {/* Rent Reporter */}
        <div style={{marginTop:24}}>
          <Hdr title="Rent Reporter" sub="Build credit from rent payments"/>
          {rentBill?<>
            <Card style={{background:t.goldBg,border:`1px solid ${t.gold}30`,marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontSize:14,fontWeight:600,color:t.gold}}>Monthly Rent</div><div style={{fontSize:24,fontWeight:900,color:t.gold}}>{fmt(rentBill.amount)}</div></div>
                <div style={{textAlign:'right'}}><Badge color={t.ok}>&#10003; {data.rent.filter(r=>r.reported).length} Reported</Badge><div style={{fontSize:11,color:t.textM,marginTop:4}}>+20-40 pts impact</div></div>
              </div>
            </Card>
            <Btn onClick={reportRent} full style={{marginBottom:12}}>Report Current Month</Btn>
            {data.rent.map(r=><Card key={r.id} style={{marginBottom:8,padding:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:13,color:t.text}}>{fmtD(r.month)} - {fmt(r.amount)}</div>
              {r.reported?<Badge color={t.ok}>Reported</Badge>:<Badge color={t.warn}>Pending</Badge>}
            </Card>)}
          </>:<Card style={{background:t.warnBg,border:`1px solid ${t.warn}30`,padding:16}}>
            <div style={{fontSize:14,fontWeight:600,color:t.warn}}>No rent bill found</div>
            <div style={{fontSize:12,color:t.warn,marginTop:4}}>Add a Rent/Mortgage bill above to enable reporting</div>
          </Card>}
        </div>

        <Modal open={!!allocModal} onClose={()=>setAllocModal(null)} title="Split Into Payments">
          <div style={{marginBottom:16}}>
            <div style={{fontSize:14,color:t.text,marginBottom:12}}>Split this bill into how many payments?</div>
            <div style={{display:'flex',gap:8}}>
              {[2,3,4].map(n=><Btn key={n} onClick={()=>setAllocParts(n)} v={allocParts===n?'primary':'secondary'} full>{n} payments</Btn>)}
            </div>
          </div>
          <Btn onClick={()=>splitBill(allocModal)} full>Apply Split</Btn>
        </Modal>
      </div>;
    }

    // --- STACK CIRCLE (Group Savings + Roommates) ---
    function StackCircleScreen({data,setData}) {
      const t=useContext(TC);
      const [scTab, setScTab] = useState('group');
      const tabs = ['group','roommates'];

      return <div style={{padding:'0 0 100px'}}>

          {tabs.map((tb,i)=><button role="tab" aria-selected={scTab===tb} key={tb} onClick={()=>setScTab(tb)} style={{flex:1,padding:'12px 0',background:'none',border:'none',borderBottom:scTab===tb?`3px solid ${t.gold}`:'3px solid transparent',color:scTab===tb?t.gold:t.textM,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s',letterSpacing:'-0.01em'}}>{tabLabels[i]}</button>)}

    function GroupSavingsSub({data,setData}) {
      const t=useContext(TC);
      const [addAmt,setAddAmt]=useState('');
      const group=data.groups[0];
      if(!group) return <div><Hdr title="Group Savings" sub="Save together"/><Card style={{textAlign:'center',padding:40}}><div style={{fontSize:48,marginBottom:12}}>&#128101;</div><h3 style={{fontSize:18,fontWeight:700,color:t.text,margin:0}}>No Groups Yet</h3><p style={{fontSize:14,color:t.textM,margin:'8px 0 20px'}}>Create or join a group to save with friends</p><Btn full>Create Group</Btn></Card></div>;

      const addMoney=()=>{
        const amt=parseFloat(addAmt);
        if(!amt||amt<=0)return;
        const updatedMembers=group.members.map(m=>m.name.includes('You')?{...m,contrib:m.contrib+amt,balance:m.balance+amt}:m);
        const newAct={id:gid(),user:'Alex',msg:`Alex added ${fmt(amt)}`,date:today()};
        const updatedGroup={...group,current:group.current+amt,members:updatedMembers,activity:[newAct,...group.activity]};
        setData({...data,groups:[updatedGroup]});
        setAddAmt('');
      };

      return <>
        <Card style={{background:`linear-gradient(135deg, ${t.gold}12, ${t.gold}06)`,border:`1px solid ${t.gold}25`,marginBottom:16,padding:20,textAlign:'center'}}>
          <div style={{fontSize:14,fontWeight:700,color:t.gold,marginBottom:8,letterSpacing:'-0.01em'}}>{group.name}</div>
          <div style={{fontSize:32,fontWeight:900,color:t.gold}}>{fmt(group.current)}</div>
          <div style={{fontSize:13,color:t.textM}}>of {fmt(group.target)} &middot; {pct(group.current,group.target)}%</div>
          <PBar val={group.current} max={group.target} color={t.gold} style={{marginTop:12}}/>
          <div style={{fontSize:12,color:t.textM,marginTop:8}}>Invite: {group.code}</div>
        </Card>

        <Card style={{marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:10}}>Add Money to Group</div>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Inp value={addAmt} onChange={setAddAmt} type="number" pre="$" ph="0.00" style={{marginBottom:0}}/></div>
            <Btn onClick={addMoney}>Add</Btn>
          </div>
        </Card>

        <Hdr title="Members"/>
        {group.members.map(m=><Card key={m.id} style={{marginBottom:8,padding:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:t.text}}>{m.name}</div>
              <div style={{fontSize:12,color:t.textM}}>Contributed: {fmt(m.contrib)} &middot; Balance: {fmt(m.balance)}</div>
            </div>
            <Badge color={t.gold}>{m.role}</Badge>
          </div>
        </Card>)}

        <Hdr title="Activity"/>
        {group.activity.slice(0,5).map(a=><Card key={a.id} style={{marginBottom:8,padding:10,display:'flex',gap:10}}>
          <span style={{fontSize:16}}>&#128205;</span>
          <div><div style={{fontSize:13,fontWeight:600,color:t.text}}>{a.msg}</div><div style={{fontSize:11,color:t.textM}}>{fmtD(a.date)}</div></div>
        </Card>)}
      </>;
    }

    // --- ROOMMATES SUB ---
    function RoommatesSub({data,setData}) {
      const t=useContext(TC);
      const rm = data.roommates || {enabled:false,totalRent:0,utilities:[],members:[],history:[]};
      const [addingMember,setAddingMember]=useState(false);
      const [newName,setNewName]=useState('');
      const [addingUtil,setAddingUtil]=useState(false);
      const [newUtil,setNewUtil]=useState({name:'',amount:''});
      const [editRent,setEditRent]=useState(false);
      const [rentVal,setRentVal]=useState(String(rm.totalRent));

      const update = (newRm) => setData({...data, roommates: newRm});

      // Calculate each member's share
      const totalUtilities = rm.utilities.reduce((s,u)=>s+u.amount,0);
      const totalMonthly = rm.totalRent + totalUtilities;
      const memberShares = rm.members.map(m=>{
        const rentShare = rm.totalRent * (m.share/100);
        const utilShare = totalUtilities * (m.share/100);
        return {...m, rentShare, utilShare, totalShare: rentShare+utilShare};
      });

      const allPaid = rm.members.every(m=>m.paidRent && m.paidUtilities);

      const addMember = () => {
        if(!newName.trim()) return;
        const newMembers = [...rm.members, {id:gid(),name:newName.trim(),share:0,paidRent:false,paidUtilities:false}];
        // Re-distribute shares equally
        const equalShare = Math.round(100/newMembers.length);
        newMembers.forEach((m,i)=>{ m.share = i===newMembers.length-1 ? 100-equalShare*(newMembers.length-1) : equalShare; });
        update({...rm, members:newMembers});
        setNewName('');
        setAddingMember(false);
      };

      const removeMember = (id) => {
        const newMembers = rm.members.filter(m=>m.id!==id);
        if(newMembers.length>0){
          const equalShare = Math.round(100/newMembers.length);
          newMembers.forEach((m,i)=>{ m.share = i===newMembers.length-1 ? 100-equalShare*(newMembers.length-1) : equalShare; });
        }
        update({...rm, members:newMembers});
      };

      const togglePaid = (id, type) => {
        const newMembers = rm.members.map(m=>m.id===id ? {...m, [type]:!m[type]} : m);
        update({...rm, members:newMembers});
      };

      const addUtility = () => {
        if(!newUtil.name||!newUtil.amount) return;
        update({...rm, utilities:[...rm.utilities, {id:gid(),name:newUtil.name,amount:parseFloat(newUtil.amount),split:'equal'}]});
        setNewUtil({name:'',amount:''});
        setAddingUtil(false);
      };

      const removeUtility = (id) => {
        update({...rm, utilities:rm.utilities.filter(u=>u.id!==id)});
      };

      const saveRent = () => {
        update({...rm, totalRent:parseFloat(rentVal)||0});
        setEditRent(false);
      };

      const updateShare = (id, val) => {
        const newMembers = rm.members.map(m=>m.id===id ? {...m, share:Math.max(0,Math.min(100,parseInt(val)||0))} : m);
        update({...rm, members:newMembers});
      };

      return <>
        {/* Monthly Overview */}
        <Card style={{marginBottom:16,padding:20,textAlign:'center',background:`linear-gradient(135deg, ${t.gold}10, ${t.gold}05)`,border:`1px solid ${t.gold}25`}}>
          <div style={{fontSize:12,color:t.textM,marginBottom:4,fontWeight:600,letterSpacing:'0.02em',textTransform:'uppercase'}}>Total Monthly Housing</div>
          <div style={{fontSize:36,fontWeight:900,color:t.gold}}>{fmt(totalMonthly)}</div>
          <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:8}}>
            <span style={{fontSize:12,color:t.textM}}>Rent: {fmt(rm.totalRent)}</span>
            <span style={{fontSize:12,color:t.textM}}>Utilities: {fmt(totalUtilities)}</span>
          </div>
          {allPaid&&<Badge color={t.ok} style={{marginTop:8}}>All Paid This Month</Badge>}
        </Card>

        {/* Rent */}
        <Hdr title="Rent" action={<Btn v="ghost" sz="sm" onClick={()=>setEditRent(!editRent)}>{editRent?'Cancel':'Edit'}</Btn>}/>
        {editRent?<Card style={{marginBottom:16}}>
          <Inp label="Monthly Rent" value={rentVal} onChange={setRentVal} type="number" pre="$"/>
          <Btn onClick={saveRent} full>Save Rent</Btn>
        </Card>:<Card style={{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:14,fontWeight:600,color:t.text}}>Monthly Rent</div>
          <div style={{fontSize:20,fontWeight:900,color:t.gold}}>{fmt(rm.totalRent)}</div>
        </Card>}

        {/* Utilities */}
        <Hdr title="Shared Utilities" action={<Btn v="ghost" sz="sm" onClick={()=>setAddingUtil(!addingUtil)}>{addingUtil?'Cancel':'+ Add'}</Btn>}/>
        {addingUtil&&<Card style={{marginBottom:12}}>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Inp value={newUtil.name} onChange={v=>setNewUtil({...newUtil,name:v})} ph="Name" style={{marginBottom:0}}/></div>
            <div style={{width:100}}><Inp value={newUtil.amount} onChange={v=>setNewUtil({...newUtil,amount:v})} type="number" pre="$" ph="0" style={{marginBottom:0}}/></div>
            <Btn onClick={addUtility} sz="sm">Add</Btn>
          </div>
        </Card>}
        {rm.utilities.map(u=><Card key={u.id} style={{marginBottom:8,padding:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:14,fontWeight:600,color:t.text}}>{u.name}</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:15,fontWeight:700,color:t.gold}}>{fmt(u.amount)}</span>
            <button onClick={()=>removeUtility(u.id)} style={{background:'none',border:'none',color:t.bad,cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>&#10005;</button>
          </div>
        </Card>)}

        {/* Roommates / Members */}
        <Hdr title="Roommates" action={<Btn v="ghost" sz="sm" onClick={()=>setAddingMember(!addingMember)}>{addingMember?'Cancel':'+ Add'}</Btn>}/>
        {addingMember&&<Card style={{marginBottom:12}}>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Inp value={newName} onChange={setNewName} ph="Roommate name" style={{marginBottom:0}}/></div>
            <Btn onClick={addMember} sz="sm">Add</Btn>
          </div>
        </Card>}
        {memberShares.map(m=>{
          const isYou = m.name.includes('You');
          const allDone = m.paidRent && m.paidUtilities;
          return <Card key={m.id} style={{marginBottom:10,padding:14,border:allDone?`1px solid ${t.ok}30`:`1px solid ${t.border}`,background:allDone?t.okBg:'transparent'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:t.text}}>{m.name}</div>
                <div style={{fontSize:12,color:t.textM}}>Share: {m.share}% &middot; Owes {fmt(m.totalShare)}/mo</div>
              </div>
              {allDone?<Badge color={t.ok}>Paid</Badge>:<Badge color={t.warn}>Pending</Badge>}
            </div>
            <div style={{display:'flex',gap:6,marginBottom:8}}>
              <div style={{flex:1,background:t.bgS,borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:10,color:t.textM,marginBottom:2}}>Rent</div>
                <div style={{fontSize:14,fontWeight:800,color:t.text}}>{fmt(m.rentShare)}</div>
              </div>
              <div style={{flex:1,background:t.bgS,borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
                <div style={{fontSize:10,color:t.textM,marginBottom:2}}>Utilities</div>
                <div style={{fontSize:14,fontWeight:800,color:t.text}}>{fmt(m.utilShare)}</div>
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>togglePaid(m.id,'paidRent')} style={{flex:1,padding:'8px 0',borderRadius:10,border:`1.5px solid ${m.paidRent?t.ok:t.border}`,background:m.paidRent?t.okBg:'transparent',color:m.paidRent?t.ok:t.textM,fontWeight:700,fontSize:11,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>
                {m.paidRent?'\u2713 Rent Paid':'Mark Rent Paid'}
              </button>
              <button onClick={()=>togglePaid(m.id,'paidUtilities')} style={{flex:1,padding:'8px 0',borderRadius:10,border:`1.5px solid ${m.paidUtilities?t.ok:t.border}`,background:m.paidUtilities?t.okBg:'transparent',color:m.paidUtilities?t.ok:t.textM,fontWeight:700,fontSize:11,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>
                {m.paidUtilities?'\u2713 Utils Paid':'Mark Utils Paid'}
              </button>
            </div>
            {!isYou&&<div style={{display:'flex',gap:6,marginTop:8,alignItems:'center'}}>
              <div style={{fontSize:11,color:t.textM}}>Share %:</div>
              <input type="number" value={m.share} onChange={e=>updateShare(m.id,e.target.value)} min="0" max="100"
                style={{width:60,padding:'4px 8px',borderRadius:8,border:`1px solid ${t.border}`,background:t.bgS,color:t.text,fontSize:13,fontWeight:700,fontFamily:'inherit',outline:'none',textAlign:'center',boxSizing:'border-box'}}/>
              <button onClick={()=>removeMember(m.id)} style={{marginLeft:'auto',background:'none',border:'none',color:t.bad,cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}}>Remove</button>
            </div>}
          </Card>;
        })}

        {/* Quick Summary */}
        {rm.members.length>1&&<Card style={{marginBottom:16,background:t.bgS}}>
          <div style={{fontSize:13,fontWeight:700,color:t.text,marginBottom:8}}>Split Summary</div>
          {memberShares.map(m=><div key={m.id} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13}}>
            <span style={{color:t.textM}}>{m.name}</span>
            <span style={{fontWeight:700,color:m.paidRent&&m.paidUtilities?t.ok:t.text}}>{fmt(m.totalShare)} {m.paidRent&&m.paidUtilities?'\u2713':''}</span>
          </div>)}
          <div style={{borderTop:`1px solid ${t.border}`,marginTop:6,paddingTop:6,display:'flex',justifyContent:'space-between',fontSize:13}}>
            <span style={{fontWeight:700,color:t.text}}>Total</span>
            <span style={{fontWeight:900,color:t.gold}}>{fmt(totalMonthly)}</span>
          </div>
        </Card>}
      </>;
    }

    // --- SETTINGS (General + Pay Settings + Privacy) ---

      const set=(k,v)=>setData({...data,user:{...data.user,[k]:v}});
      const [confirmReset,setConfirmReset]=useState(false);

        setData(seed());
        setConfirmReset(false);
      };

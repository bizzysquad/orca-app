        <Hdr title="Settings"/>

        {/* Profile */}
        <Card style={{marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:600,color:t.text,marginBottom:4}}>{u.name}</div>
          <div style={{fontSize:13,color:t.textM}}>{u.email}</div>
        </Card>

        {/* Appearance */}
        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Appearance</h3>
        <Card style={{marginBottom:20}}>
          <div style={{display:'flex',gap:8}}>
            <Btn onClick={()=>setIsDark(true)} v={isDark?'primary':'secondary'} full ariaLabel="Dark mode">&#127769; Dark</Btn>
            <Btn onClick={()=>setIsDark(false)} v={!isDark?'primary':'secondary'} full ariaLabel="Light mode">&#9728;&#65039; Light</Btn>
          </div>
        </Card>

        {/* Personal Info */}
        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Personal Info</h3>
        <Card style={{marginBottom:20}}>
          <Inp label="Name" value={u.name} onChange={v=>set('name',v)}/>
          <Inp label="Email" value={u.email} onChange={v=>set('email',v)}/>
        </Card>

        {/* Linked Accounts (Plaid) */}
        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Linked Accounts</h3>
        <PlaidConnect data={data} setData={setData} compact/>
        {data.plaid&&data.plaid.connected&&<Card style={{marginBottom:20}}>
          <div style={{fontSize:12,color:t.textM,lineHeight:1.6}}>
            Your bank data is synced via Plaid using bank-level encryption. ORCA never stores your bank credentials. Currently running in sandbox mode with simulated data.
          </div>
        </Card>}

        {/* Cloud Sync Status */}
        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Cloud Sync</h3>
        <Card style={{marginBottom:20}}>
          {isSupabaseConfigured() ? <>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <div style={{width:8,height:8,borderRadius:4,background:t.ok}}/>
              <span style={{fontSize:13,fontWeight:600,color:t.ok}}>Connected to Cloud</span>
            </div>
            <div style={{fontSize:12,color:t.textM,lineHeight:1.6}}>
              Your data automatically syncs between this app and the ORCA website. Changes made on either platform will appear on both.
            </div>
          </> : <>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <div style={{width:8,height:8,borderRadius:4,background:t.warn}}/>
              <span style={{fontSize:13,fontWeight:600,color:t.warn}}>Offline Mode</span>
            </div>
            <div style={{fontSize:12,color:t.textM,lineHeight:1.6}}>
              Data is saved locally on this device. Configure Supabase to enable cloud sync across devices.
            </div>
          </>}
        </Card>

        {/* Privacy & Data */}
        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Privacy &amp; Data</h3>
        <Card style={{marginBottom:20}}>
          <div style={{fontSize:12,color:t.textM,lineHeight:1.6,marginBottom:12}}>
            Your data is stored locally on your device. ORCA does not sell or share your personal information with third parties. You may request data deletion at any time in accordance with GDPR/CCPA guidelines. All financial data is encrypted in transit.
          </div>
          {!confirmReset?
            <Btn onClick={()=>setConfirmReset(true)} v="bad" full>Reset All Data</Btn>:
            <div>
              <div style={{fontSize:13,color:t.bad,fontWeight:600,marginBottom:8,textAlign:'center'}}>Are you sure? This will erase all your data.</div>
              <div style={{display:'flex',gap:8}}>
                <Btn onClick={resetAll} v="bad" full>Yes, Reset</Btn>
                <Btn onClick={()=>setConfirmReset(false)} v="secondary" full>Cancel</Btn>
              </div>
            </div>
          }
        </Card>

        {/* Sign Out */}
        <Card style={{marginBottom:20,textAlign:'center'}}>
          <Btn onClick={onSignOut} v="bad" full>Sign Out</Btn>
        </Card>
      </div>;
    }

    // ============== ADMIN PANEL ==============
    function AdminPanel({config,setConfig,onClose}) {
      const t=useContext(TC);
      const [logoUrl, setLogoUrl] = useState(config.logoUrl||'');
      const [appName, setAppName] = useState(config.appName||'ORCA');
      const [tagline, setTagline] = useState(config.tagline||'Your Money. Commanded.');
      const [goldColor, setGoldColor] = useState(config.goldColor||'#d4a843');
      const [saved, setSaved] = useState(false);

      const save=()=>{
        setConfig({...config, logoUrl:logoUrl||null, appName, tagline, goldColor});
        setSaved(true);
        setTimeout(()=>setSaved(false),2000);
      };

      return <div style={{padding:'16px 20px',paddingBottom:100}}>
        <Hdr title="Admin Panel" sub="Customize branding without rebuilding"/>

        <Card style={{marginBottom:16,background:t.goldBg,border:`1px solid ${t.gold}30`,padding:16}}>
          <div style={{fontSize:12,color:t.textM,lineHeight:1.5}}>
            Changes apply instantly. Use this panel to swap the logo, app name, tagline, and accent color without editing code.
          </div>
        </Card>

        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Branding</h3>
        <Card style={{marginBottom:16}}>
          <Inp label="App Name" value={appName} onChange={setAppName} ph="ORCA" max={20}/>
          <Inp label="Tagline" value={tagline} onChange={setTagline} ph="Your Money. Commanded." max={60}/>
          <Inp label="Logo URL (paste image URL, or leave blank for default)" value={logoUrl} onChange={setLogoUrl} ph="https://example.com/logo.png" max={500}/>
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:13,fontWeight:600,color:t.textS,marginBottom:6}}>Accent Color</label>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <input type="color" value={goldColor} onChange={e=>setGoldColor(e.target.value)} style={{width:48,height:36,border:'none',borderRadius:8,cursor:'pointer',background:'transparent'}}/>
              <span style={{fontSize:14,color:t.text,fontFamily:'monospace'}}>{goldColor}</span>
            </div>
          </div>
        </Card>

        <h3 style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>Preview</h3>
        <Card style={{marginBottom:16,textAlign:'center',padding:20}}>
          <img src={logoUrl||LOGO_B64} style={{width:60,height:60,borderRadius:14,marginBottom:8,objectFit:'cover'}} alt="Logo preview" onError={e=>{e.target.src=LOGO_B64;}}/>
          <div style={{fontSize:22,fontWeight:900,color:goldColor}}>{appName}</div>
          <div style={{fontSize:12,color:t.textM,marginTop:4}}>{tagline}</div>
        </Card>

        <Btn onClick={save} full style={{marginBottom:8}}>{saved?'Saved!':'Save Changes'}</Btn>
        <Btn onClick={onClose} v="secondary" full>Back to App</Btn>
      </div>;
    }

    // ============== RESPONSIVE LAYOUT HOOK ==============
    function useWindowWidth() {
      const [w,setW]=useState(typeof window!=='undefined'?window.innerWidth:480);
      useEffect(()=>{
        const h=()=>setW(window.innerWidth);
        window.addEventListener('resize',h);
        return ()=>window.removeEventListener('resize',h);
      },[]);
      return w;
    }

    // ============== MAIN APP ==============
    function OrcaApp() {
      const [isDark,setIsDark]=useState(()=>loadThemeLocal());
      const [config,setConfig]=useState(()=>loadConfigLocal()||{appName:'ORCA',tagline:'Your Money. Commanded.',logoUrl:null,goldColor:'#d4a843'});
      const t=isDark?THEMES.dark:THEMES.light;
      const [authed,setAuthed]=useState(false);
      const [data,setData]=useState(null);
      const [screen,setScreen]=useState('dashboard');
      const [ssTab,setSsTab]=useState('budget');
      const [supabaseUser, setSupabaseUser] = useState(null);
      const [initialLoading, setInitialLoading] = useState(true);
      const width=useWindowWidth();
      const isDesktop=width>=768;

      // Check for existing Supabase session on mount
      useEffect(()=>{
        const init = async () => {
          if(isSupabaseConfigured()){
            const { data: { session } } = await supabase.auth.getSession();
            if(session?.user){
              setSupabaseUser(session.user);
              // Try cloud data first, fallback to local
              const cloudData = await loadFromCloud(session.user.id);
              const localData = loadFromLocal();
              if(cloudData && cloudData.income.length > 0){
                setData(cloudData);
                saveToLocal(cloudData);
              } else if(localData){
                setData(localData);
                syncToCloud(localData, session.user.id);
              } else {
                const s = seed();
                setData(s);
                saveToLocal(s);
                syncToCloud(s, session.user.id);
              }
              setAuthed(true);
            } else {
              // No session — check local data for offline mode
              const localData = loadFromLocal();
              if(localData){ setData(localData); setAuthed(true); }
            }
            // Listen for auth changes (OAuth redirect callback)
            supabase.auth.onAuthStateChange((event, session) => {
              if(event==='SIGNED_IN' && session?.user){
                setSupabaseUser(session.user);
                if(!authed){
                  const localData = loadFromLocal();
                  if(localData){ setData(localData); }
                  else { const s=seed(); setData(s); saveToLocal(s); }
                  setAuthed(true);
                }
              }
              if(event==='SIGNED_OUT'){ setSupabaseUser(null); setAuthed(false); setData(null); }
            });
          } else {
            // No Supabase — pure offline mode with localStorage
            const localData = loadFromLocal();
            if(localData){ setData(localData); setAuthed(true); }
          }
          setInitialLoading(false);
        };
        init();
      },[]);

      // Auto-save to localStorage + cloud on every data change
      useEffect(()=>{
        if(data && authed){
          debouncedSync(data, supabaseUser?.id);
        }
      },[data]);

      // Persist theme and config changes
      useEffect(()=>{ saveThemeLocal(isDark); },[isDark]);
      useEffect(()=>{ saveConfigLocal(config); },[config]);

      const unread = data ? data.notifs.filter(n=>!n.read).length : 0;
      const logo = config.logoUrl || LOGO_B64;
      const appName = config.appName || 'ORCA';

      const handleScreen=(scr,sub)=>{setScreen(scr);if(sub&&scr==='smartstack')setSsTab(sub);};

      // Handle demo login (no Supabase)
      const handleDemoLogin = () => {
        const localData = loadFromLocal();
        setData(localData || seed());
        setAuthed(true);
      };

      // Handle Supabase login
      const handleSupabaseLogin = async (user) => {
        setSupabaseUser(user);
        const cloudData = await loadFromCloud(user.id);
        const localData = loadFromLocal();
        if(cloudData && cloudData.income.length > 0){
          setData(cloudData); saveToLocal(cloudData);
        } else if(localData){
          setData(localData); syncToCloud(localData, user.id);
        } else {
          const s=seed(); setData(s); saveToLocal(s); syncToCloud(s, user.id);
        }
        setAuthed(true);
      };

      // Handle sign out
      const handleSignOut = async () => {
        if(isSupabaseConfigured()) await supabase.auth.signOut();
        setAuthed(false); setData(null); setSupabaseUser(null);
      };

      if(initialLoading) return <TC.Provider value={t}><div style={{minHeight:'100vh',background:t.bg,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:12,animation:'pulse 1.5s infinite'}}>&#128051;</div><div style={{fontSize:14,color:t.gold,fontWeight:700}}>Loading ORCA...</div></div></div></TC.Provider>;

      if(!authed||!data) return <TC.Provider value={t}><AuthScreen onLogin={handleDemoLogin} onSupabaseLogin={handleSupabaseLogin}/></TC.Provider>;

      const navItems=[
        {id:'dashboard',icon:'\uD83C\uDFE0',label:'Home'},
        {id:'smartstack',icon:'\uD83D\uDCCA',label:'Smart Stack'},
        {id:'bills',icon:'\uD83D\uDCC4',label:'Bill Boss'},
        {id:'groups',icon:'\uD83D\uDC65',label:'Stack Circle'},
        {id:'settings',icon:'\u2699\uFE0F',label:'Settings'},
        {id:'admin',icon:'\uD83D\uDD27',label:'Admin'},
      ];

      const content = <>
        {screen==='dashboard'&&<DashboardScreen data={data} setData={setData} setScreen={handleScreen}/>}
        {screen==='smartstack'&&<SmartStackScreen data={data} setData={setData} subTab={ssTab} setSubTab={setSsTab}/>}
        {screen==='bills'&&<BillBossScreen data={data} setData={setData}/>}
        {screen==='groups'&&<StackCircleScreen data={data} setData={setData}/>}
        {screen==='settings'&&<SettingsScreen data={data} setData={setData} isDark={isDark} setIsDark={setIsDark} onSignOut={handleSignOut}/>}
        {screen==='admin'&&<AdminPanel config={config} setConfig={setConfig} onClose={()=>setScreen('dashboard')}/>}
      </>;

      // ===== DESKTOP LAYOUT (>= 768px): sidebar + main =====
      if(isDesktop) {
        return <TC.Provider value={t}>
          <div style={{minHeight:'100vh',background:t.bg,display:'flex'}}>
            {/* Desktop Sidebar */}
            <aside style={{width:220,background:t.navGlass,backdropFilter:'blur(20px)',borderRight:`1px solid ${t.border}`,display:'flex',flexDirection:'column',position:'fixed',top:0,bottom:0,left:0,zIndex:100}}>
              <div style={{padding:'20px 16px',display:'flex',alignItems:'center',gap:10,borderBottom:`1px solid ${t.border}`}}>
                <img src={logo} style={{width:36,height:36,borderRadius:10,objectFit:'cover'}} alt={`${appName} logo`} onError={e=>{e.target.src=LOGO_B64;}}/>
                <span style={{fontSize:20,fontWeight:900,color:config.goldColor||t.gold,letterSpacing:-0.5}}>{appName}</span>
              </div>
              <nav aria-label="Main navigation" style={{flex:1,padding:'12px 0',overflowY:'auto'}}>
                {navItems.map(nav=><button key={nav.id} aria-current={screen===nav.id?'page':undefined} onClick={()=>handleScreen(nav.id)}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 20px',background:screen===nav.id?(config.goldColor||t.gold)+'18':'transparent',border:'none',borderLeft:screen===nav.id?`3px solid ${config.goldColor||t.gold}`:'3px solid transparent',cursor:'pointer',transition:'all 0.15s',fontFamily:'inherit'}}>
                  <span style={{fontSize:20}}>{nav.icon}</span>
                  <span style={{fontSize:14,fontWeight:screen===nav.id?700:500,color:screen===nav.id?(config.goldColor||t.gold):t.textS}}>{nav.label}</span>
                </button>)}
              </nav>
              <div style={{padding:'12px 16px',borderTop:`1px solid ${t.border}`,display:'flex',gap:8}}>
                <button aria-label="Toggle theme" onClick={()=>setIsDark(!isDark)} style={{flex:1,background:t.bgS,border:'none',borderRadius:8,padding:'8px 0',cursor:'pointer',color:t.gold,fontSize:14,fontFamily:'inherit'}}>
                  {isDark?'\u2600\uFE0F Light':'\uD83C\uDF19 Dark'}
                </button>
              </div>
            </aside>

            {/* Desktop Main Content */}
            <div style={{marginLeft:220,flex:1,display:'flex',justifyContent:'center'}}>
              <div style={{width:'100%',maxWidth:720,minHeight:'100vh'}}>
                {/* Desktop Top Bar */}
                <header style={{background:t.navGlass,backdropFilter:'blur(20px)',borderBottom:`1px solid ${t.border}`,padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:99}}>
                  <h1 style={{fontSize:18,fontWeight:800,color:t.text,margin:0,letterSpacing:'-0.02em'}}>{navItems.find(n=>n.id===screen)?.label||'ORCA'}</h1>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <button aria-label={`Notifications ${unread>0?`(${unread} unread)`:''}`} onClick={()=>handleScreen('smartstack','budget')} style={{background:t.bgS,border:'none',borderRadius:8,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:config.goldColor||t.gold,fontSize:16,position:'relative'}}>
                      &#128276;
                      {unread>0&&<span style={{position:'absolute',top:2,right:2,width:16,height:16,borderRadius:8,background:t.bad,color:'#fff',fontSize:9,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
                    </button>
                    <div style={{fontSize:13,color:t.textS}}>{data.user.name}</div>
                  </div>
                </header>
                <main style={{minHeight:'calc(100vh - 56px)'}}>
                  {content}
                </main>
              </div>
            </div>
          </div>
        </TC.Provider>;
      }

      // ===== MOBILE LAYOUT (< 768px): top bar + bottom nav =====
      return <TC.Provider value={t}>
        <div style={{minHeight:'100vh',background:t.bg,display:'flex',justifyContent:'center'}}>
          <div style={{width:'100%',maxWidth:480,background:t.bg,position:'relative',boxShadow:'0 0 50px rgba(0,0,0,0.5)'}}>
            {/* TOP BAR */}
            <header style={{background:t.navGlass,backdropFilter:'blur(20px)',borderBottom:`1px solid ${t.border}`,padding:'10px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <img src={logo} style={{width:32,height:32,borderRadius:8,objectFit:'cover'}} alt={`${appName} logo`} onError={e=>{e.target.src=LOGO_B64;}}/>
                <span style={{fontSize:20,fontWeight:900,color:config.goldColor||t.gold,letterSpacing:-0.5}}>{appName}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button aria-label={`Notifications ${unread>0?`(${unread} unread)`:''}`} onClick={()=>handleScreen('smartstack','budget')} style={{background:t.bgS,border:'none',borderRadius:8,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:config.goldColor||t.gold,fontSize:16,position:'relative'}}>
                  &#128276;
                  {unread>0&&<span style={{position:'absolute',top:2,right:2,width:16,height:16,borderRadius:8,background:t.bad,color:'#fff',fontSize:9,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
                </button>
                <button aria-label="Toggle theme" onClick={()=>setIsDark(!isDark)} style={{background:t.bgS,border:'none',borderRadius:8,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:config.goldColor||t.gold,fontSize:16}}>
                  {isDark?'\u2600\uFE0F':'\uD83C\uDF19'}
                </button>
              </div>
            </header>

            {/* CONTENT */}
            <main style={{minHeight:'calc(100vh - 120px)'}}>
              {content}
            </main>

            {/* BOTTOM NAV */}
            <nav aria-label="Main navigation" style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',background:t.navGlass,backdropFilter:'blur(20px)',borderTop:`1px solid ${t.border}`,display:'flex',justifyContent:'space-around',padding:'6px 0 env(safe-area-inset-bottom, 6px)',zIndex:100}}>
              {navItems.filter(n=>n.id!=='admin').map(nav=><button key={nav.id} aria-current={screen===nav.id?'page':undefined} onClick={()=>handleScreen(nav.id)} style={{background:'none',border:'none',cursor:'pointer',padding:'8px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:2,opacity:screen===nav.id?1:0.5,transition:'all 0.2s',minWidth:0}}>
                <span style={{fontSize:22}}>{nav.icon}</span>
                <span style={{fontSize:9,color:screen===nav.id?(config.goldColor||t.gold):t.textM,fontWeight:700,whiteSpace:'nowrap'}}>{nav.label}</span>
              </button>)}
            </nav>
          </div>
        </div>
      </TC.Provider>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<OrcaApp/>);
  </script>
</body>
</html>
